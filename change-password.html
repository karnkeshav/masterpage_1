<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Ready4Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white rounded-xl shadow-lg p-8 max-w-md w-full border border-gray-100">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Update Password</h1>
        <p class="text-gray-600 mb-6" id="desc-text">For security reasons, your password has expired or requires a reset.</p>

        <div id="error-box" class="hidden bg-red-50 text-red-700 p-3 rounded mb-4 text-sm font-medium"></div>

        <form id="change-password-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Current Password</label>
                <input type="password" id="old-pass" required class="w-full px-4 py-2 border rounded focus:ring-2 focus:ring-cbse-blue outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                <input type="password" id="new-pass" required minlength="6" class="w-full px-4 py-2 border rounded focus:ring-2 focus:ring-cbse-blue outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
                <input type="password" id="confirm-pass" required minlength="6" class="w-full px-4 py-2 border rounded focus:ring-2 focus:ring-cbse-blue outline-none transition">
            </div>
            <button type="submit" id="submit-btn" class="w-full bg-cbse-blue text-white py-2.5 rounded font-semibold hover:bg-blue-800 transition shadow-sm">
                Update Securely
            </button>
        </form>
    </div>

    <script type="module">
        import { getInitializedClients } from "./js/config.js";
        import { routeUser } from "./js/auth-paywall.js";
        import { EmailAuthProvider, reauthenticateWithCredential, updatePassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const form = document.getElementById('change-password-form');
        const errorBox = document.getElementById('error-box');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.classList.add('hidden');

            const oldPass = document.getElementById('old-pass').value;
            const newPass = document.getElementById('new-pass').value;
            const confirmPass = document.getElementById('confirm-pass').value;

            if (newPass !== confirmPass) {
                errorBox.textContent = "New passwords do not match.";
                errorBox.classList.remove('hidden');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = "Updating...";

            try {
                const { auth } = await getInitializedClients();
                const user = auth.currentUser;

                if (!user) {
                    throw new Error("Session expired. Please log in again.");
                }

                // 1. Re-authenticate
                const credential = EmailAuthProvider.credential(user.email, oldPass);
                await reauthenticateWithCredential(user, credential);

                // 2. Update Auth
                await updatePassword(user, newPass);

                // 3. Update backend state
                const idToken = await user.getIdToken(true); // force refresh
                const res = await fetch('/api/password-changed', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${idToken}`
                    }
                });

                if (!res.ok) {
                    throw new Error("Failed to update backend security records.");
                }

                submitBtn.textContent = "Success! Redirecting...";
                setTimeout(() => routeUser(user), 1500);

            } catch (err) {
                errorBox.textContent = err.message || "An error occurred.";
                errorBox.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = "Update Securely";
            }
        });
    </script>
</body>
</html>
