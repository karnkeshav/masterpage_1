<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum — Ready4Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>

    <script src="../js/firebase-master-config.js"></script>
    <script src="../js/config.js" type="module"></script>

    <script type="module">
        import { loadCurriculum } from "../js/curriculum/loader.js";
        import { SlugEngine } from "../js/slug-engine.js";

        let engine = null;
        let selectedQuiz = null;

        window.startQuiz = (tableId, title, grade) => {
            const subject = new URLSearchParams(window.location.search).get("subject") || "Science";
            selectedQuiz = { tableId, title, grade, subject };
            openDifficultyModal({ subject, chapter: title });
        };

        window.closeModal = () => {
            const existing = document.getElementById('symmetric-difficulty-modal');
            if (existing) existing.remove();
            selectedQuiz = null;
        };

        // Expose launch function globally for the HTML onclick inside the modal
        window.launchQuiz = (difficulty) => {
            if (!selectedQuiz) return;
            const { tableId, title, grade } = selectedQuiz;
            window.location.href = `quiz-engine.html?table=${tableId}&topic=${encodeURIComponent(title)}&grade=${grade}&difficulty=${difficulty}&subject=${encodeURIComponent(selectedQuiz.subject)}`;
        };

        function openDifficultyModal(ctx) {
            const theme = (engine && engine.themes && engine.themes[ctx.subject]) ? engine.themes[ctx.subject] : { icon: 'fa-shapes', bg: 'bg-slate-50' };

            // Remove existing modal if present
            const existing = document.getElementById('symmetric-difficulty-modal');
            if (existing) existing.remove();

            const modal = document.createElement('div');
            modal.id = 'symmetric-difficulty-modal';
            modal.className = `fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 fade-in`;

            let colorName = 'slate';
            try {
                if (theme.bg) colorName = theme.bg.split('-')[1];
            } catch (e) { }

            modal.innerHTML = `
                <div class="bg-white rounded-3xl w-full max-w-md p-8 shadow-2xl relative border-4 border-${colorName}-100">
                    <button id="close-sym-modal" class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center bg-slate-100 rounded-full text-slate-500 hover:bg-red-50 hover:text-red-500 transition">✕</button>

                    <div class="text-center mb-8">
                        <div class="w-16 h-16 mx-auto bg-${colorName}-50 rounded-2xl flex items-center justify-center text-${colorName}-600 text-3xl mb-4 shadow-sm">
                            <i class="fas ${theme.icon}"></i>
                        </div>
                        <h3 class="text-2xl font-black text-slate-900 mb-1">Select Difficulty</h3>
                        <p class="text-xs font-bold text-${colorName}-600 uppercase tracking-widest">
                            Launching Quiz for ${ctx.subject} &gt; ${ctx.chapter}
                        </p>
                    </div>

                    <div class="space-y-4">
                        ${createCard('Simple', 'Foundation', 'bg-green-50', 'border-green-200', 'text-green-700', '🌱')}
                        ${createCard('Medium', 'Standard', 'bg-yellow-50', 'border-yellow-200', 'text-yellow-700', '⚡')}
                        ${createCard('Advanced', 'Challenger', 'bg-red-50', 'border-red-200', 'text-red-700', '🔥')}
                    </div>
                </div>
            `;

            document.body.appendChild(modal);
            document.getElementById('close-sym-modal').onclick = closeModal;
        }

        function createCard(level, subtitle, bg, border, text, icon) {
            return `
                <button onclick="launchQuiz('${level}')"
                    class="w-full p-4 ${bg} border-2 ${border} rounded-2xl hover:scale-[1.02] active:scale-95 transition-all group text-left flex items-center gap-4 shadow-sm">
                    <span class="w-12 h-12 rounded-xl bg-white/50 ${text} flex items-center justify-center text-2xl shadow-sm">${icon}</span>
                    <div>
                        <div class="font-bold ${text} text-lg leading-tight">${level}</div>
                        <div class="text-[10px] ${text} opacity-80 font-black uppercase tracking-wider">${subtitle}</div>
                    </div>
                    <span class="ml-auto ${text} group-hover:translate-x-1 transition text-xl"><i class="fas fa-arrow-right"></i></span>
                </button>
            `;
        }

        window.loadSelection = async () => {
            const params = new URLSearchParams(window.location.search);
            const grade = params.get("grade") || "9";
            const subject = params.get("subject") || "Science";

            document.getElementById("page-title").textContent = `${subject} (Class ${grade})`;
            document.getElementById("back-link").href = `consoles/student.html?grade=${grade}`; // Fallback if history empty

            try {
                const curriculum = await loadCurriculum(grade);
                engine = new SlugEngine(curriculum);
                const data = curriculum[subject];

                if (!data) {
                    document.getElementById("content-area").innerHTML = `<div class="text-center text-slate-400">No content found for ${subject}.</div>`;
                    return;
                }

                renderCurriculum(data, subject, grade);
            } catch (e) {
                console.error(e);
                document.getElementById("content-area").innerHTML = `<div class="text-center text-red-400">Failed to load curriculum.</div>`;
            }
        };

        function renderCurriculum(data, subject, grade) {
            const container = document.getElementById("content-area");
            let html = "";

            // Check structure: Array (Math/Science simple) or Object (Sub-categories)?
            // Curriculum loader returns object with keys like "Physics", "Chemistry" etc. for Science
            // Or "History", "Geography" for Social Science

            if (Array.isArray(data)) {
                // Flat list (Maybe Math in some grades?)
                // Treat as "General"
                html += renderSection("General", data, subject, grade);
            } else {
                // Categorized
                // Order keys if needed?
                Object.keys(data).forEach(category => {
                    html += renderSection(category, data[category], subject, grade);
                });
            }

            container.innerHTML = html;
        }

        function renderSection(category, chapters, subject, grade) {
            if (!chapters || !chapters.length) return "";

            const grid = chapters.map(ch => {
                const title = ch.chapter_title || ch.title || ch;
                // Generate Table ID
                // Note: In real app, table_name might be in the JSON. If not, generate it.
                // Assuming we generate it strictly based on title for now.
                // Or if the object has `table_name`, use it.
                const tableId = ch.table_name || (engine ? engine.getQuizTableSlug(grade, subject, title) : "");

                return `
                    <div onclick="startQuiz('${tableId}', '${title}', '${grade}')"
                         class="group bg-white p-5 rounded-2xl border border-slate-100 shadow-sm hover:border-blue-500 hover:shadow-md transition cursor-pointer flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 group-hover:bg-blue-50 group-hover:text-blue-600 transition">
                                <i class="fas fa-play text-xs"></i>
                            </div>
                            <div>
                                <h4 class="font-bold text-slate-800 text-sm group-hover:text-blue-700 transition">${title}</h4>
                                <div class="text-xs text-slate-400 font-mono mt-1 opacity-50">${tableId}</div>
                            </div>
                        </div>
                        <i class="fas fa-chevron-right text-slate-300 group-hover:text-blue-500 transition"></i>
                    </div>
                `;
            }).join("");

            return `
                <div class="mb-8">
                    <h3 class="text-lg font-black text-slate-900 mb-4 px-2 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                        ${category}
                    </h3>
                    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                        ${grid}
                    </div>
                </div>
            `;
        }

        // Init
        loadSelection();
    </script>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen p-4 md:p-8">
    <div class="max-w-5xl mx-auto fade-in">
        <header class="bg-cbse-blue shadow-lg py-4 px-6 sticky top-0 z-40 flex justify-between items-center">
            <a id="back-link" href="#"
                class="w-10 h-10 rounded-full bg-white border border-slate-200 flex items-center justify-center text-slate-500 hover:text-slate-900 hover:border-slate-400 transition">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div>
                <h1 id="page-title" class="text-2xl font-black  tracking-tight text-accent-gold">Loading...</h1>
                <p class="text-sm font-medium text-white opacity-80 italic tracking-wide">Ready4Exam • Powered by Ready4Industry</p>
            </div>
        </header>

        <div id="content-area">
            <!-- Dynamic Content -->
            <div class="flex items-center justify-center h-64">
                <div class="animate-pulse font-bold text-slate-300">Fetching Curriculum...</div>
            </div>
        </div>
    </div>
</body>

</html>
