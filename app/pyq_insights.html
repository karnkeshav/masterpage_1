<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter Insight — Ready4Exam</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/shell.js"></script>
    <script src="../js/tailwind-config.js"></script>
    <link href="../css/global.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script type="module">
        import { initInsights } from '../js/pyq_insights.js';
        // Single call to start everything
        initInsights();
    </script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <div id="app-header"></div>
    <script>
        R4E.renderHeader({
            title: "PYQ Insights",
            titleId: "header-title",
            homePath: "../index.html",
            homeIcon: "🔙",
            showUserWelcome: true,
            roleBadge: "Grade --",
            roleBadgeId: "context-badge",
            showLogout: false
        });
    </script>

    <main id="app-content" class="flex-grow max-w-7xl mx-auto w-full p-4 md:p-8">
        
        <section class="mb-10">
            <h3 class="text-2xl font-black text-slate-900 mb-6 flex items-center gap-3">
                <i class="fas fa-brain text-accent-gold"></i> The Intelligence Grid
            </h3>

            <div id="grid-loading" class="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
                    <h4 class="font-bold text-slate-800 mb-4">Concept Heatmap</h4>
                    <div id="heatmap-container" class="space-y-3">
                        <p class="text-xs text-slate-400 italic">Loading...</p>
                    </div>
                </div>

                <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
                    <h4 class="font-bold text-slate-800 mb-4">Marks Blueprint</h4>
                    <div class="grid grid-cols-2 gap-3 text-center">
                        <div class="bg-slate-50 p-2 rounded-lg border">
                            <div class="text-xs font-bold text-slate-400">1 Mark</div>
                            <div id="blueprint-1m" class="text-xl font-black text-slate-700">-</div>
                        </div>
                        <div class="bg-slate-50 p-2 rounded-lg border">
                            <div class="text-xs font-bold text-slate-400">2 Marks</div>
                            <div id="blueprint-2m" class="text-xl font-black text-slate-700">-</div>
                        </div>
                        <div class="bg-slate-50 p-2 rounded-lg border">
                            <div class="text-xs font-bold text-slate-400">3 Marks</div>
                            <div id="blueprint-3m" class="text-xl font-black text-slate-700">-</div>
                        </div>
                        <div class="bg-slate-50 p-2 rounded-lg border">
                            <div class="text-xs font-bold text-slate-400">5 Marks</div>
                            <div id="blueprint-5m" class="text-xl font-black text-slate-700">-</div>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
                    <h4 class="font-bold text-slate-800 mb-4">Forensics</h4>
                    <div class="bg-red-50/50 p-3 rounded-lg border border-red-100 text-sm">
                        <span id="forensics-text">Analyzing...</span>
                    </div>
                </div>

                <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
                    <h4 class="font-bold text-slate-800 mb-4">Predictive</h4>
                    <div class="bg-green-50/50 p-3 rounded-lg border border-green-100 text-sm">
                        <span id="predictive-text">Calculating...</span>
                    </div>
                </div>
            </div>
        </section>

        <div class="grid lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-gradient-to-br from-slate-900 to-cbse-blue rounded-3xl p-6 text-white">
                    <h4 class="text-xl font-bold mb-3">Real-World</h4>
                    <p id="industry-connection-text" class="text-sm opacity-90">Loading connection...</p>
                </div>
            </div>

            <div class="lg:col-span-3">
                <section class="bg-white rounded-3xl p-6 shadow-sm border">
                    <h3 class="text-2xl font-black text-slate-900 mb-4">Historical Compendium</h3>
                    <div id="compendium-container">
                        <p class="text-slate-400">Retrieving archives...</p>
                    </div>
                </section>
            </div>
        </div>

    </main>

    <div id="app-footer"></div>
    <script>R4E.renderFooter();</script>
</body>
</html>
