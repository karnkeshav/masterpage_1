<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Console — Ready4Exam</title>


    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/shell.js"></script>
<script src="../../js/tailwind-config.js"></script>
<script src="../../js/i18n-config.js"></script>
<script src="../../js/translator.js"></script>
<link href="../../css/global.css" rel="stylesheet">


    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Configs & Auth -->
    <script src="../../js/firebase-master-config.js"></script>
    <script src="../../js/config.js" type="module"></script>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <!-- Sovereignty Navigation -->
    <div id="app-header"></div>
<script>
  if (window.R4ETranslator && window.R4ETranslator.loadDictionary) {
    window.R4ETranslator.loadDictionary().then(() => {

    });
  } else {

  }
</script>


    <div id="loading" class="flex items-center justify-center min-h-[50vh]">
        <div class="animate-pulse font-bold text-slate-400">Verifying Teacher Access...</div>
    </div>

    <div id="app" class="hidden flex flex-1 overflow-hidden relative">

        <!-- Sidebar Navigation -->
        <aside class="w-64 flex-shrink-0 bg-white border-r border-slate-200 p-6 min-h-[calc(100vh-76px)] hidden lg:block shadow-sm z-10 relative">
            <h1 class="text-lg font-black text-slate-900 tracking-tight mb-8">Faculty<span class="text-cbse-blue">Board</span></h1>
            <nav class="space-y-2">
                <button id="tab-btn-curriculum" onclick="window.switchTab('curriculum')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all text-sm shadow-sm bg-cbse-blue text-white shadow-blue-900/20">
                    <i class="fas fa-book-open w-5 text-center text-accent-gold"></i> Curriculum Hub
                </button>
                <button id="tab-btn-analytics" onclick="window.switchTab('analytics')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all text-sm shadow-sm text-slate-500 hover:bg-slate-50 border border-transparent hover:border-slate-200">
                    <i class="fas fa-chart-pie w-5 text-center"></i> Live Analytics
                </button>
                <button id="tab-btn-remedial" onclick="window.switchTab('remedial')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all text-sm shadow-sm text-slate-500 hover:bg-slate-50 border border-transparent hover:border-slate-200">
                    <i class="fas fa-user-nurse w-5 text-center"></i> Remedial Queue
                </button>
                <button id="tab-btn-roster" onclick="window.switchTab('roster')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all text-sm shadow-sm text-slate-500 hover:bg-slate-50 border border-transparent hover:border-slate-200">
                    <i class="fas fa-users w-5 text-center"></i> Student Roster
                </button>
            </nav>
        </aside>

        <!-- Mobile Tab Bar -->
        <nav class="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around py-2 z-40 shadow-lg">
            <button onclick="window.switchTab('curriculum')" class="flex flex-col items-center text-xs font-bold text-slate-500 hover:text-cbse-blue">
                <i class="fas fa-book-open text-lg mb-1"></i> Curriculum
            </button>
            <button onclick="window.switchTab('analytics')" class="flex flex-col items-center text-xs font-bold text-slate-500 hover:text-cbse-blue">
                <i class="fas fa-chart-pie text-lg mb-1"></i> Analytics
            </button>
            <button onclick="window.switchTab('remedial')" class="flex flex-col items-center text-xs font-bold text-slate-500 hover:text-cbse-blue">
                <i class="fas fa-user-nurse text-lg mb-1"></i> Remedial
            </button>
            <button onclick="window.switchTab('roster')" class="flex flex-col items-center text-xs font-bold text-slate-500 hover:text-cbse-blue">
                <i class="fas fa-users text-lg mb-1"></i> Roster
            </button>
        </nav>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto bg-slate-50/50 p-6 pb-16 lg:pb-6">
            <div class="max-w-6xl mx-auto space-y-6">

                <!-- Breadcrumb -->
                <div>
                    <h1 class="text-2xl font-black text-slate-900 tracking-tight">
                        Class <span id="header-class">Unassigned-Unassigned</span> <span class="text-cbse-blue">| <span id="header-discipline">Unassigned</span></span>
                    </h1>
                    <p class="text-slate-500 text-sm mt-1">
                        Real-time Command Hub linking the classroom to the student's mastery matrix.
                    </p>
                </div>

                <!-- Tab Viewport -->
                <div id="tab-viewport">
                    <!-- Dynamic Component Rendered Here -->
                </div>

            </div>
        </main>
    </div>

    <!-- Application Script (Vanilla JS) -->
    <script src="teacher.js" type="module"></script>

<div id="app-footer"></div>
<script>R4E.renderFooter();</script>
</body>
</html>
