<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Console — Ready4Exam</title>

    <!-- CSS & Fonts -->
    <link href="../../css/global.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Configs & Auth -->
    <script src="../../js/firebase-master-config.js"></script>
    <script src="../../js/config.js" type="module"></script>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen">

    <header class="glass-panel sticky top-0 z-40 bg-cbse-blue shadow-lg py-3 px-6 flex justify-between items-center text-white border-b border-white/10">
        <div class="flex items-center space-x-4">
            <a href="../../index.html" class="w-10 h-10 flex items-center justify-center bg-white text-cbse-blue font-bold rounded-2xl shadow-sm hover:scale-105 transition active:scale-95 text-lg">🏠</a>
            <div>
                <h2 class="text-xl font-black leading-none tracking-tight text-accent-gold">Faculty Mission Control</h2>
                <p class="text-[10px] font-bold uppercase tracking-widest mt-1 text-white opacity-80 italic tracking-wide">Ready4Exam • Master Curriculum</p>
            </div>
        </div>

        <div class="flex items-center space-x-3">
            <div class="hidden md:flex flex-col items-end mr-4">
                <span id="user-welcome" class="text-xs font-bold text-white max-w-[150px] truncate">Authenticating...</span>
                <span class="text-[10px] font-black text-accent-gold bg-blue-900/50 px-2 py-0.5 rounded uppercase tracking-wide">Specialist UI</span>
            </div>
            <button class="logout-nav-btn w-10 h-10 flex items-center justify-center bg-danger-red/10 text-red-300 rounded-2xl hover:bg-danger-red hover:text-white transition shadow-sm" title="Sign Out">🚪</button>
        </div>
    </header>

    <main id="dashboard-content" class="max-w-7xl mx-auto p-6 space-y-6">
        <!-- Dynamic content goes here -->
    </main>

    <script type="module">
        import { getInitializedClients } from "../../js/config.js";
        import { initializeAuthListener } from "../../js/auth-paywall.js";
        import { bindConsoleLogout, guardConsole } from "../../js/guard.js";
        import { loadCurriculum, getGradeFromURL } from "../../js/curriculum/loader.js";
        import * as UI from "../../js/ui-renderer.js";

        // Global styles from Memory / Spec
        const COLORS = {
            blue: 'text-cbse-blue',
            red: 'text-danger-red',
            green: 'text-success-green',
            amber: 'text-warning-yellow',
            gold: 'text-accent-gold'
        };

        // UI Initialization
        async function initDashboard(user) {
            document.getElementById('user-welcome').innerText = user?.uid || "Teacher Profile";

            const container = document.getElementById('dashboard-content');
            UI.showSkeleton(container, 3); // Skeleton while loading

            const grade = getGradeFromURL() || "9";

            try {
                // Fetch local curriculum
                const curriculum = await loadCurriculum(grade);

                if (!curriculum) {
                    throw new Error("Curriculum data is null or empty.");
                }

                renderNavigator(curriculum, grade);
            } catch (error) {
                console.error("Failed to load curriculum:", error);

                // Friendly error state
                container.innerHTML = `
                    <div class="glass-panel bg-white p-8 rounded-3xl border border-danger-red/20 shadow-lg text-center flex flex-col items-center justify-center min-h-[400px]">
                        <div class="w-16 h-16 bg-red-50 text-danger-red rounded-full mb-4 flex items-center justify-center text-3xl shadow-inner">
                            <i class="fas fa-exclamation-triangle"></i>
                        </div>
                        <h2 class="text-2xl font-black text-slate-800">Curriculum Link Broken</h2>
                        <p class="text-slate-500 mt-2 font-medium max-w-md">The curriculum blueprint for Grade ${grade} could not be retrieved. Ensure class-${grade}.js exists in the local curriculum registry.</p>
                        <div class="mt-6 text-xs text-danger-red font-bold bg-red-50 px-4 py-2 rounded-xl border border-red-100">${error.message}</div>
                    </div>
                `;
            }
        }

        function renderNavigator(curriculum, grade) {
            const container = document.getElementById('dashboard-content');
            container.innerHTML = ''; // Clear skeleton

            // Header Section
            const headerHtml = `
                <div class="mb-8 pl-2 border-l-4 border-cbse-blue">
                    <h1 class="text-3xl font-black text-slate-900 tracking-tight">Grade ${grade} <span class="text-cbse-blue font-light">| Global Authority</span></h1>
                    <p class="text-slate-500 font-medium text-sm mt-1">Reviewing full structural disciplines and chapter definitions.</p>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', headerHtml);

            // Iterate over Subjects (Keys)
            const subjects = Object.keys(curriculum);

            if(subjects.length === 0) {
                 container.insertAdjacentHTML('beforeend', `
                    <div class="text-center py-12 text-slate-400 italic font-bold">No active subjects located for Grade ${grade}.</div>
                `);
                return;
            }

            subjects.forEach(subjectKey => {
                const subjectData = curriculum[subjectKey];

                // Create Subject Glass Panel Card
                const subjectCard = document.createElement('div');
                subjectCard.className = 'glass-panel bg-white p-8 rounded-3xl shadow-sm border border-slate-200 mb-8 overflow-hidden relative';

                // Decorative Element
                subjectCard.innerHTML = `
                    <div class="absolute -right-12 -top-12 text-slate-50/50 text-9xl transform rotate-12 pointer-events-none">
                        <i class="fas fa-book-open"></i>
                    </div>

                    <div class="flex items-center gap-4 mb-6 relative z-10 border-b border-slate-100 pb-4">
                        <div class="w-12 h-12 bg-blue-50 text-cbse-blue flex items-center justify-center rounded-2xl text-xl shadow-inner border border-blue-100/50">
                            <i class="fas fa-layer-group"></i>
                        </div>
                        <div>
                            <h2 class="text-2xl font-black text-slate-800 tracking-tight">${subjectKey}</h2>
                            <p class="text-[10px] uppercase font-bold text-slate-400 tracking-widest mt-0.5">${Object.keys(subjectData).length} Registered Discipline(s)</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 relative z-10" id="sections-${subjectKey.replace(/\\s+/g, '-')}">
                        <!-- Sections injected here -->
                    </div>
                `;

                container.appendChild(subjectCard);

                const sectionsContainer = document.getElementById(`sections-${subjectKey.replace(/\\s+/g, '-')}`);

                // Iterate over Sections (e.g. Physics, History)
                Object.keys(subjectData).forEach(sectionKey => {
                    const chapters = subjectData[sectionKey];

                    const sectionHtml = document.createElement('div');
                    sectionHtml.className = 'bg-slate-50/50 rounded-2xl border border-slate-100 p-5 shadow-inner';

                    let chaptersHtml = '';
                    if(chapters && chapters.length > 0) {
                        chapters.forEach((chap, idx) => {
                            chaptersHtml += `
                                <div class="group flex items-center justify-between p-3 rounded-xl hover:bg-white hover:shadow-sm transition-all duration-300 border border-transparent hover:border-slate-200 cursor-default">
                                    <div class="flex items-center gap-3">
                                        <span class="text-[10px] font-black text-cbse-blue/50 w-5 text-center group-hover:text-cbse-blue transition-colors">${idx + 1}</span>
                                        <span class="text-sm font-bold text-slate-700 group-hover:text-slate-900 transition-colors">${chap.chapter_title}</span>
                                    </div>
                                    <i class="fas fa-chevron-right text-[10px] text-slate-300 opacity-0 group-hover:opacity-100 transform translate-x-2 group-hover:translate-x-0 transition-all duration-300"></i>
                                </div>
                            `;
                        });
                    } else {
                        chaptersHtml = `<div class="p-3 text-xs italic text-slate-400">No chapters documented.</div>`;
                    }

                    sectionHtml.innerHTML = `
                        <h3 class="text-sm font-black text-slate-800 uppercase tracking-wide mb-4 flex items-center gap-2">
                            <i class="fas fa-bookmark text-accent-gold"></i> ${sectionKey}
                        </h3>
                        <div class="space-y-1">
                            ${chaptersHtml}
                        </div>
                    `;

                    sectionsContainer.appendChild(sectionHtml);
                });
            });
        }

        // Bootstrap App
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Protect Route
                guardConsole("teacher");

                // Initialize services
                const clients = await getInitializedClients();
                if (!clients || !clients.auth) {
                    console.warn("Clients could not be completely initialized.");
                }

                // Auth Listener wrapper for init
                initializeAuthListener(async (user) => {
                    if (user) {
                        await initDashboard(user);
                    } else {
                        window.location.href = '../../index.html'; // Fallback if listener detects logout
                    }
                });

                bindConsoleLogout();

            } catch (error) {
                console.error("Critical Bootstrap Error:", error);
                const container = document.getElementById('dashboard-content');
                if(container) {
                    container.innerHTML = `<div class="p-6 bg-danger-red text-white rounded-xl font-bold shadow-lg">System Initialization Failed: ${error.message}</div>`;
                }
            }
        });

    </script>
</body>

</html>
