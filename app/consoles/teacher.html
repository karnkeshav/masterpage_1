<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Console — Ready4Exam</title>

    <link href="../../css/global.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="../../js/firebase-master-config.js"></script>
    <script src="../../js/config.js" type="module"></script>

    <script type="module">
        import { initializeAuthListener } from "../../js/auth-paywall.js";
        import { getInitializedClients } from "../../js/api.js";
        import { loadCurriculum, getGradeFromURL } from "../../js/curriculum/loader.js";
        import { doc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import * as UI from "../../js/ui-renderer.js";

        // --- GLOBAL STATE ---
        let db;
        let currentGrade = "9";
        let curriculumData = {};
        let completedChapters = {};

        async function init(user) {
            const container = document.getElementById("main-content");
            UI.showSkeleton(container, 3);

            try {
                // 1. Setup Clients
                const clients = await getInitializedClients();
                db = clients.db;

                // 2. Load Real Curriculum
                currentGrade = getGradeFromURL();
                curriculumData = await loadCurriculum(currentGrade);

                // 3. Start Sync Listeners
                attachSyncListeners();

                // 4. Initial Render
                renderDashboard();

            } catch (e) {
                console.error("Initialization Failed:", e);
                container.innerHTML = `<div class="p-12 text-center text-red-500 font-bold">Failed to connect to local curriculum engine.</div>`;
            }
        }

        function attachSyncListeners() {
            // We look at the "Science" subject by default as per your code
            const scienceChapters = curriculumData["Science"]?.["Chemistry"] || [];
            
            scienceChapters.forEach(chap => {
                const slug = chap.chapter_title.toLowerCase().replace(/\s+/g, '_');
                const docId = `${currentGrade}_9A_science_chemistry_${slug}`;
                
                onSnapshot(doc(db, "chapter_control", docId), (docSnap) => {
                    completedChapters[slug] = docSnap.exists() ? docSnap.data().taught_date : null;
                    renderDashboard(); // Re-roll the UI on data change
                }, (err) => console.warn("Listener standby..."));
            });
        }

        window.markFinished = async (slug, title) => {
            const docId = `${currentGrade}_9A_science_chemistry_${slug}`;
            await setDoc(doc(db, "chapter_control", docId), {
                chapter_slug: slug,
                grade: currentGrade,
                discipline: "Chemistry",
                taught_date: serverTimestamp(),
                status: 'finished'
            });
        };

        function renderDashboard() {
            const container = document.getElementById("main-content");
            const chapters = curriculumData["Science"]?.["Chemistry"] || [];

            let html = `
                <div class="space-y-6 fade-in">
                    <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm flex justify-between items-center">
                        <div>
                            <h1 class="text-2xl font-black text-slate-900">Grade ${currentGrade} • Chemistry Hub</h1>
                            <p class="text-sm text-slate-500 mt-1">Authorized Command Center for Classroom Sync.</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            `;

            chapters.forEach((chap, idx) => {
                const slug = chap.chapter_title.toLowerCase().replace(/\s+/g, '_');
                const isSync = !!completedChapters[slug];

                html += `
                    <div class="bg-white p-6 rounded-3xl border-2 transition-all ${isSync ? 'border-green-500 bg-green-50/20' : 'border-slate-100'}">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Chapter ${idx + 1}</span>
                                <h3 class="font-bold text-lg text-slate-800">${chap.chapter_title}</h3>
                            </div>
                            ${isSync ? '<span class="text-green-600 animate-pulse text-xl">📡</span>' : ''}
                        </div>
                        <div class="mt-8 pt-4 border-t border-slate-50 flex justify-between items-center">
                            ${isSync 
                                ? `<span class="text-xs font-bold text-green-600"><i class="fas fa-check-circle"></i> Sync Active</span>`
                                : `<button onclick="markFinished('${slug}', '${chap.chapter_title}')" class="bg-cbse-blue text-white px-4 py-2 rounded-xl text-xs font-bold shadow-md hover:bg-blue-800 transition">Mark as Finished</button>`
                            }
                        </div>
                    </div>
                `;
            });

            html += `</div></div>`;
            container.innerHTML = html;
        }

        // --- Bootstrap ---
        initializeAuthListener(async (user) => {
            if (user) { await init(user); }
            else { window.location.href = "../../index.html"; }
        });
    </script>
</head>
<body class="bg-slate-50 min-h-screen">
    <header class="bg-cbse-blue p-4 px-6 text-white flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <a href="../../index.html" class="w-8 h-8 bg-white text-cbse-blue rounded-lg flex items-center justify-center font-bold">🏠</a>
            <h2 class="font-black tracking-tight">Faculty<span class="text-accent-gold">Console</span></h2>
        </div>
        <button id="logout-btn" class="text-xs font-bold bg-white/10 px-3 py-1 rounded-lg">Logout 🚪</button>
    </header>

    <main id="main-content" class="max-w-6xl mx-auto p-6 md:p-10">
        </main>
</body>
</html>
