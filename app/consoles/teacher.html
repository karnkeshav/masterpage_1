<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Console — Ready4Exam</title>

    <!-- CSS & Fonts -->
    <link href="../../css/global.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase Hooks -->
    <script src="../../js/firebase-master-config.js"></script>
    <script src="../../js/config.js" type="module"></script>
    <script src="../../js/firebase-init.js" type="module"></script>

    <script type="module">
        import { initializeAuthListener, ensureUserInFirestore } from "../../js/auth-paywall.js";
        import { getInitializedClients } from "../../js/api.js";
        import { bindConsoleLogout } from "../../js/guard.js";
        import { loadCurriculum, getGradeFromURL } from "../../js/curriculum/loader.js";
        import { doc, setDoc, onSnapshot, collection, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db;
        let currentUser;

        // Shared State
        let currentGrade = "9";
        let currentSection = "A";
        let currentDiscipline = "Chemistry";

        let activeChapters = [];
        let completedChapters = {};

        let activeTab = 'curriculum';
        let selectedChapter = "";

        // Heatmap State
        let heatmapTaughtDate = null;
        let heatmapStudents = {};
        let heatmapSelectedStudent = null;
        const MOCK_UIDS = Array.from({ length: 40 }, (_, i) => i === 8 ? "I5t4hWd27sXg8p7w2W0fKjA4m8u1" : `mock_student_${i + 1}`);

        // Remedial State
        let remedialBenchmark = 3;
        let remedialStudents = [];

        let unsubs = [];

        async function init(user) {
            currentUser = user;

            // Set up global UI triggers
            bindConsoleLogout("logout-btn", "../../index.html");
            document.getElementById("profile-uid").textContent = user.uid;

            // Initialize Firestore
            const clients = await getInitializedClients();
            db = clients.db;

            // Load initial view
            await reloadData();
            document.getElementById("app-loading").classList.add("hidden");
            document.getElementById("app-wrapper").classList.remove("hidden");
        }

        async function reloadData() {
            // Load the curriculum via dynamic module
            const curriculumData = await loadCurriculum(currentGrade);

            // Filter exactly the Science -> Discipline needed
            const scienceObj = curriculumData["Science"];
            if (scienceObj && scienceObj[currentDiscipline]) {
                activeChapters = scienceObj[currentDiscipline].map(ch => ({
                    id: ch.chapter_title.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, ''),
                    title: ch.chapter_title
                }));
            } else {
                activeChapters = [];
            }

            if (activeChapters.length > 0 && (!selectedChapter || !activeChapters.find(c => c.id === selectedChapter))) {
                selectedChapter = activeChapters[0].id;
            }

            renderTopbar();
            renderSidebar();
            attachFirebaseListeners();
            renderMain();
        }

        function attachFirebaseListeners() {
            // Unsubscribe existing listeners
            unsubs.forEach(u => u());
            unsubs = [];

            // 1. Listen to Curriculum Handshake Nodes
            activeChapters.forEach(chap => {
                const docId = `${currentGrade}_${currentGrade}${currentSection}_science_${currentDiscipline.toLowerCase()}_${chap.id}`;
                const u = onSnapshot(doc(db, "chapter_control", docId), (docSnap) => {
                    completedChapters[chap.id] = docSnap.exists() ? docSnap.data().taught_date : null;
                    if (activeTab === 'curriculum') renderMain();
                });
                unsubs.push(u);
            });

            // 2. Listen to Heatmap & Real Student Data
            if (selectedChapter) {
                const docId = `${currentGrade}_${currentGrade}${currentSection}_science_${currentDiscipline.toLowerCase()}_${selectedChapter}`;
                const u1 = onSnapshot(doc(db, "chapter_control", docId), (docSnap) => {
                    heatmapTaughtDate = docSnap.exists() && docSnap.data().taught_date ? docSnap.data().taught_date.toDate() : null;
                    if (activeTab === 'analytics') renderMain();
                });
                unsubs.push(u1);

                const targetUid = "I5t4hWd27sXg8p7w2W0fKjA4m8u1"; // Student 9
                const q = query(collection(db, "quiz_scores"), where("user_id", "==", targetUid));
                const u2 = onSnapshot(q, (snapshot) => {
                    let s9Simple = 0, s9Medium = 0, s9Advanced = 0;
                    snapshot.forEach(docSnap => {
                        const d = docSnap.data();
                        const chapMatch = (d.topic === selectedChapter || d.topicSlug === selectedChapter || d.chapter === selectedChapter);
                        if (chapMatch) {
                            const diff = (d.difficulty || "Simple").toLowerCase();
                            const totalQ = d.totalQuestions || d.total || 20;
                            const p = totalQ > 0 ? Math.round(((d.score || 0) / totalQ) * 100) : (d.score_percent || 0);

                            if (diff.includes("simple")) s9Simple = Math.max(s9Simple, p);
                            if (diff.includes("medium")) s9Medium = Math.max(s9Medium, p);
                            if (diff.includes("advanced")) s9Advanced = Math.max(s9Advanced, p);
                        }
                    });
                    heatmapStudents[targetUid] = { simple: s9Simple, medium: s9Medium, advanced: s9Advanced, isReal: true };
                    if (activeTab === 'analytics') renderMain();
                });
                unsubs.push(u2);
            }

            // Mocks
            generateMocks();
        }

        function generateMocks() {
            if (!selectedChapter) return;

            // Generate Heatmap Mocks
            MOCK_UIDS.forEach((uid, index) => {
                if (uid !== "I5t4hWd27sXg8p7w2W0fKjA4m8u1") {
                    const seed = uid.length + selectedChapter.charCodeAt(0) + index * 13;
                    const rng = Math.sin(seed) * 10000;
                    const rand = rng - Math.floor(rng);

                    let s = 0, m = 0;
                    if (rand > 0.5) { s = 96; m = Math.floor(70 + rand * 30); }
                    else if (rand > 0.2) { s = 96; m = Math.floor(40 + rand * 50); }
                    else { s = Math.floor(rand * 50); m = 0; }
                    heatmapStudents[uid] = { simple: s, medium: m, isReal: false };
                }
            });

            // Generate Remedial Queue Mocks (160 students)
            const sim = Array.from({ length: 160 }, (_, i) => {
                const seed = selectedChapter.length + (i * 17);
                const rng = Math.abs(Math.sin(seed));
                let attempts = 1;
                if (rng > 0.95) attempts = 5;
                else if (rng > 0.8) attempts = 4;
                else if (rng > 0.4) attempts = 3;
                else if (rng > 0.1) attempts = 2;

                let score = Math.floor(40 + rng * 60);
                if (attempts >= 4) score = Math.max(30, score - 20);
                if (attempts === 1 && rng < 0.2) score = 95;

                return {
                    id: `STU${1000 + i}`,
                    name: `Student ${1000 + i}`,
                    section: ['A', 'B', 'C', 'D'][i % 4],
                    attempts,
                    score: Math.min(100, score)
                };
            });
            const sortedAttempts = [...sim].map(s => s.attempts).sort((a, b) => a - b);
            remedialBenchmark = sortedAttempts[Math.floor(160 * 0.70)] || 3;
            remedialStudents = sim;
        }

        // ---------- UI Rendering Routines ---------- //

        window.setTab = (tabId) => {
            activeTab = tabId;
            renderSidebar();
            renderMain();
        };

        window.setContext = (key, val) => {
            if (key === 'grade') currentGrade = val;
            if (key === 'section') currentSection = val;
            if (key === 'discipline') currentDiscipline = val;
            reloadData();
        };

        window.changeTargetChapter = (val) => {
            selectedChapter = val;
            heatmapSelectedStudent = null;
            attachFirebaseListeners();
            renderMain();
        };

        window.markChapterFinished = async (chapterId) => {
            if (!db) return;
            const docId = `${currentGrade}_${currentGrade}${currentSection}_science_${currentDiscipline.toLowerCase()}_${chapterId}`;
            try {
                await setDoc(doc(db, "chapter_control", docId), {
                    chapter_slug: chapterId,
                    grade: currentGrade,
                    section: currentSection,
                    discipline: currentDiscipline,
                    taught_date: serverTimestamp(),
                    status: 'finished'
                });
            } catch (e) {
                console.error("Failed to mark finished:", e);
                alert("Permission denied writing to chapter_control.");
            }
        };

        window.openMistakeNotebook = (uid, index) => {
            const isReal = uid === "I5t4hWd27sXg8p7w2W0fKjA4m8u1";
            heatmapSelectedStudent = { uid, index, ...heatmapStudents[uid], isReal };
            renderMain();
        };

        window.closeMistakeNotebook = () => {
            heatmapSelectedStudent = null;
            renderMain();
        };

        function renderTopbar() {
            const topbar = document.getElementById("topbar-context");
            topbar.innerHTML = `
                <div class="flex items-center gap-2">
                    <select class="bg-white/10 text-white border border-white/20 rounded-lg px-3 py-1.5 text-sm font-bold shadow-sm outline-none cursor-pointer" onchange="setContext('grade', this.value)">
                        <option value="8" ${currentGrade === '8' ? 'selected' : ''} class="text-slate-800">8th Grade</option>
                        <option value="9" ${currentGrade === '9' ? 'selected' : ''} class="text-slate-800">9th Grade</option>
                    </select>
                    <select class="bg-white/10 text-white border border-white/20 rounded-lg px-3 py-1.5 text-sm font-bold shadow-sm outline-none cursor-pointer" onchange="setContext('section', this.value)">
                        <option value="A" ${currentSection === 'A' ? 'selected' : ''} class="text-slate-800">Section A</option>
                        <option value="B" ${currentSection === 'B' ? 'selected' : ''} class="text-slate-800">Section B</option>
                        <option value="C" ${currentSection === 'C' ? 'selected' : ''} class="text-slate-800">Section C</option>
                        <option value="D" ${currentSection === 'D' ? 'selected' : ''} class="text-slate-800">Section D</option>
                    </select>
                </div>
                <div class="h-6 w-px bg-white/20"></div>
                <div class="flex items-center gap-2">
                    <select class="bg-blue-800/50 text-white border border-blue-700 rounded-lg px-3 py-1.5 text-sm font-bold shadow-sm outline-none cursor-pointer" onchange="setContext('discipline', this.value)">
                        <option value="Chemistry" ${currentDiscipline === 'Chemistry' ? 'selected' : ''} class="text-slate-800">Chemistry</option>
                        <option value="Biology" ${currentDiscipline === 'Biology' ? 'selected' : ''} class="text-slate-800">Biology</option>
                    </select>
                </div>
            `;
        }

        function renderSidebar() {
            const tabs = [
                { id: 'curriculum', icon: 'fa-book-open', label: 'Curriculum Hub' },
                { id: 'analytics', icon: 'fa-chart-pie', label: 'Live Analytics' },
                { id: 'remedial', icon: 'fa-user-nurse', label: 'Remedial Queue' }
            ];

            const sidebar = document.getElementById("sidebar-nav");
            sidebar.innerHTML = tabs.map(t => `
                <button onclick="setTab('${t.id}')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all text-sm shadow-sm ${activeTab === t.id ? 'bg-cbse-blue text-white shadow-blue-900/20' : 'text-slate-500 hover:bg-slate-50 border border-transparent hover:border-slate-200'}">
                    <i class="fas ${t.icon} w-5 text-center ${activeTab === t.id ? 'text-accent-gold' : ''}"></i>
                    ${t.label}
                </button>
            `).join('');
        }

        function renderMain() {
            const main = document.getElementById("main-content");
            const titleHtml = `
                <div>
                    <h1 class="text-2xl font-black text-slate-900 tracking-tight">Class ${currentGrade}-${currentSection} <span class="text-cbse-blue">| ${currentDiscipline}</span></h1>
                    <p class="text-slate-500 text-sm mt-1">Real-time Command Hub linking the classroom to the student's mastery matrix.</p>
                </div>
            `;

            let contentHtml = "";
            if (activeTab === 'curriculum') contentHtml = buildCurriculumHub();
            else if (activeTab === 'analytics') contentHtml = buildSectionHeatmap();
            else if (activeTab === 'remedial') contentHtml = buildRemedialQueue();

            main.innerHTML = titleHtml + contentHtml;
        }

        // --- Core Builders --- //

        function getChapterDropdownHtml() {
            if (activeChapters.length === 0) return `<select class="bg-slate-50 border border-slate-200 rounded-lg text-slate-800 px-4 py-2" disabled><option>No chapters</option></select>`;
            return `
                <select class="bg-slate-50 border border-slate-200 rounded-lg text-slate-800 text-sm font-bold px-4 py-2 outline-none focus:ring-2 focus:ring-cbse-blue cursor-pointer shadow-sm" onchange="changeTargetChapter(this.value)">
                    ${activeChapters.map(c => `<option value="${c.id}" ${selectedChapter === c.id ? 'selected' : ''}>${c.title}</option>`).join('')}
                </select>
            `;
        }

        function buildCurriculumHub() {
            let html = `
                <div class="space-y-4">
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mt-6">
                        <div class="flex justify-between items-center mb-6">
                            <div>
                                <h2 class="text-xl font-black text-slate-800">Curriculum Handshake Hub</h2>
                                <p class="text-sm text-slate-500">Initiate global authoritative triggers for ${currentDiscipline}.</p>
                            </div>
                            <div class="w-12 h-12 bg-blue-50 text-cbse-blue flex items-center justify-center rounded-2xl text-xl">
                                <i class="fas fa-book-open"></i>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            `;

            if (activeChapters.length === 0) {
                html += `<div class="col-span-2 p-8 text-center text-slate-500 font-medium italic">No chapters loaded from curriculum JSON.</div>`;
            }

            activeChapters.forEach((chap, idx) => {
                const isFinished = !!completedChapters[chap.id];
                html += `
                    <div class="p-5 rounded-2xl border-2 transition-all ${isFinished ? 'border-success-green bg-green-50/30' : 'border-slate-100 bg-white hover:border-blue-100'}">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Chapter ${idx + 1}</span>
                                <h3 class="font-bold text-slate-800 text-lg leading-snug mt-1">${chap.title}</h3>
                            </div>
                            ${isFinished ? `<span class="bg-success-green text-white text-[9px] font-black uppercase px-2 py-1 rounded tracking-widest shadow-sm flex items-center gap-1 animate-pulse"><i class="fas fa-satellite-dish"></i> Sync Active</span>` : ''}
                        </div>
                        <div class="mt-6 pt-4 border-t ${isFinished ? 'border-green-200/50' : 'border-slate-100'} flex items-center justify-between">
                            ${isFinished
                        ? `<span class="text-xs font-bold text-success-green flex items-center gap-2"><i class="fas fa-check-circle"></i> Handshake Triggered</span>`
                        : `<button onclick="markChapterFinished('${chap.id}')" class="bg-cbse-blue hover:bg-blue-800 text-white px-4 py-2 flex items-center gap-2 rounded-lg text-xs font-bold shadow-md transition transform hover:-translate-y-0.5"><i class="fas fa-bolt text-accent-gold"></i> Mark as Finished</button>`
                    }
                        </div>
                    </div>
                `;
            });

            html += `</div></div></div>`;
            return html;
        }

        function buildSectionHeatmap() {
            const evaluateColor = (uid) => {
                const d = heatmapStudents[uid] || { simple: 0, medium: 0 };
                if (d.medium >= 95) return 'bg-success-green shadow-[0_0_12px_rgba(5,150,105,0.4)] border border-green-400';
                if (d.simple >= 95 && d.medium < 95) return 'bg-warning-yellow border border-amber-400 shadow-[0_0_8px_rgba(202,138,4,0.3)] animate-pulse';
                if (heatmapTaughtDate) {
                    const hrs = (new Date() - heatmapTaughtDate) / (1000 * 60 * 60);
                    if (hrs > 48 && d.simple < 50) return 'bg-danger-red border border-red-500 shadow-inner';
                }
                return 'bg-slate-200 border border-slate-300';
            };

            let gridHtml = MOCK_UIDS.map((uid, idx) => {
                const isReal = uid === "I5t4hWd27sXg8p7w2W0fKjA4m8u1";
                const color = evaluateColor(uid);
                return `
                    <button onclick="openMistakeNotebook('${uid}', ${idx + 1})" class="w-full aspect-square rounded-xl transition-all duration-300 transform hover:-translate-y-1 hover:scale-110 flex items-center justify-center text-white font-black text-xs ${color}">
                        ${isReal ? '<i class="fas fa-satellite-dish animate-pulse"></i>' : (idx + 1)}
                    </button>
                `;
            }).join('');

            return `
                <div class="flex gap-6 h-[calc(100vh-200px)] mt-6">
                    <div class="flex-1 bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col items-center justify-center relative overflow-hidden">
                        <div class="absolute top-6 left-6 flex items-center gap-4">
                            <div class="w-10 h-10 bg-slate-100 text-slate-800 flex items-center justify-center rounded-xl text-lg shadow-sm"><i class="fas fa-th-large"></i></div>
                            <div>
                                <h2 class="text-xl font-black text-slate-800">Section Heatmap</h2>
                                <p class="text-xs text-slate-500 font-bold uppercase tracking-widest mt-1">40-Student Grid</p>
                            </div>
                        </div>
                        <div class="absolute top-6 right-6">${getChapterDropdownHtml()}</div>

                        <div class="w-full max-w-4xl mt-16 mb-6 flex justify-between items-center px-4">
                            <div class="flex gap-4 text-xs font-bold text-slate-600 bg-slate-50 px-4 py-2 rounded-lg border border-slate-100">
                                <div class="flex items-center gap-2"><span class="w-3 h-3 rounded bg-success-green"></span> Mastered</div>
                                <div class="flex items-center gap-2"><span class="w-3 h-3 rounded bg-warning-yellow"></span> Under Review</div>
                                <div class="flex items-center gap-2"><span class="w-3 h-3 rounded bg-danger-red"></span> Critical (&gt;48h)</div>
                            </div>
                            <div class="text-xs font-bold uppercase tracking-widest text-slate-400">
                                ${heatmapTaughtDate ? `Sync Activated: ${heatmapTaughtDate.toLocaleDateString()}` : "Sync Not Activated"}
                            </div>
                        </div>

                        <div class="grid grid-cols-10 grid-rows-4 gap-3 w-full max-w-4xl mx-auto p-4 bg-slate-50/50 rounded-2xl border border-slate-100 shadow-inner">
                            ${gridHtml}
                        </div>
                    </div>

                    <div class="w-80 bg-white border border-slate-200 rounded-3xl shadow-lg transition-all duration-500 overflow-hidden flex flex-col ${heatmapSelectedStudent ? 'opacity-100 translate-x-0' : 'opacity-0 translate-x-12 hidden'}">
                        ${heatmapSelectedStudent ? `
                        <div class="bg-cbse-blue p-6 text-white relative">
                            <button onclick="closeMistakeNotebook()" class="absolute top-4 right-4 text-white/50 hover:text-white transition"><i class="fas fa-times"></i></button>
                            <h3 class="text-lg font-black tracking-tight flex items-center gap-2"><i class="fas fa-book"></i> Mistake Notebook</h3>
                            <p class="text-xs font-medium text-blue-200 mt-1">${heatmapSelectedStudent.isReal ? "Student 9 (Active Sync)" : `Seat ${heatmapSelectedStudent.index}`}</p>
                        </div>
                        <div class="p-6 flex-1 bg-slate-50 space-y-4">
                            <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                                <div class="text-[10px] uppercase font-bold text-slate-400 tracking-widest mb-2">Core Foundation (Simple)</div>
                                <div class="flex items-end justify-between">
                                    <span class="text-2xl font-black text-slate-800">${heatmapSelectedStudent.simple}%</span>
                                    <span class="text-xs font-bold ${heatmapSelectedStudent.simple >= 95 ? 'text-success-green' : 'text-danger-red'}">${heatmapSelectedStudent.simple >= 95 ? "Mastered" : "Gap Detected"}</span>
                                </div>
                                <div class="w-full bg-slate-100 h-2 mt-3 rounded-full overflow-hidden">
                                    <div class="h-full ${heatmapSelectedStudent.simple >= 95 ? 'bg-success-green' : 'bg-danger-red'}" style="width: ${heatmapSelectedStudent.simple}%"></div>
                                </div>
                            </div>
                            <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm relative overflow-hidden">
                                <div class="text-[10px] uppercase font-bold text-slate-400 tracking-widest mb-2">Application (Medium)</div>
                                <div class="flex items-end justify-between"><span class="text-2xl font-black text-slate-800">${heatmapSelectedStudent.medium}%</span></div>
                                <div class="w-full bg-slate-100 h-2 mt-3 rounded-full overflow-hidden">
                                    <div class="h-full ${heatmapSelectedStudent.medium >= 95 ? 'bg-success-green' : 'bg-warning-yellow'}" style="width: ${heatmapSelectedStudent.medium}%"></div>
                                </div>
                            </div>
                            ${(heatmapSelectedStudent.simple >= 95 && heatmapSelectedStudent.medium < 95) ? `
                            <div class="p-4 bg-amber-50 rounded-xl border border-amber-100 text-warning-yellow shadow-inner">
                                <div class="font-bold flex items-center gap-2 mb-1"><i class="fas fa-exclamation-triangle"></i> Under Review</div>
                                <p class="text-[10px] font-medium text-amber-800/80 leading-relaxed">Student mapping indicates conceptual friction. Suggest in-class conceptual review.</p>
                            </div>` : ''}
                        </div>
                        <div class="p-4 border-t border-slate-200 bg-white">
                            <button class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl text-sm shadow-md hover:bg-cbse-blue transition flex justify-center items-center gap-2"><i class="fas fa-paper-plane"></i> Dispatch Nudge</button>
                        </div>` : ''}
                    </div>
                </div>
            `;
        }

        function buildRemedialQueue() {
            const top10 = [...remedialStudents].sort((a, b) => b.score - a.score || a.attempts - b.attempts).slice(0, 10);
            const strugglers = [...remedialStudents].filter(s => s.attempts >= (remedialBenchmark + 1)).sort((a, b) => a.score - b.score).slice(0, 20);

            let strugglerHtml = strugglers.length === 0
                ? `<tr><td colspan="4" class="p-8 text-center text-slate-400 italic font-medium">No students currently in the remedial loop.</td></tr>`
                : strugglers.map(s => `
                    <tr class="hover:bg-red-50/30 transition group">
                        <td class="p-4 font-bold text-slate-800 flex items-center gap-3"><span class="w-2 h-2 rounded-full bg-danger-red block animate-pulse"></span>${s.name}</td>
                        <td class="p-4 text-center font-bold text-slate-500">${currentGrade}-${s.section}</td>
                        <td class="p-4 text-center"><div class="inline-block px-2 py-1 bg-red-100 text-danger-red rounded text-xs font-black border border-red-200">${s.attempts} (B+${s.attempts - remedialBenchmark})</div></td>
                        <td class="p-4 text-right font-black text-slate-700">${s.score}%</td>
                    </tr>
                `).join('');

            let top10Html = top10.map((s, idx) => `
                <li class="p-4 flex justify-between items-center hover:bg-white/5 transition">
                    <div class="flex items-center gap-3">
                        <div class="w-6 text-center text-blue-300 font-black text-sm">#${idx + 1}</div>
                        <div>
                            <div class="font-bold text-white text-sm">${s.name}</div>
                            <div class="text-[10px] text-blue-300 font-bold tracking-widest uppercase mt-0.5">${currentGrade}-${s.section} • ${s.attempts} Attempt(s)</div>
                        </div>
                    </div>
                    <div class="font-black text-accent-gold text-lg">${s.score}%</div>
                </li>
            `).join('');

            return `
                <div class="space-y-6 mt-6">
                    <div class="flex justify-between items-center bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                        <div>
                            <h2 class="text-xl font-black text-slate-800">Dynamic Benchmarking & Remedial Queue</h2>
                            <p class="text-sm text-slate-500">Processing 160 active students across ${currentGrade}th Grade.</p>
                        </div>
                        ${getChapterDropdownHtml()}
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
