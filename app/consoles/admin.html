<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Console — Ready4Exam</title>

    <link href="../../css/global.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cbse-blue': '#1e3a8a',
                        'accent-gold': '#fbbf24',
                        'success-green': '#10b981',
                        'danger-red': '#ef4444',
                        'warning-yellow': '#f59e0b'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Configs & Auth -->
    <script src="../../js/firebase-master-config.js"></script>
    <script src="../../js/config.js" type="module"></script>
    <script src="../../js/admin-console.js" type="module"></script>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <!-- Sovereign Theme Header -->
    <header class="glass-panel sticky top-0 z-40 bg-cbse-blue shadow-lg py-3 px-6 flex justify-between items-center text-white border-b border-white/10">
        <div class="flex items-center space-x-4">
            <a href="../../index.html" class="w-10 h-10 flex items-center justify-center bg-white text-cbse-blue font-bold rounded-2xl shadow-sm hover:scale-105 transition active:scale-95 text-lg">🏠</a>
            <div>
                <h2 class="text-xl font-black leading-none tracking-tight text-accent-gold">Relational Bridge</h2>
                <p class="text-[10px] font-bold uppercase tracking-widest mt-1 text-white opacity-80 italic tracking-wide">Ready4Exam • Master IAM</p>
            </div>
        </div>

        <div class="flex items-center space-x-3">
            <div class="hidden md:flex flex-col items-end mr-4">
                <span id="user-welcome" class="text-xs font-bold text-white max-w-[200px] truncate">Authenticating...</span>
                <span class="text-[10px] font-black text-accent-gold bg-blue-900/50 px-2 py-0.5 rounded uppercase tracking-wide">Admin Role</span>
            </div>
            <button id="logout-nav-btn" class="logout-nav-btn w-10 h-10 flex items-center justify-center bg-danger-red/10 text-red-300 rounded-2xl hover:bg-danger-red hover:text-white transition shadow-sm" title="Sign Out">🚪</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">

        <!-- Sidebar Navigation -->
        <aside class="w-64 flex-shrink-0 bg-white border-r border-slate-200 p-6 min-h-[calc(100vh-76px)] hidden lg:block shadow-sm z-10 relative">
            <h1 class="text-lg font-black text-slate-900 tracking-tight mb-8">Admin<span class="text-cbse-blue">Console</span></h1>
            <nav class="space-y-2">
                <button id="tab-btn-identity" onclick="window.switchTab('identity')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all text-sm shadow-sm bg-cbse-blue text-white shadow-blue-900/20">
                    <i class="fas fa-users-cog w-5 text-center text-accent-gold"></i> Identity Mapping Vault
                </button>
                <button id="tab-btn-registry" onclick="window.switchTab('registry')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all text-sm shadow-sm text-slate-500 hover:bg-slate-50 border border-transparent hover:border-slate-200">
                    <i class="fas fa-address-book w-5 text-center"></i> Registry Engine
                </button>
                <button id="tab-btn-observability" onclick="window.switchTab('observability')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all text-sm shadow-sm text-slate-500 hover:bg-slate-50 border border-transparent hover:border-slate-200">
                    <i class="fas fa-tachometer-alt w-5 text-center"></i> VIP Observability
                </button>
                <button id="tab-btn-messaging" onclick="window.switchTab('messaging')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all text-sm shadow-sm text-slate-500 hover:bg-slate-50 border border-transparent hover:border-slate-200">
                    <i class="fas fa-broadcast-tower w-5 text-center"></i> Sovereign Intercom
                </button>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto bg-slate-50/50 p-6">
            <div id="loading" class="flex flex-col items-center justify-center h-full text-slate-400">
                <i class="fas fa-circle-notch fa-spin text-4xl mb-4"></i>
                <div class="animate-pulse font-bold">Verifying Admin Privileges...</div>
            </div>

            <div id="app" class="hidden max-w-6xl mx-auto space-y-6 fade-in h-full">

                <!-- Tab Viewports -->
                <div id="tab-identity" class="tab-content h-full">
                    <!-- Injected by renderIdentityVault() -->
                </div>

                <div id="tab-registry" class="tab-content hidden h-full">
                    <!-- Injected by renderRegistryEngine() -->
                </div>

                <div id="tab-observability" class="tab-content hidden h-full">
                    <!-- Injected by renderObservability() -->
                </div>

                <div id="tab-messaging" class="tab-content hidden h-full">
                    <!-- Injected by renderMessaging() -->
                </div>

            </div>
        </main>
    </div>

    <!-- Sovereign Theme Footer -->
    <footer class="bg-slate-900 text-white py-6 border-t border-slate-800">
        <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-sm font-medium text-slate-400">
                &copy; 2024 Ready4Exam. Built for modern educational institutions.
            </div>
            <div class="flex gap-4">
                <a href="#" class="text-slate-400 hover:text-white transition"><i class="fab fa-twitter"></i></a>
                <a href="#" class="text-slate-400 hover:text-white transition"><i class="fab fa-linkedin"></i></a>
                <a href="#" class="text-slate-400 hover:text-white transition"><i class="fas fa-envelope"></i></a>
            </div>
        </div>
    </footer>

</body>
</html>
