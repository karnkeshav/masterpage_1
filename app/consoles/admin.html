<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Console — Ready4Exam</title>


    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/shell.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cbse-blue': '#1e3a8a',
                        'accent-gold': '#fbbf24',
                        'success-green': '#10b981',
                        'danger-red': '#ef4444',
                        'warning-yellow': '#f59e0b'
                    }
                }
            }
        }
    </script>
<script src="../../js/tailwind-config.js"></script>
<link href="../../css/global.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Configs & Auth -->
    <script src="../../js/firebase-master-config.js"></script>
    <script src="../../js/config.js" type="module"></script>
    <script src="./admin.js" type="module"></script>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <!-- Sovereign Theme Header -->
    <div id="app-header"></div>
<script>R4E.renderHeader({
    title: "Relational Bridge",
    subtitle: "Ready4Exam &bull; Master IAM",
    userWelcomeDefault: "Authenticating...",
    roleBadge: "Admin",
    showLogout: true,
    logoutId: "logout-nav-btn",
    glass: true
});</script>

    <div class="flex flex-1 overflow-hidden relative">

        <!-- Sidebar Navigation -->
        <aside class="w-64 flex-shrink-0 bg-white border-r border-slate-200 p-6 min-h-[calc(100vh-76px)] hidden lg:block shadow-sm z-10 relative">
            <h1 class="text-lg font-black text-slate-900 tracking-tight mb-8">Admin<span class="text-cbse-blue">Console</span></h1>
            <nav class="space-y-2">
                <button id="tab-btn-inventory" onclick="window.switchTab('inventory')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all text-sm shadow-sm bg-cbse-blue text-white shadow-blue-900/20">
                    <i class="fas fa-address-book w-5 text-center text-accent-gold"></i> Inventory
                </button>
                <button id="tab-btn-observability" onclick="window.switchTab('observability')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all text-sm shadow-sm text-slate-500 hover:bg-slate-50 border border-transparent hover:border-slate-200">
                    <i class="fas fa-tachometer-alt w-5 text-center"></i> VIP Observability
                </button>
                <button id="tab-btn-messaging" onclick="window.switchTab('messaging')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all text-sm shadow-sm text-slate-500 hover:bg-slate-50 border border-transparent hover:border-slate-200">
                    <i class="fas fa-broadcast-tower w-5 text-center"></i> Sovereign Intercom
                </button>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto bg-slate-50/50 p-6">
            <div id="loading" class="flex flex-col items-center justify-center h-full text-slate-400">
                <i class="fas fa-circle-notch fa-spin text-4xl mb-4"></i>
                <div class="animate-pulse font-bold">Verifying Admin Privileges...</div>
            </div>

            <div id="app" class="hidden max-w-6xl mx-auto space-y-6 fade-in h-full">

                <!-- Tab Viewports -->
                <div id="tab-inventory" class="tab-content h-full">
                    <!-- Injected by renderInventoryEngine() -->
                </div>

                <div id="tab-observability" class="tab-content hidden h-full">
                    <!-- Injected by renderObservability() -->
                </div>

                <div id="tab-messaging" class="tab-content hidden h-full">
                    <!-- Injected by renderMessaging() -->
                </div>

            </div>
        </main>
    </div>

    <!-- Sovereign Theme Footer -->
    <div id="app-footer"></div>
<script>R4E.renderFooter();</script>

</body>

</html>
