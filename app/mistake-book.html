<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnostic Console — Mistake Notebook</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/shell.js"></script>
    <script src="../js/tailwind-config.js"></script>
    <link href="../css/global.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .radar-sweep {
            position: absolute;
            width: 200%; height: 200%;
            background: conic-gradient(from 0deg at 50% 50%, rgba(26, 62, 106, 0.15) 0deg, transparent 90deg);
            animation: sweep 4s linear infinite;
            pointer-events: none;
        }
        @keyframes sweep {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        .progress-step { transition: height 0.5s ease, opacity 0.3s ease; }
    </style>

    <script src="../js/firebase-master-config.js"></script>
    <script src="../js/config.js" type="module"></script>

    <script type="module" src="../js/mistake-book.js"></script>
</head>

<body class="bg-cbse-light min-h-screen flex flex-col">

    <div id="app-header"></div>
<script>R4E.renderHeader({

    homePath: "../index.html",
    homeIcon: "🔙",
    userWelcomeDefault: "Scholar",
    roleBadge: "Grade --",
    roleBadgeId: "context-badge",
    showLogout: true,
    logoutId: "logout-nav-btn"
});</script>

    <main class="flex-grow max-w-6xl mx-auto w-full p-4 md:p-8 fade-in">
        <div class="mb-8">
            <a href="consoles/student.html" class="inline-flex items-center gap-2 text-slate-400 hover:text-cbse-blue font-bold text-sm transition group">
                <i class="fas fa-arrow-left group-hover:-translate-x-1 transition"></i> Back to Hub
            </a>
        </div>
        <div id="mistakes-container">
            </div>
    </main>

    <footer class="bg-cbse-blue text-white/50 text-[10px] md:text-xs text-center py-8 mt-auto border-t border-white/5 w-full">
        <p>© 2025 Ready4Exam Academic Portal.</p>
    </footer>

</body>
</html>
