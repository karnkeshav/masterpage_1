<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnostic Console — Mistake Notebook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        'cbse-blue': '#1a3e6a',
                        'cbse-light': '#f5f7fa',
                        'accent-gold': '#ffb703',
                        'success-green': '#16a34a',
                        'warning-yellow': '#ca8a04',
                        'danger-red': '#dc2626'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .slide-up {
            animation: slideUp 0.3s ease-out forwards;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        .radar-sweep {
            position: absolute;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg at 50% 50%, rgba(26, 62, 106, 0.15) 0deg, transparent 90deg);
            animation: sweep 4s linear infinite;
            pointer-events: none;
        }

        @keyframes sweep {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }

            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        .progress-step {
            transition: height 0.5s ease, opacity 0.3s ease;
        }
    </style>

    <script src="../js/firebase-master-config.js"></script>
    <script src="../js/config.js" type="module"></script>

    <script type="module">
        import { initializeAuthListener, ensureUserInFirestore } from "../js/auth-paywall.js";
        import { getInitializedClients } from "../js/api.js";
        import { bindConsoleLogout } from "../js/guard.js";
        import { collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { cleanKatexMarkers } from "../js/utils.js";
        import * as UI from "../js/ui-renderer.js";
        import { loadCurriculum } from "../js/curriculum/loader.js";

        UI.injectStyles();
        bindConsoleLogout("logout-nav-btn", "../index.html");

        let currentGrade = "9";
        let curriculumData = {};

        const state = {
            friction: {},
            victory: {},
            subjectStats: {},
            proficiency: {
                MCQ: { total: 0, mistakes: 0 },
                AR: { total: 0, mistakes: 0 },
                CB: { total: 0, mistakes: 0 }
            },
            victoryCount: 0
        };

        const THEMES = {
            "Mathematics": { bg: "bg-blue-50", text: "text-blue-700", border: "border-blue-200", icon: "fa-calculator", bar: "bg-blue-500", lightBar: "bg-blue-200" },
            "Science": { bg: "bg-purple-50", text: "text-purple-700", border: "border-purple-200", icon: "fa-flask", bar: "bg-purple-500", lightBar: "bg-purple-200" },
            "Social Science": { bg: "bg-amber-50", text: "text-amber-700", border: "border-amber-200", icon: "fa-landmark", bar: "bg-amber-500", lightBar: "bg-amber-200" },
            "General": { bg: "bg-slate-50", text: "text-slate-700", border: "border-slate-200", icon: "fa-cubes", bar: "bg-slate-500", lightBar: "bg-slate-200" }
        };

        async function init(user) {
            const container = document.getElementById("mistakes-container");
            UI.showSkeleton(container);

            try {
                const profile = await ensureUserInFirestore(user);
                currentGrade = profile?.classId || "9";
                document.getElementById("context-badge").textContent = `Grade ${currentGrade}`;

                curriculumData = await loadCurriculum(currentGrade);

                const { db } = await getInitializedClients();

                // 1. Fetch Scores (for proficiency/subject tracking)
                const scoresSnap = await getDocs(query(collection(db, "quiz_scores"), where("user_id", "==", user.uid), orderBy("timestamp", "desc")));

                // 2. Fetch Mistakes (from correct collection)
                const mistakesSnap = await getDocs(query(collection(db, "mistake_notebook"), where("user_id", "==", user.uid), orderBy("timestamp", "desc")));

                if (scoresSnap.empty && mistakesSnap.empty) {
                    // True empty: no quiz history at all
                    renderEmptyState(container, true);
                    return;
                }

                // Build a fast lookup map for mistake_notebook docs keyed by session_id.
                // This replaces the previous 5-second timestamp heuristic which was
                // unreliable because serverTimestamp() resolves on the Firestore server
                // and both documents could easily be >5s apart even within the same session.
                const notebookBySessionId = new Map();
                const notebookOrphans = []; // docs without a session_id (legacy data)

                mistakesSnap.docs.forEach(md => {
                    const mData = md.data();
                    const sid = mData.session_id || null;
                    if (sid) {
                        notebookBySessionId.set(sid, mData);
                    } else {
                        notebookOrphans.push(mData);
                    }
                });

                // Hydrate each quiz_scores doc with its paired mistake_notebook entry.
                // For new data: match by session_id (exact, reliable).
                // For legacy data without session_id: fall back to topic-only match.
                const scoreDocs = scoresSnap.docs.map(d => {
                    const data = d.data();
                    const topic = data.topic || data.topicSlug || data.chapter_slug || "";
                    const sid = data.session_id || null;

                    let matchingNotebook = null;
                    if (sid && notebookBySessionId.has(sid)) {
                        matchingNotebook = notebookBySessionId.get(sid);
                    } else {
                        matchingNotebook = notebookOrphans.find(mData => {
                            const mTopic = mData.topic || mData.chapter_slug || "";
                            return mTopic === topic;
                        }) || null;
                    }

                    data.mistakes = matchingNotebook ? (matchingNotebook.mistakes || []) : [];
                    data.difficulty = data.difficulty || matchingNotebook?.difficulty || 'simple';
                    data.mcq_total = data.mcq_total || 0;
                    data.ar_total = data.ar_total || 0;
                    data.cb_total = data.cb_total || 0;

                    return { data: () => data };
                });

                // Also include orphan notebook entries with no paired score doc
                notebookOrphans.forEach(mData => {
                    const topic = mData.topic || mData.chapter_slug || "";
                    const alreadyMapped = scoreDocs.some(sd => {
                        const sTopic = sd.data().topic || sd.data().topicSlug || sd.data().chapter_slug || "";
                        return sTopic === topic;
                    });
                    if (!alreadyMapped) {
                        scoreDocs.push({
                            data: () => ({
                                topic: topic,
                                timestamp: mData.timestamp,
                                percentage: 0,
                                difficulty: mData.difficulty || 'simple',
                                mistakes: mData.mistakes || [],
                                mcq_total: 0, ar_total: 0, cb_total: 0
                            })
                        });
                    }
                });

                // Always run processData + renderConsole when Firestore returned data.
                // The only true empty state (both collections empty) is caught at the top.
                // Removing the scoreDocs.length === 0 guard because it fires incorrectly
                // when scoresSnap is empty but mistakesSnap has legacy docs with no session_id
                // and no mistakes array — which would cause a false "Clean Record!" display.
                processData(scoreDocs);
                renderConsole(container);

            } catch (e) {
                console.error("Mistake Book Error:", e);
                container.innerHTML = `<div class="text-center text-red-500 font-bold p-8">Failed to load data. Please refresh.</div>`;
            }
        }

        function getSubjectContext(topicSlug) {
            const s = topicSlug.toLowerCase();
            let subject = "General";
            let chapterName = topicSlug.replace(/_/g, " ").replace(/\b\w/g, l => l.toUpperCase());

            // Step 1: Resolve subject from the Supabase slug prefix FIRST.
            // Slug format: {subject}_{chapter}_{grade}_quiz e.g. 'mathematics_triangles_9_quiz'
            // This prevents cross-subject chapter collisions (e.g. 'Lines' matching wrong subject).
            const prefix = s.split('_')[0];
            if (prefix === "mathematics" || prefix === "math") subject = "Mathematics";
            else if (prefix === "science") subject = "Science";
            else if (prefix === "social") subject = "Social Science";
            else if (s.includes("math")) subject = "Mathematics";
            else if (s.includes("social")) subject = "Social Science";
            else if (s.includes("science")) subject = "Science";

            // Step 2: Strip the slug to extract just the chapter body for title matching.
            const slugBody = s
                .replace(/^(mathematics|math|science|social)_/, '')
                .replace(/_\d+_quiz$/, '')
                .replace(/_/g, ' ');

            // Step 3: Find the exact chapter title within the already-resolved subject.
            for (const [subj, sections] of Object.entries(curriculumData)) {
                if (subj !== subject && subject !== "General") continue;
                for (const [, chapters] of Object.entries(sections)) {
                    for (const ch of chapters) {
                        const title = ch.chapter_title.toLowerCase();
                        if (title === slugBody || title.includes(slugBody) || slugBody.includes(title)) {
                            chapterName = ch.chapter_title;
                            if (subject === "General") subject = subj;
                            return { subject, chapterName };
                        }
                    }
                }
            }

            return { subject, chapterName };
        }

        function getQuestionType(id) {
            const strId = String(id || "");
            if (strId.startsWith("ar_")) return "AR";
            if (strId.startsWith("cb_")) return "CB";
            return "MCQ";
        }

        function processData(scoreDocs) {
            const subjectScores = {};
            const topicHistory = {};

            scoreDocs.forEach(d => {
                const data = d.data();
                const topic = data.topic || data.topicSlug || data.chapter_slug;
                if (!topic) return;

                const { subject, chapterName } = getSubjectContext(topic);
                const score = parseFloat(data.percentage || data.score_percent || data.score || 0);
                const difficulty = (data.difficulty || 'simple').toLowerCase();

                if (!subjectScores[subject]) {
                    subjectScores[subject] = { simple: [], medium: [], advanced: [], chapterScores: {} };
                }
                if (subjectScores[subject][difficulty]) {
                    subjectScores[subject][difficulty].push(score);
                }

                (data.mistakes || []).forEach(m => {
                    const mId = m.id || m.question_id || m.question || m.question_text || "";
                    if (!mId) return;
                    // Use stored question_type from new data; fall back to ID-prefix for legacy.
                    const type = m.question_type
                        ? (m.question_type.includes('ar') ? 'AR' : (m.question_type.includes('cb') || m.question_type.includes('case')) ? 'CB' : 'MCQ')
                        : getQuestionType(mId);
                    state.proficiency[type].mistakes++;
                });

                // FIXED: Use real per-type question totals written by quiz-engine.js.
                // For legacy docs pre-dating this fix, these will be 0 so the
                // proficiency pill shows 'No Data' instead of fabricated values.
                state.proficiency.MCQ.total += (data.mcq_total || 0);
                state.proficiency.AR.total += (data.ar_total || 0);
                state.proficiency.CB.total += (data.cb_total || 0);

                if (!topicHistory[topic]) topicHistory[topic] = {};
                // Organize history nested by Difficulty Level (Simple, Medium, Advanced)
                // This ensures we can track Mastery vs Friction separately for advanced concepts
                if (!topicHistory[topic][difficulty]) topicHistory[topic][difficulty] = [];

                topicHistory[topic][difficulty].push({
                    mistakes: data.mistakes || [],
                    timestamp: data.timestamp ? data.timestamp.toDate() : new Date()
                });
            });

            Object.keys(subjectScores).forEach(subj => {
                const s = subjectScores[subj];
                const avg = (arr) => arr.length ? Math.round(arr.reduce((a, b) => a + b, 0) / arr.length) : 0;
                state.subjectStats[subj] = {
                    simple: avg(s.simple),
                    medium: avg(s.medium),
                    advanced: avg(s.advanced)
                };
            });

            Object.entries(topicHistory).forEach(([topic, difficulties]) => {
                const { subject, chapterName } = getSubjectContext(topic);

                Object.entries(difficulties).forEach(([diff, attempts]) => {
                    attempts.sort((a, b) => b.timestamp - a.timestamp);
                    const allMistakes = new Map();

                    // Keep track of the raw state existence for UI mapping
                    if (!state.friction[subject]) state.friction[subject] = {};
                    if (!state.friction[subject][chapterName]) state.friction[subject][chapterName] = [];

                    let hasRealMistakes = false;

                    attempts.forEach(att => {
                        if (att.mistakes && att.mistakes.length > 0) hasRealMistakes = true;

                        (att.mistakes || []).forEach(m => {
                            const mId = m.id || m.question_id || m.question || m.question_text || "";
                            if (!mId) return;
                            if (!allMistakes.has(mId)) {
                                allMistakes.set(mId, {
                                    id: mId,
                                    text: m.question || m.question_text || "Question text unavailable",
                                    type: getQuestionType(mId),
                                    dates: [],
                                    topic: topic,
                                    difficulty: diff
                                });
                            }
                            allMistakes.get(mId).dates.push(att.timestamp);
                        });
                    });

                    // If it was just an empty legacy score (0% but no mistake data physical logged), skip it.
                    if (!hasRealMistakes) return;

                    const latestMistakeIds = new Set((attempts[0].mistakes || []).map(m => m.id || m.question_id || m.question || m.question_text || "").filter(id => id));
                    const previousMistakeIds = new Set();

                    // Start looking from index 1 (previous attempts)
                    attempts.slice(1).forEach(att => {
                        (att.mistakes || []).forEach(m => {
                            const id = m.id || m.question_id || m.question || m.question_text || "";
                            if (id) previousMistakeIds.add(id);
                        });
                    });

                    allMistakes.forEach((data, id) => {
                        if (previousMistakeIds.has(id) && !latestMistakeIds.has(id)) {
                            addToState('victory', subject, chapterName, { ...data, masteryDate: attempts[0].timestamp.toDateString() });
                            state.victoryCount++;
                        } else {
                            addToState('friction', subject, chapterName, { ...data, dates: data.dates });
                        }
                    });
                });
            });
        } // Closing processData

        function addToState(type, subject, chapter, item) {
            if (!state[type][subject]) state[type][subject] = {};
            if (!state[type][subject][chapter]) state[type][subject][chapter] = [];
            state[type][subject][chapter].push(item);
        }

        function renderConsole(container) {
            const allSubjects = new Set([
                ...Object.keys(state.subjectStats),
                ...Object.keys(state.friction),
                ...Object.keys(state.victory)
            ]);

            // Ensure core subjects are always present if not found
            if (!allSubjects.has("Mathematics")) allSubjects.add("Mathematics");
            if (!allSubjects.has("Science")) allSubjects.add("Science");
            if (!allSubjects.has("Social Science")) allSubjects.add("Social Science");

            const sortedSubjects = Array.from(allSubjects).sort();

            const tier1 = `
                <div class="glass-panel rounded-3xl p-6 mb-8 flex flex-col md:flex-row items-center justify-between bg-gradient-to-r from-cbse-blue/5 to-transparent border-cbse-blue/10">
                    <div class="flex items-center space-x-6 mb-4 md:mb-0">
                        <div class="w-16 h-16 rounded-2xl bg-white flex items-center justify-center text-3xl shadow-sm">🛡️</div>
                        <div>
                            <h3 class="text-2xl font-black text-cbse-blue tracking-tight">Diagnostic Status</h3>
                            <p class="text-sm text-slate-500 font-medium">Identify patterns. Eliminate friction.</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-8">
                        <div class="text-right">
                            <span class="block text-3xl font-black text-green-600">${state.victoryCount}</span>
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Victory Gains</span>
                        </div>
                        <div class="h-10 w-px bg-slate-200"></div>
                        <div class="text-right">
                            <span class="block text-3xl font-black text-red-500">${Object.keys(state.friction).length}</span>
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Active Zones</span>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <div class="glass-panel rounded-3xl p-6 flex flex-col justify-between">
                        <h4 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-4">Proficiency Profile</h4>
                        <div class="space-y-4">
                            ${renderProficiencyPill("MCQ", "Recall", state.proficiency.MCQ)}
                            ${renderProficiencyPill("AR", "Logic", state.proficiency.AR)}
                            ${renderProficiencyPill("CB", "Application", state.proficiency.CB)}
                        </div>
                    </div>
                    ${sortedSubjects.map(s => renderMasteryCard(s)).join('')}
                </div>
            `;

            const tier2 = `
                <div class="grid lg:grid-cols-3 gap-8 items-start relative min-h-[500px]">
                    <div class="lg:col-span-2 space-y-6">
                        <h4 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-2">Subject Navigator</h4>
                        ${sortedSubjects.map(s => renderSubjectNavigator(s)).join('')}
                    </div>
                    <div class="lg:col-span-1 hidden lg:block sticky top-24">
                        <div id="inspector-panel" class="glass-panel rounded-3xl p-6 min-h-[400px] flex flex-col items-center justify-center text-center transition-all duration-300 border border-slate-200 shadow-sm relative overflow-hidden bg-white/50">
                             <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-10">
                                <div class="w-64 h-64 rounded-full border border-slate-300 relative overflow-hidden">
                                    <div class="radar-sweep"></div>
                                </div>
                             </div>
                            <div class="relative z-10">
                                <div class="text-4xl mb-4 text-slate-300 animate-pulse">📡</div>
                                <h4 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-2">Inspector Active</h4>
                                <p class="text-xs text-slate-500 max-w-[200px]">Hover over any chapter on the left to analyze friction points.</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="mobile-inspector" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm hidden flex items-end justify-center lg:hidden p-4 pb-8" onclick="closeMobileInspector()">
                    <div class="bg-white w-full max-w-md rounded-3xl max-h-[85vh] overflow-y-auto p-6 relative slide-up shadow-2xl" onclick="event.stopPropagation()">
                        <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-6"></div>
                        <div id="mobile-inspector-content"></div>
                    </div>
                </div>
            `;

            container.innerHTML = tier1 + tier2;
        }

        function renderProficiencyPill(type, label, stats) {
            const { total, mistakes } = stats;

            if (total === 0) {
                return `
                    <div class="flex items-center justify-between p-3 rounded-xl bg-slate-100 text-slate-500 transition hover:scale-[1.02]">
                        <div class="flex items-center space-x-3">
                            <span class="w-2 h-2 rounded-full bg-slate-300"></span>
                            <div>
                                <span class="block text-xs font-black uppercase tracking-wide">${label}</span>
                                <span class="text-[10px] opacity-80 font-bold">No Data</span>
                            </div>
                        </div>
                        <span class="text-lg font-black opacity-30">${type}</span>
                    </div>
                `;
            }

            const errorRate = (mistakes / total) * 100;

            let color = "bg-green-100 text-green-700";
            let dot = "bg-green-500";
            let status = "Strong";

            if (errorRate > 30) {
                color = "bg-red-100 text-red-700";
                dot = "bg-red-500";
                status = "Needs Focus";
            } else if (errorRate > 15) {
                color = "bg-yellow-100 text-yellow-700";
                dot = "bg-yellow-500";
                status = "Review";
            }

            return `
                <div class="flex items-center justify-between p-3 rounded-xl ${color} transition hover:scale-[1.02]">
                    <div class="flex items-center space-x-3">
                        <span class="w-2 h-2 rounded-full ${dot} animate-pulse"></span>
                        <div>
                            <span class="block text-xs font-black uppercase tracking-wide">${label}</span>
                            <span class="text-[10px] opacity-80 font-bold">${status}</span>
                        </div>
                    </div>
                    <span class="text-lg font-black opacity-50">${type}</span>
                </div>
            `;
        }

        function renderMasteryCard(subject) {
            const theme = THEMES[subject] || THEMES["General"];
            const stats = state.subjectStats[subject] || { simple: 0, medium: 0, advanced: 0 };
            const hS = Math.max(15, stats.simple) + "%";
            const hM = Math.max(15, stats.medium) + "%";
            const hA = Math.max(15, stats.advanced) + "%";

            return `
                <div class="${theme.bg} rounded-3xl p-5 border ${theme.border} relative overflow-hidden group">
                     <div class="flex justify-between items-start mb-4 relative z-10">
                        <h3 class="font-black ${theme.text} text-lg tracking-tight">${subject}</h3>
                        <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-sm shadow-sm ${theme.text}">
                            <i class="fas ${theme.icon}"></i>
                        </div>
                     </div>
                     <div class="flex items-end space-x-2 h-24 mt-2 relative z-10">
                        <div class="flex-1 flex flex-col items-center">
                            <div class="w-full ${theme.bar} rounded-t-md progress-step" style="height: ${hS}"></div>
                            <span class="text-[9px] font-bold text-slate-400 mt-1 uppercase">Basics</span>
                        </div>
                        <div class="flex-1 flex flex-col items-center">
                            <div class="w-full ${theme.bar} rounded-t-md progress-step opacity-80" style="height: ${hM}"></div>
                            <span class="text-[9px] font-bold text-slate-400 mt-1 uppercase">Std</span>
                        </div>
                        <div class="flex-1 flex flex-col items-center">
                            <div class="w-full ${theme.bar} rounded-t-md progress-step opacity-60" style="height: ${hA}"></div>
                            <span class="text-[9px] font-bold text-slate-400 mt-1 uppercase">Elite</span>
                        </div>
                     </div>
                </div>
            `;
        }

        function renderSubjectNavigator(subject) {
            const theme = THEMES[subject] || THEMES["General"];
            const fChapters = Object.keys(state.friction[subject] || {}).length;
            const vChapters = Object.keys(state.victory[subject] || {}).length;

            return `
                <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm transition group">
                    <div class="px-6 py-5 flex items-center justify-between border-b border-slate-50 ${theme.bg}">
                        <div class="flex items-center space-x-4">
                            <div class="w-10 h-10 rounded-xl bg-white text-lg flex items-center justify-center shadow-sm ${theme.text}">
                                <i class="fas ${theme.icon}"></i>
                            </div>
                            <h3 class="text-lg font-black text-slate-700 tracking-tight">${subject}</h3>
                        </div>
                        <div class="flex space-x-4">
                            <button onclick="toggleList('${subject}', 'friction')" class="text-xs font-bold text-red-500 hover:text-red-700 transition flex items-center">
                                <span class="w-2 h-2 bg-red-500 rounded-full mr-2"></span> Friction (${fChapters})
                            </button>
                            <button onclick="toggleList('${subject}', 'victory')" class="text-xs font-bold text-green-600 hover:text-green-700 transition flex items-center">
                                <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span> Victory (${vChapters})
                            </button>
                        </div>
                    </div>
                    <div id="list-${subject}" class="hidden bg-white"></div>
                </div>
            `;
        }

        window.toggleList = (subject, type) => {
            const container = document.getElementById(`list-${subject}`);
            const chapters = state[type][subject] || {};
            const names = Object.keys(chapters).sort();

            if (container.dataset.type === type && !container.classList.contains('hidden')) {
                container.classList.add('hidden');
                return;
            }

            container.dataset.type = type;
            container.classList.remove('hidden');

            if (names.length === 0) {
                container.innerHTML = `<div class="p-4 text-center text-xs text-slate-400">No items found.</div>`;
                return;
            }

            let html = `<div class="divide-y divide-slate-100 max-h-64 overflow-y-auto">`;
            names.forEach(ch => {
                // Now chapters[ch] is an object keyed by difficulty: { simple: [...], medium: [...] }
                let count = 0;
                Object.values(chapters[ch]).forEach(diffArray => count += diffArray.length);

                // FIX: escapedCh was referenced but never declared, causing a ReferenceError
                // that crashed the chapter list for every subject. Declared here with proper
                // HTML entity escaping so apostrophes/quotes in chapter names are safe.
                const escapedCh = ch.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');

                html += `
                    <div class="px-6 py-4 flex justify-between items-center cursor-pointer hover:bg-slate-50 transition group/item chapter-item"
                         data-subject="${subject}" data-chapter="${escapedCh}" data-type="${type}">
                        <span class="text-sm font-bold text-slate-700 group-hover/item:text-cbse-blue transition">${ch}</span>
                        <span class="text-[10px] font-black bg-slate-100 text-slate-500 px-2 py-1 rounded group-hover/item:bg-white group-hover/item:shadow-sm transition">${count}</span>
                    </div>
                `;
            });
            html += `</div>`;
            container.innerHTML = html;

            // Attach listeners safely
            container.querySelectorAll('.chapter-item').forEach(el => {
                const s = el.getAttribute('data-subject');
                const c = el.getAttribute('data-chapter');
                const t = el.getAttribute('data-type');

                // Decode the HTML entities back to normal strings before passing to state
                const decodedTopic = c.replace(/&quot;/g, '"').replace(/\\'/g, "'");

                el.addEventListener('mouseenter', () => window.inspectChapter(s, decodedTopic, t));
                el.addEventListener('click', () => window.inspectChapter(s, decodedTopic, t, true));
            });
        };

        window.inspectChapter = (subject, chapter, type, isClick = false) => {
            // Now fetching an object { simple: [], medium: [], advanced: [] }
            const difficultiesObj = state[type][subject][chapter];
            const isFriction = type === 'friction';

            let html = `
                <div class="animate-fade-in text-left">
                    <div class="mb-6 pb-4 border-b border-slate-100">
                        <span class="text-[10px] font-black uppercase tracking-widest ${isFriction ? 'text-red-500' : 'text-green-500'} mb-1 block">${isFriction ? 'Persistent Friction' : 'Victory Gallery'}</span>
                        <h3 class="text-xl font-black text-slate-800 leading-tight">${chapter}</h3>
                    </div>
            `;

            const availableDifficulties = Object.keys(difficultiesObj).sort();

            availableDifficulties.forEach(diff => {
                if (!difficultiesObj[diff] || difficultiesObj[diff].length === 0) return;

                // Add difficulty headers with safe fallbacks for legacy/unrecognized tags
                const colorMap = { 'simple': 'text-blue-500', 'medium': 'text-amber-500', 'advanced': 'text-purple-500' };
                const bgMap = { 'simple': 'bg-blue-50', 'medium': 'bg-amber-50', 'advanced': 'bg-purple-50' };

                const textColor = colorMap[diff] || 'text-slate-500';
                const bgColor = bgMap[diff] || 'bg-slate-100';
                const labelName = ['simple', 'medium', 'advanced'].includes(diff) ? `${diff} Level` : `Questions`;

                html += `<div class="mt-6 mb-3 flex items-center"><span class="text-xs font-black uppercase tracking-widest ${textColor} px-2 py-1 ${bgColor} rounded">${labelName}</span></div>`;

                difficultiesObj[diff].forEach(m => {
                    const dateStr = (m.dates || []).map(d => {
                        const date = d instanceof Date ? d : (d.toDate ? d.toDate() : new Date(d));
                        return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    }).join(', ');

                    const mistakeCount = (m.dates || []).length;
                    const repeatedFriction = isFriction && mistakeCount > 1;

                    html += `
                        <div class="bg-slate-50 rounded-xl p-4 border border-slate-100 mb-3 relative">
                            <div class="absolute left-0 top-4 bottom-4 w-1 ${isFriction ? 'bg-red-400' : 'bg-green-400'} rounded-r-full"></div>
                            ${repeatedFriction ? `<div class="mb-2"><span class="text-[9px] font-black bg-red-100 text-red-600 px-2 py-0.5 rounded border border-red-200 uppercase tracking-wider shadow-sm">⚠️ Failed ${mistakeCount} Times</span></div>` : ''}
                            <p class="text-xs font-medium text-slate-700 pl-3 mb-3 leading-relaxed">${cleanKatexMarkers(m.text)}</p>
                            <div class="pl-3 pt-2 border-t border-slate-200/50 flex justify-between items-center">
                                ${isFriction ? `
                                    <span class="text-[9px] font-bold text-red-500 uppercase">Trend: ${dateStr}</span>
                                    <a href="../study-content.html?grade=${currentGrade}&topic=${m.topic}" class="text-[9px] font-black text-red-600 bg-white border border-red-100 px-3 py-1.5 rounded-lg hover:bg-red-50 transition uppercase shadow-sm">Master Concept</a>
                                ` : `
                                    <span class="text-[9px] font-bold text-green-600 uppercase">🏆 Mastered: ${m.masteryDate}</span>
                                `}
                            </div>
                        </div>
                    `;
                });
            });
            html += `</div>`;

            const inspector = document.getElementById('inspector-panel');
            if (inspector) {
                inspector.innerHTML = html;
                inspector.classList.remove('items-center', 'justify-center', 'text-center');
                inspector.classList.add('items-start', 'justify-start');
            }

            if (window.innerWidth < 1024 && isClick) {
                document.getElementById('mobile-inspector-content').innerHTML = html;
                document.getElementById('mobile-inspector').classList.remove('hidden');
            }
        };

        window.closeMobileInspector = () => document.getElementById('mobile-inspector').classList.add('hidden');

        function renderEmptyState(container, noHistory = false) {
            if (noHistory) {
                container.innerHTML = `
                    <div class="glass-panel p-12 rounded-3xl text-center max-w-2xl mx-auto mt-12">
                        <div class="text-6xl mb-6">📚</div>
                        <h3 class="text-2xl font-black text-slate-700 mb-2">No Quiz History Yet</h3>
                        <p class="text-slate-500 font-medium">Complete your first quiz to start tracking your progress here.</p>
                        <a href="consoles/student.html" class="inline-block mt-6 px-6 py-3 bg-cbse-blue text-white font-bold rounded-xl shadow hover:shadow-lg transition">Go to Hub →</a>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="glass-panel p-12 rounded-3xl text-center max-w-2xl mx-auto mt-12">
                        <div class="text-6xl mb-6">🎉</div>
                        <h3 class="text-2xl font-black text-slate-700 mb-2">Clean Record!</h3>
                        <p class="text-slate-500 font-medium">You've scored above 85% on every attempt. No friction points logged.</p>
                    </div>
                `;
            }
        }

        initializeAuthListener(async (user) => {
            if (user) {
                document.getElementById("user-welcome").textContent = user.displayName || "Scholar";
                await init(user);
            } else {
                window.location.href = "../index.html";
            }
        });
    </script>
</head>
