<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mistake Notebook — Mission Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily:{ sans:['Inter','sans-serif'] },
          colors:{
            'cbse-blue':'#1a3e6a',
            'cbse-light':'#f5f7fa',
            'accent-gold':'#ffb703',
            'success-green': '#16a34a',
            'warning-yellow': '#ca8a04',
            'danger-red': '#dc2626'
          }
        }
      }
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body{font-family:'Inter',sans-serif;}
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .active-chapter { background: #f1f5f9; border-left-color: #1a3e6a; }

        /* Radar Animation */
        @keyframes radar-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .radar-sweep {
            background: conic-gradient(from 0deg, transparent 0deg, rgba(220, 38, 38, 0.1) 360deg);
            animation: radar-spin 2s linear infinite;
        }

        /* Heat Dots */
        .heat-dot {
            width: 8px; height: 8px; border-radius: 50%;
            display: inline-block; margin-right: 2px;
        }
        .heat-dot.high { background-color: #dc2626; } /* Red */
        .heat-dot.med { background-color: #f87171; }  /* Light Red */
        .heat-dot.low { background-color: #fee2e2; border: 1px solid #fca5a5; } /* Pale */
    </style>

    <script src="../js/firebase-master-config.js"></script>
    <script src="../js/config.js" type="module"></script>

    <script type="module">
        import { initializeAuthListener, ensureUserInFirestore } from "../js/auth-paywall.js";
        import { getInitializedClients } from "../js/api.js";
        import { bindConsoleLogout } from "../js/guard.js";
        import { collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { cleanKatexMarkers } from "../js/utils.js";
        import * as UI from "../js/ui-renderer.js";
        import { loadCurriculum } from "../js/curriculum/loader.js";
        import { SlugEngine } from "../js/slug-engine.js";

        UI.injectStyles();
        bindConsoleLogout("logout-nav-btn", "../index.html");

        let currentGrade = "9";
        let curriculumData = {};

        // State
        const state = {
            friction: {}, // { Subject: { Chapter: [Questions] } }
            victory: {},   // { Subject: { Chapter: [Questions] } }
            subjectStats: {} // { Subject: { simple: %, medium: %, advanced: %, weakest: 'name' } }
        };

        const THEMES = {
            "Mathematics": { bg: "bg-blue-50", text: "text-blue-700", border: "border-blue-200", icon: "fa-calculator", bar: "bg-blue-500" },
            "Science": { bg: "bg-purple-50", text: "text-purple-700", border: "border-purple-200", icon: "fa-flask", bar: "bg-purple-500" },
            "Social Science": { bg: "bg-amber-50", text: "text-amber-700", border: "border-amber-200", icon: "fa-landmark", bar: "bg-amber-500" },
            "General": { bg: "bg-slate-50", text: "text-slate-700", border: "border-slate-200", icon: "fa-cubes", bar: "bg-slate-500" }
        };

        async function init(user) {
            const container = document.getElementById("mistakes-container");
            UI.showSkeleton(container);

            try {
                // 1. Load User & Curriculum
                const profile = await ensureUserInFirestore(user);
                currentGrade = profile?.classId || "9";
                document.getElementById("context-badge").textContent = `Grade ${currentGrade}`;

                curriculumData = await loadCurriculum(currentGrade);
                const engine = new SlugEngine(curriculumData);

                // 2. Fetch Data (Only quiz_scores now)
                const { db } = await getInitializedClients();

                const scoresSnap = await getDocs(query(collection(db, "quiz_scores"), where("user_id", "==", user.uid), orderBy("timestamp", "desc")));

                if (scoresSnap.empty) {
                    renderEmptyState(container);
                    return;
                }

                // 3. Process Data
                processData(scoresSnap.docs, engine);

                // 4. Render UI
                renderMissionControl(container);

            } catch (e) {
                console.error("Diagnostic Load Error:", e);
                container.innerHTML = `<div class="text-center text-red-500 font-bold p-8">System Error. Please refresh.</div>`;
            }
        }

        function processData(scoreDocs, engine) {
            const subjectScores = {};
            const topicHistory = {}; // { topic: [scoreData] }

            scoreDocs.forEach(d => {
                const data = d.data();
                const topic = data.topic || data.topicSlug;
                if (!topic) return;

                // --- Part A: Mastery Stats (using engine for context) ---
                const context = engine.getSubjectContext(topic);
                const subject = context.subject;
                const chapterName = context.chapterName;

                const score = data.score || 0;
                const difficulty = (data.difficulty || 'simple').toLowerCase();

                if (!subjectScores[subject]) {
                    subjectScores[subject] = { simple: [], medium: [], advanced: [], chapterScores: {} };
                }

                if (subjectScores[subject][difficulty]) {
                    subjectScores[subject][difficulty].push(score);
                }

                if (!subjectScores[subject].chapterScores[chapterName]) {
                    subjectScores[subject].chapterScores[chapterName] = [];
                }
                subjectScores[subject].chapterScores[chapterName].push(score);

                // --- Part B: Mistake Analysis Preparation ---
                if (!topicHistory[topic]) topicHistory[topic] = [];
                // Add necessary fields for analysis
                topicHistory[topic].push({
                    score: score,
                    mistakes: data.mistakes || [], // Ensure array
                    timestamp: data.timestamp ? data.timestamp.toDate() : new Date()
                });
            });

            // Compute Stats
            Object.keys(subjectScores).forEach(subj => {
                const s = subjectScores[subj];
                const avg = (arr) => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0;

                let weakest = "None";
                let minAvg = 101;

                Object.entries(s.chapterScores).forEach(([ch, scores]) => {
                    const chAvg = avg(scores);
                    if (chAvg < minAvg) {
                        minAvg = chAvg;
                        weakest = ch;
                    }
                });

                state.subjectStats[subj] = {
                    simple: avg(s.simple),
                    medium: avg(s.medium),
                    advanced: avg(s.advanced),
                    weakest: minAvg < 60 ? weakest : "None"
                };
            });

            // Run Analysis via Engine
            Object.entries(topicHistory).forEach(([topic, scores]) => {
                const analysis = engine.analyzeAttemptHistory(scores, topic);
                const context = engine.getSubjectContext(topic); // Reuse context logic

                if (analysis.friction.length > 0) {
                    analysis.friction.forEach(item => addToState('friction', context.subject, context.chapterName, item));
                }

                if (analysis.victory.length > 0) {
                    analysis.victory.forEach(item => addToState('victory', context.subject, context.chapterName, item));
                }
            });
        }

        function addToState(type, subject, chapter, item) {
            if (!state[type][subject]) state[type][subject] = {};
            if (!state[type][subject][chapter]) state[type][subject][chapter] = [];
            state[type][subject][chapter].push(item);
        }

        function renderMasteryOverview() {
            const subjects = ["Mathematics", "Science", "Social Science"];
            let html = `<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">`;

            subjects.forEach(sub => {
                const stats = state.subjectStats[sub] || { simple: 0, medium: 0, advanced: 0, weakest: "None" };
                const theme = THEMES[sub];

                const hSimple = Math.max(20, stats.simple) + "%";
                const hMedium = Math.max(20, stats.medium) + "%";
                const hAdv = Math.max(20, stats.advanced) + "%";

                const oSimple = Math.max(0.3, stats.simple / 100);
                const oMedium = Math.max(0.3, stats.medium / 100);
                const oAdv = Math.max(0.3, stats.advanced / 100);

                html += `
                    <div class="${theme.bg} rounded-3xl p-5 border ${theme.border} relative overflow-hidden group">
                         <!-- Header -->
                         <div class="flex justify-between items-start mb-4 relative z-10">
                            <div>
                                <h3 class="font-black ${theme.text} text-lg tracking-tight">${sub}</h3>
                                ${stats.weakest !== "None" ?
                                    `<p class="text-[10px] text-red-500 font-bold uppercase mt-1">Focus: ${stats.weakest.substring(0,15)}...</p>` :
                                    `<p class="text-[10px] text-green-600 font-bold uppercase mt-1">Strong Performance</p>`
                                }
                            </div>
                            <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-sm shadow-sm ${theme.text}">
                                <i class="fas ${theme.icon}"></i>
                            </div>
                         </div>

                         <!-- Progress Stairs -->
                         <div class="flex items-end space-x-2 h-24 mt-2 relative z-10">
                            <!-- Simple -->
                            <div class="flex-1 flex flex-col items-center group/bar">
                                <div class="w-full ${theme.bar} rounded-t-md transition-all duration-500 relative" style="height: ${hSimple}; opacity: ${oSimple}">
                                     <span class="absolute -top-6 left-1/2 -translate-x-1/2 text-[10px] font-bold text-slate-500 opacity-0 group-hover/bar:opacity-100 transition">${stats.simple}%</span>
                                </div>
                                <span class="text-[9px] font-bold text-slate-400 mt-1 uppercase">Basics</span>
                            </div>
                            <!-- Medium -->
                            <div class="flex-1 flex flex-col items-center group/bar">
                                <div class="w-full ${theme.bar} rounded-t-md transition-all duration-500 relative" style="height: ${hMedium}; opacity: ${oMedium}">
                                    <span class="absolute -top-6 left-1/2 -translate-x-1/2 text-[10px] font-bold text-slate-500 opacity-0 group-hover/bar:opacity-100 transition">${stats.medium}%</span>
                                </div>
                                <span class="text-[9px] font-bold text-slate-400 mt-1 uppercase">Std</span>
                            </div>
                            <!-- Advanced -->
                            <div class="flex-1 flex flex-col items-center group/bar">
                                <div class="w-full ${theme.bar} rounded-t-md transition-all duration-500 relative" style="height: ${hAdv}; opacity: ${oAdv}">
                                    <span class="absolute -top-6 left-1/2 -translate-x-1/2 text-[10px] font-bold text-slate-500 opacity-0 group-hover/bar:opacity-100 transition">${stats.advanced}%</span>
                                </div>
                                <span class="text-[9px] font-bold text-slate-400 mt-1 uppercase">Elite</span>
                            </div>
                         </div>

                         <!-- Decorative BG -->
                         <div class="absolute -bottom-4 -right-4 text-9xl opacity-5 text-white pointer-events-none">
                            <i class="fas ${theme.icon}"></i>
                         </div>
                    </div>
                `;
            });
            html += `</div>`;
            return html;
        }

        function renderMissionControl(container) {
            const subjects = ["Mathematics", "Science", "Social Science", "General"];
            let hasContent = false;

            const masteryHtml = renderMasteryOverview();

            let html = `
                ${masteryHtml}
                <div class="grid lg:grid-cols-3 gap-8 items-start relative">
                    <!-- Left: Subject Containers -->
                    <div class="lg:col-span-2 space-y-6">
            `;

            subjects.forEach(subject => {
                const theme = THEMES[subject] || THEMES["Science"];
                const frictionData = state.friction[subject] || {};
                const victoryData = state.victory[subject] || {};

                const frictionCount = Object.values(frictionData).reduce((a, b) => a + b.length, 0);
                const victoryCount = Object.values(victoryData).reduce((a, b) => a + b.length, 0);

                if (frictionCount === 0 && victoryCount === 0) return;

                hasContent = true;

                html += `
                    <!-- Level 1: Subject Container -->
                    <div class="${theme.bg || 'bg-slate-50'} rounded-3xl border ${theme.border || 'border-slate-200'} overflow-hidden relative group transition hover:shadow-md">
                        <!-- Subject Header -->
                        <div class="px-6 py-5 flex items-center justify-between border-b border-black/5">
                            <div class="flex items-center space-x-4">
                                <div class="w-10 h-10 rounded-xl bg-white text-lg flex items-center justify-center shadow-sm ${theme.text || 'text-slate-700'}">
                                    <i class="fas ${theme.icon || 'fa-cubes'}"></i>
                                </div>
                                <h3 class="text-lg font-black ${theme.text || 'text-slate-700'} tracking-tight">${subject}</h3>
                            </div>
                            <!-- Level 2: Category Entry Points -->
                            <div class="flex items-center space-x-6">
                                <button onclick="toggleChapterList('${subject}', 'friction')" class="text-xs font-bold text-red-600 hover:text-red-700 hover:underline flex items-center group/btn transition">
                                    <span class="w-2 h-2 bg-red-500 rounded-full mr-2 animate-pulse"></span>
                                    Persistent Friction (${frictionCount})
                                </button>
                                <button onclick="toggleChapterList('${subject}', 'victory')" class="text-xs font-bold text-green-600 hover:text-green-700 hover:underline flex items-center group/btn transition">
                                    <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span>
                                    Victory Gallery (${victoryCount})
                                </button>
                            </div>
                        </div>

                        <!-- Level 3: Chapter List (Hover-Interactive) -->
                        <div id="chapters-${subject}" class="hidden bg-white/60 backdrop-blur-sm divide-y divide-black/5 max-h-64 overflow-y-auto">
                            <!-- Injected via JS -->
                        </div>
                    </div>
                `;
            });

            html += `
                    </div>
                    <!-- Right: Diagnostic Inspector (Sticky) -->
                    <div class="lg:col-span-1 hidden lg:block sticky top-24">
                        <div id="inspector-panel" class="glass-panel rounded-3xl p-6 min-h-[400px] flex flex-col items-center justify-center text-center transition-all duration-300 border border-slate-200 shadow-sm relative overflow-hidden">
                             <!-- Radar Animation for Empty State -->
                             <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-20">
                                <div class="w-64 h-64 rounded-full border border-slate-300 relative overflow-hidden">
                                    <div class="absolute top-1/2 left-1/2 w-[50%] h-[50%] origin-top-left radar-sweep"></div>
                                </div>
                             </div>

                            <div class="relative z-10">
                                <div class="text-4xl mb-4 text-slate-300 animate-pulse">📡</div>
                                <h4 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-2">System Active</h4>
                                <p class="text-xs text-slate-500 max-w-[200px]">Hover over any chapter to run a forensic analysis.</p>
                            </div>
                        </div>
                    </div>

                    <!-- Mobile Inspector Modal -->
                    <div id="mobile-inspector" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm hidden flex items-end justify-center lg:hidden p-4 pb-8" onclick="closeMobileInspector()">
                        <div class="bg-white w-full max-w-md rounded-3xl max-h-[80vh] overflow-y-auto p-6 relative animate-slide-up" onclick="event.stopPropagation()">
                            <button onclick="closeMobileInspector()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
                            <div id="mobile-inspector-content"></div>
                        </div>
                    </div>
                </div>
            `;

            if (!hasContent) {
                renderEmptyState(container);
            } else {
                container.innerHTML = html;
            }
        }

        // Global Handlers
        window.toggleChapterList = (subject, type) => {
            const container = document.getElementById(`chapters-${subject}`);
            const isHidden = container.classList.contains('hidden');

            document.querySelectorAll('[id^="chapters-"]').forEach(el => {
                if(el.id !== `chapters-${subject}`) el.classList.add('hidden');
            });

            if (!isHidden && container.dataset.type === type) {
                container.classList.add('hidden');
            } else {
                container.classList.remove('hidden');
                container.dataset.type = type;
                renderChapters(subject, type, container);
            }
        };

        window.renderChapters = (subject, type, container) => {
            const chapters = state[type][subject] || {};
            const chapterNames = Object.keys(chapters).sort();

            if (chapterNames.length === 0) {
                container.innerHTML = `<div class="p-6 text-center text-xs text-slate-400 font-bold">No items found.</div>`;
                return;
            }

            let html = ``;
            chapterNames.forEach(chapter => {
                const count = chapters[chapter].length;
                const cleanChapter = chapter.replace(/_/g, " ");

                html += `
                    <div class="chapter-item px-6 py-4 cursor-pointer hover:bg-slate-50 transition border-l-4 border-transparent hover:border-cbse-blue group flex justify-between items-center"
                         onmouseenter="inspectChapter('${subject}', '${chapter}', '${type}')"
                         onclick="inspectChapter('${subject}', '${chapter}', '${type}', true)">
                        <span class="text-sm font-bold text-slate-700 group-hover:text-cbse-blue transition">${cleanChapter}</span>
                        <span class="text-[10px] font-black bg-slate-100 text-slate-500 px-2 py-1 rounded-md group-hover:bg-blue-100 group-hover:text-blue-600 transition">${count}</span>
                    </div>
                `;
            });
            container.innerHTML = html;
        };

        window.inspectChapter = (subject, chapter, type, isClick = false) => {
            const questions = state[type][subject][chapter];
            const cleanChapter = chapter.replace(/_/g, " ");
            const isFriction = type === 'friction';

            let contentHtml = `
                <div class="w-full text-left animate-fade-in relative z-20">
                    <div class="mb-6 pb-4 border-b border-slate-100">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-[10px] font-black uppercase tracking-widest ${isFriction ? 'text-red-500' : 'text-green-500'}">${isFriction ? 'Persistent Friction' : 'Victory Gallery'}</span>
                            <span class="bg-slate-100 text-slate-600 text-[10px] font-bold px-2 py-0.5 rounded">${questions.length} Items</span>
                        </div>
                        <h3 class="text-xl font-black text-slate-800 leading-tight">${cleanChapter}</h3>
                    </div>
                    <div class="space-y-4">
            `;

            questions.forEach(q => {
                let heatDotsHtml = '';
                if (isFriction && q.timestamps) {
                    const count = Math.min(q.timestamps.length, 5);
                    for(let i=0; i<count; i++) {
                        heatDotsHtml += `<span class="heat-dot high"></span>`;
                    }
                }

                contentHtml += `
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 hover:border-slate-200 transition relative group/card">
                        <div class="absolute left-0 top-4 bottom-4 w-1 ${isFriction ? 'bg-red-400' : 'bg-green-400'} rounded-r-full"></div>
                        <p class="text-xs font-medium text-slate-700 mb-3 pl-3 leading-relaxed select-text">${cleanKatexMarkers(q.text)}</p>

                        <div class="pl-3 flex items-center justify-between border-t border-slate-200/50 pt-2">
                            ${isFriction ? `
                                <div class="flex flex-col">
                                    <div class="flex items-center space-x-1 mb-1">
                                        ${heatDotsHtml}
                                    </div>
                                    <span class="text-[9px] text-slate-400 font-bold uppercase tracking-wide">Last: ${q.timestamps && q.timestamps[0] instanceof Date ? q.timestamps[0].toDateString().substring(4,10) : 'Unknown'}</span>
                                </div>
                                <a href="../study-content.html?grade=${currentGrade}&topic=${q.topic}" class="text-[9px] bg-white border border-red-100 text-red-600 px-3 py-1.5 rounded-lg font-black hover:bg-red-50 transition uppercase tracking-wide shadow-sm">
                                    Master Concept
                                </a>
                            ` : `
                                <div class="text-[9px] text-green-600 font-bold flex flex-col">
                                    <span class="opacity-70 uppercase tracking-wide">Badge</span>
                                    <span>🏆 Mastered: ${q.masteryDate}</span>
                                </div>
                                <span class="text-[9px] text-green-600 opacity-60 font-medium italic">Previously struggled</span>
                            `}
                        </div>
                    </div>
                `;
            });
            contentHtml += `</div></div>`;

            const inspector = document.getElementById('inspector-panel');
            if (inspector) {
                document.querySelectorAll('.chapter-item').forEach(el => el.classList.remove('active-chapter'));
                inspector.innerHTML = contentHtml;
                inspector.classList.remove('items-center', 'justify-center', 'text-center');
                inspector.classList.add('items-start', 'justify-start', 'text-left');
            }

            if (window.innerWidth < 1024 && isClick) {
                const mobileModal = document.getElementById('mobile-inspector');
                const mobileContent = document.getElementById('mobile-inspector-content');
                mobileContent.innerHTML = contentHtml;
                mobileModal.classList.remove('hidden');
            }
        };

        window.closeMobileInspector = () => {
            document.getElementById('mobile-inspector').classList.add('hidden');
        };

        function renderEmptyState(container) {
            container.innerHTML = `
                <div class="glass-panel p-12 rounded-3xl text-center max-w-2xl mx-auto mt-12">
                    <div class="text-6xl mb-6">🎉</div>
                    <h3 class="text-2xl font-black text-slate-700 mb-2">Diagnostic Clean!</h3>
                    <p class="text-slate-500 font-medium">No persistent friction points detected.</p>
                    <a href="consoles/student.html" class="inline-block mt-6 px-6 py-3 bg-cbse-blue text-white rounded-xl font-bold hover:bg-blue-800 transition">Go to Dashboard</a>
                </div>
            `;
        }

        initializeAuthListener(async (user) => {
            if (user) {
                document.getElementById("user-welcome").textContent = user.displayName || "Scholar";
                await init(user);
            } else {
                window.location.href = "../index.html";
            }
        });
    </script>
</head>
<body class="bg-cbse-light min-h-screen flex flex-col">

    <!-- Glass Header -->
    <header class="glass-panel sticky top-0 z-50 flex justify-between items-center py-4 px-6 border-b border-white/20 backdrop-blur-md bg-white/80">
      <div class="flex items-center space-x-4">
        <a href="../index.html" class="w-10 h-10 flex items-center justify-center bg-white text-cbse-blue font-bold rounded-2xl shadow-sm hover:scale-105 transition active:scale-95 text-lg">🏠</a>
        <div>
          <h2 class="text-xl font-black text-cbse-blue leading-none tracking-tight">Mistake<span class="text-danger-red">Book</span></h2>
          <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Mission Control</p>
        </div>
      </div>

      <div class="flex items-center space-x-3">
          <div class="hidden md:flex flex-col items-end mr-2">
              <span id="user-welcome" class="text-xs font-bold text-slate-700">Student</span>
              <span id="context-badge" class="text-[10px] font-black text-white bg-cbse-blue px-2 py-0.5 rounded uppercase tracking-wide">Grade --</span>
          </div>
          <div class="w-10 h-10 rounded-2xl bg-red-100 text-danger-red flex items-center justify-center text-lg">🧠</div>
          <button id="logout-nav-btn" class="w-10 h-10 flex items-center justify-center bg-red-50 text-red-500 rounded-2xl hover:bg-red-500 hover:text-white transition shadow-sm">🚪</button>
      </div>
    </header>

    <div class="flex-grow max-w-7xl mx-auto w-full p-4 md:p-8 fade-in">
        <div class="mb-8">
             <a href="consoles/student.html" class="inline-flex items-center gap-2 text-slate-400 hover:text-cbse-blue font-bold text-sm transition group">
                <i class="fas fa-arrow-left group-hover:-translate-x-1 transition"></i> Back to Hub
            </a>
        </div>

        <div id="mistakes-container">
            <!-- Dynamic Content -->
