<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mistake Notebook — Ready4Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily:{ sans:['Inter','sans-serif'] },
          colors:{
            'cbse-blue':'#1a3e6a',
            'cbse-light':'#f5f7fa',
            'accent-gold':'#ffb703',
            'success-green': '#16a34a',
            'warning-yellow': '#ca8a04',
            'danger-red': '#dc2626'
          }
        }
      }
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body{font-family:'Inter',sans-serif;}
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <script src="../js/firebase-master-config.js"></script>
    <script src="../js/config.js" type="module"></script>

    <script type="module">
        import { initializeAuthListener, ensureUserInFirestore } from "../js/auth-paywall.js";
        import { getInitializedClients } from "../js/api.js";
        import { bindConsoleLogout } from "../js/guard.js";
        import { collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { cleanKatexMarkers } from "../js/utils.js";
        import * as UI from "../js/ui-renderer.js";
        import { SlugEngine } from "../js/slug-engine.js";
        import { loadCurriculum } from "../js/curriculum/loader.js";

        UI.injectStyles();
        bindConsoleLogout("logout-nav-btn", "../index.html");

        let slugEngine;
        let userGrade = "9"; // Default

        async function loadMistakeBook(user) {
            const container = document.getElementById("mistakes-container");
            UI.showSkeleton(container); // While loading

            try {
                const { db } = await getInitializedClients();

                // 1. Fetch User Data & Curriculum
                const profile = await ensureUserInFirestore(user);
                userGrade = profile?.classId || "9";
                document.getElementById("context-badge").textContent = `Grade ${userGrade}`;

                const curriculum = await loadCurriculum(userGrade);
                slugEngine = new SlugEngine(curriculum);

                // 2. Fetch Data (Parallel)
                const mistakesQ = query(
                    collection(db, "mistake_notebook"),
                    where("user_id", "==", user.uid),
                    orderBy("timestamp", "desc")
                );

                const scoresQ = query(
                    collection(db, "quiz_scores"),
                    where("user_id", "==", user.uid),
                    orderBy("timestamp", "desc")
                );

                const [mistakesSnap, scoresSnap] = await Promise.all([
                    getDocs(mistakesQ),
                    getDocs(scoresQ)
                ]);

                if (mistakesSnap.empty && scoresSnap.empty) {
                    renderEmptyState(container);
                    return;
                }

                const allMistakes = mistakesSnap.docs.map(d => ({...d.data(), id: d.id})); // Doc ID not question ID
                const allScores = scoresSnap.docs.map(d => ({...d.data(), id: d.id}));

                renderDashboard(container, allMistakes, allScores);

            } catch (e) {
                console.error("Mistake Book Error:", e);
                container.innerHTML = `<div class="text-center text-red-500 font-bold p-8">Failed to load data. Please refresh.</div>`;
            }
        }

        function renderEmptyState(container) {
            container.innerHTML = `
                <div class="glass-panel p-12 rounded-3xl text-center max-w-2xl mx-auto mt-12">
                    <div class="text-6xl mb-6">🎉</div>
                    <h3 class="text-2xl font-black text-slate-700 mb-2">Clean Sheet!</h3>
                    <p class="text-slate-500 font-medium">No mistakes recorded yet. Start a quiz to populate your diagnostic notebook.</p>
                    <a href="consoles/student.html" class="inline-block mt-6 px-6 py-3 bg-cbse-blue text-white rounded-xl font-bold hover:bg-blue-800 transition">Go to Dashboard</a>
                </div>
            `;
        }

        function renderDashboard(container, allMistakes, allScores) {
            // Group mistakes by Topic
            // We need unique topics to iterate.
            const uniqueTopics = [...new Set([
                ...allMistakes.map(m => m.topic || m.chapter_slug),
                ...allScores.map(s => s.topic || s.topicSlug)
            ])].filter(Boolean);

            // --- Layer 1: Success Shield ---
            const trafficStats = { mcq: 0, ar: 0, case: 0 };
            // We'll just count TOTAL mistakes by type as a proxy for "Area of Concern"
            // Since we don't have total attempts per type easily without parsing all questions.

            let totalFrictionItems = 0;
            let totalGainsItems = 0;
            let frictionList = [];
            let gainsList = [];

            // Process each topic
            uniqueTopics.forEach(topic => {
                const analysis = slugEngine.analyzeAttemptHistory(allScores, allMistakes, topic);
                const ctx = slugEngine.getSubjectContext(topic);

                // Aggregate Friction & Gains
                if (analysis.friction.length > 0) {
                    analysis.friction.forEach(item => {
                        frictionList.push({ ...item, context: ctx, topic: topic });
                        const type = slugEngine.getQuestionType(item);
                        if(type.includes("Logic")) trafficStats.ar++;
                        else if(type.includes("Application")) trafficStats.case++;
                        else trafficStats.mcq++;
                    });
                }

                if (analysis.gains.length > 0) {
                    analysis.gains.forEach(item => {
                        gainsList.push({ ...item, context: ctx, topic: topic });
                    });
                }
            });

            totalFrictionItems = frictionList.length;
            totalGainsItems = gainsList.length;

            let html = `
                <!-- Layer 1: Success Shield -->
                <div class="grid md:grid-cols-3 gap-6 mb-8">
                    <!-- Motivation -->
                    <div class="col-span-2 glass-panel p-6 rounded-3xl relative overflow-hidden">
                         <div class="absolute top-0 right-0 w-32 h-32 bg-yellow-100 rounded-full blur-3xl -mr-16 -mt-16 opacity-50"></div>
                         <h3 class="text-lg font-black text-slate-700 mb-2"><i class="fas fa-shield-alt text-cbse-blue mr-2"></i>Remediation Status</h3>
                         <div class="flex items-center space-x-4">
                             <div class="text-4xl font-black ${totalGainsItems > 0 ? 'text-success-green' : 'text-slate-300'}">
                                 ${totalGainsItems > 0 ? `+${totalGainsItems}` : '0'}
                             </div>
                             <div class="text-sm font-medium text-slate-500 leading-tight">
                                 Questions mastered<br>since last attempt.
                                 ${totalGainsItems > 0 ? '<span class="text-success-green font-bold block">Keep it up! 🚀</span>' : ''}
                             </div>
                         </div>
                    </div>

                    <!-- Skill Traffic Lights -->
                    <div class="glass-panel p-6 rounded-3xl flex flex-col justify-between">
                        <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Error Profile</h4>
                        <div class="flex justify-between items-end">
                            ${renderTrafficLight("MCQ", trafficStats.mcq, "Recall")}
                            ${renderTrafficLight("Logic", trafficStats.ar, "A/R")}
                            ${renderTrafficLight("App", trafficStats.case, "Case")}
                        </div>
                    </div>
                </div>

                <!-- Layer 2: Subject Mastery Panels -->
                <div class="grid md:grid-cols-3 gap-6 mb-8">
                    ${renderMasteryCard("Mathematics", "bg-blue-50", "text-blue-700", allScores)}
                    ${renderMasteryCard("Science", "bg-purple-50", "text-purple-700", allScores)}
                    ${renderMasteryCard("Social Science", "bg-amber-50", "text-amber-700", allScores)}
                </div>

                <!-- Layer 3: Friction & Growth -->
                <div class="grid md:grid-cols-2 gap-8">
                    <!-- Persistent Friction -->
                    <div>
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-black text-slate-800 text-lg flex items-center">
                                <span class="w-2 h-8 bg-danger-red rounded-full mr-3"></span>
                                Persistent Friction
                            </h3>
                            <span class="bg-red-100 text-danger-red text-xs font-bold px-2 py-1 rounded-lg">${totalFrictionItems} Issues</span>
                        </div>
                        <div class="space-y-4">
                            ${frictionList.length === 0 ? renderEmptyList("No persistent errors found!") : frictionList.map(item => renderFrictionCard(item)).join('')}
                        </div>
                    </div>

                    <!-- Victory Gallery -->
                    <div>
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-black text-slate-800 text-lg flex items-center">
                                <span class="w-2 h-8 bg-success-green rounded-full mr-3"></span>
                                Victory Gallery
                            </h3>
                            <span class="bg-green-100 text-success-green text-xs font-bold px-2 py-1 rounded-lg">${totalGainsItems} Wins</span>
                        </div>
                        <div class="space-y-4">
                            ${gainsList.length === 0 ? renderEmptyList("Review more mistakes to see gains here!") : gainsList.map(item => renderVictoryCard(item)).join('')}
                        </div>
                    </div>
                </div>
            `;

            container.innerHTML = html;
        }

        function renderTrafficLight(label, count, sub) {
            // Logic: High errors -> Red, Med -> Yellow, Low -> Green
            // Thresholds are arbitrary for now.
            let color = "bg-green-500";
            if (count > 5) color = "bg-red-500";
            else if (count > 2) color = "bg-yellow-400";
            else if (count === 0) color = "bg-slate-200"; // No data

            return `
                <div class="flex flex-col items-center">
                    <div class="w-3 h-3 rounded-full ${color} mb-2 shadow-[0_0_10px_rgba(0,0,0,0.1)]"></div>
                    <span class="text-[10px] font-black text-slate-600 uppercase">${label}</span>
                    <span class="text-[9px] text-slate-400">${count} errs</span>
                </div>
            `;
        }

        function renderMasteryCard(subject, bgClass, textClass, allScores) {
            // Filter scores for subject
            const subScores = allScores.filter(s => {
                const ctx = slugEngine.getSubjectContext(s.topic || s.topicSlug);
                return ctx.subject === subject;
            });

            // Calculate Mastery per difficulty
            const getAvg = (diff) => {
                const filtered = subScores.filter(s => (s.difficulty || "Simple") === diff);
                if (!filtered.length) return 0;
                const total = filtered.reduce((acc, s) => acc + (s.percentage || s.score_percent || 0), 0);
                return Math.round(total / filtered.length);
            };

            const simple = getAvg("Simple");
            const medium = getAvg("Medium");
            const advanced = getAvg("Advanced");

            // Strength/Weakness (Analyze Simple scores by Section)
            // Group by Section
            const sections = {};
            subScores.filter(s => (s.difficulty || "Simple") === "Simple").forEach(s => {
                const ctx = slugEngine.getSubjectContext(s.topic || s.topicSlug);
                if (!sections[ctx.section]) sections[ctx.section] = { total: 0, count: 0 };
                sections[ctx.section].total += (s.percentage || 0);
                sections[ctx.section].count++;
            });

            let strong = "-";
            let weak = "-";
            let best = -1;
            let worst = 101;

            Object.entries(sections).forEach(([sec, data]) => {
                const avg = data.total / data.count;
                if (avg > best) { best = avg; strong = sec; }
                if (avg < worst) { worst = avg; weak = sec; }
            });

            if (Object.keys(sections).length < 2) { weak = ""; } // Don't show weak if only 1 section

            return `
                <div class="${bgClass} p-6 rounded-3xl border border-white/50 relative overflow-hidden group hover:shadow-lg transition">
                    <h4 class="font-black ${textClass} text-lg mb-4">${subject}</h4>

                    <!-- Progress Stairs -->
                    <div class="flex items-end space-x-2 h-16 mb-4">
                        <div class="flex-1 flex flex-col justify-end group/bar">
                             <div class="w-full bg-white/50 rounded-t-lg relative transition-all duration-500 group-hover/bar:bg-white/80" style="height: ${Math.max(20, simple)}%">
                                 ${simple >= 95 ? '<div class="absolute top-1 right-1 text-[8px] opacity-50">★</div>' : ''}
                             </div>
                             <span class="text-[9px] font-bold text-slate-400 mt-1 text-center">Basics</span>
                        </div>
                        <div class="flex-1 flex flex-col justify-end group/bar">
                             <div class="w-full bg-white/40 rounded-t-lg relative transition-all duration-500 group-hover/bar:bg-white/70" style="height: ${Math.max(20, medium)}%"></div>
                             <span class="text-[9px] font-bold text-slate-400 mt-1 text-center">Standard</span>
                        </div>
                        <div class="flex-1 flex flex-col justify-end group/bar">
                             <div class="w-full bg-white/20 rounded-t-lg relative transition-all duration-500 group-hover/bar:bg-white/60" style="height: ${Math.max(20, advanced)}%"></div>
                             <span class="text-[9px] font-bold text-slate-400 mt-1 text-center">Elite</span>
                        </div>
                    </div>

                    <div class="text-[10px] text-slate-500 font-medium border-t border-black/5 pt-3 flex justify-between">
                         <span>Strong: <span class="font-bold text-slate-700">${strong}</span></span>
                         ${weak ? `<span>Focus: <span class="font-bold text-red-400">${weak}</span></span>` : ''}
                    </div>
                </div>
            `;
        }

        function renderFrictionCard(item) {
            const ctx = item.context;
            const qType = slugEngine.getQuestionType(item);

            // Generate link to study content
            // Assuming we can map slug to chapter. Ideally we'd have exact chapter slug.
            // item.topic is likely the topicSlug used in `study-content.html`.
            // Check `study-content.html` logic: it takes `grade`, `subject`, `chapter`.
            // `chapter` param usually expects the chapter title or ID.

            const studyLink = `study-content.html?grade=${userGrade}&subject=${encodeURIComponent(ctx.subject)}&chapter=${encodeURIComponent(ctx.chapterTitle)}`;

            return `
                <div class="bg-white p-5 rounded-2xl border-l-4 border-danger-red shadow-sm hover:shadow-md transition group relative">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-wider">${ctx.chapterTitle} • ${qType}</span>
                        <a href="${studyLink}" class="text-[10px] font-bold text-cbse-blue bg-blue-50 px-2 py-1 rounded hover:bg-cbse-blue hover:text-white transition">
                            <i class="fas fa-microscope mr-1"></i> Research
                        </a>
                    </div>
                    <p class="text-sm font-bold text-slate-800 leading-snug mb-3">${cleanKatexMarkers(item.question)}</p>

                    <div class="p-3 bg-red-50 rounded-lg text-xs border border-red-100 mb-2">
                        <span class="font-bold text-red-800">Your Answer:</span> <span class="text-red-700">${item.selected}</span>
                    </div>
                    <div class="text-[10px] text-slate-400 font-medium line-clamp-2">
                        Correct: ${item.correct}
                    </div>
                </div>
            `;
        }

        function renderVictoryCard(item) {
            const ctx = item.context;
            return `
                <div class="bg-white p-5 rounded-2xl border-l-4 border-success-green shadow-sm hover:shadow-md transition opacity-80 hover:opacity-100">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-wider">${ctx.chapterTitle}</span>
                        <span class="text-success-green text-xs font-bold"><i class="fas fa-check-circle"></i> Mastered</span>
                    </div>
                    <p class="text-sm font-medium text-slate-600 leading-snug line-through decoration-success-green/50 decoration-2">${cleanKatexMarkers(item.question)}</p>
                </div>
            `;
        }

        function renderEmptyList(msg) {
            return `
                <div class="p-8 text-center border-2 border-dashed border-slate-200 rounded-2xl">
                    <p class="text-xs font-bold text-slate-400">${msg}</p>
                </div>
            `;
        }

        // Init
        initializeAuthListener(async (user) => {
            if (user) {
                const displayName = user.displayName || "Scholar";
                document.getElementById("user-welcome").textContent = displayName;
                await loadMistakeBook(user);
            } else {
                window.location.href = "../index.html";
            }
        });
    </script>
</head>
<body class="bg-cbse-light min-h-screen flex flex-col">

    <!-- Glass Header -->
    <header class="glass-panel sticky top-0 z-50 flex justify-between items-center py-4 px-6 border-b border-white/20">
      <div class="flex items-center space-x-4">
        <a href="../index.html" class="w-10 h-10 flex items-center justify-center bg-white text-cbse-blue font-bold rounded-2xl shadow-sm hover:scale-105 transition active:scale-95 text-lg">🏠</a>
        <div>
          <h2 class="text-xl font-black text-cbse-blue leading-none tracking-tight">Mistake<span class="text-danger-red">Book</span></h2>
          <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Remediation Engine</p>
        </div>
      </div>

      <div class="flex items-center space-x-3">
          <div class="hidden md:flex flex-col items-end mr-2">
              <span id="user-welcome" class="text-xs font-bold text-slate-700">Student</span>
              <span id="context-badge" class="text-[10px] font-black text-white bg-cbse-blue px-2 py-0.5 rounded uppercase tracking-wide">Grade --</span>
          </div>
          <div class="w-10 h-10 rounded-2xl bg-red-100 text-danger-red flex items-center justify-center text-lg">🧠</div>
          <button id="logout-nav-btn" class="w-10 h-10 flex items-center justify-center bg-red-50 text-red-500 rounded-2xl hover:bg-red-500 hover:text-white transition shadow-sm">🚪</button>
      </div>
    </header>

    <div class="flex-grow max-w-6xl mx-auto w-full p-4 md:p-8 fade-in">
        <div class="mb-8">
             <a href="consoles/student.html" class="inline-flex items-center gap-2 text-slate-400 hover:text-cbse-blue font-bold text-sm transition group">
                <i class="fas fa-arrow-left group-hover:-translate-x-1 transition"></i> Back to Hub
            </a>
        </div>

        <div id="mistakes-container">
            <!-- Dynamic Content -->
        </div>
    </div>

    <footer class="bg-cbse-blue text-white/50 text-[10px] md:text-xs text-center py-8 mt-auto border-t border-white/5">
      <p class="font-medium tracking-wide">Powered by Ready4Exam AI</p>
      <p class="mt-1 opacity-70">© 2025 Academic Portal</p>
    </footer>

</body>
</html>
