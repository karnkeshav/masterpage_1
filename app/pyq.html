<script type="module">
import { guardConsole, bindConsoleLogout } from "../js/guard.js";
import { getInitializedClients } from "../js/config.js";
import { collection, query, where, getDocs, orderBy, getDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
import * as UI from "../js/ui-renderer.js";
import { loadCurriculum } from "../js/curriculum/loader.js";

UI.injectStyles();
bindConsoleLogout("logout-nav-btn", "../index.html");
guardConsole("student");

let currentVaultData = [];
let activeYear = "All";
let activeSubject = "All";
let activeType = "all";
let activeSet = "all";
let searchQuery = "";
let isHeatmapActive = false;

window.loadConsoleData = async (profile) => {
    console.log("Loading PYQ Vault for:", profile.displayName);
    document.getElementById("user-welcome").textContent = (profile.displayName || "Student");

    let grade = "9";
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get("grade")) grade = urlParams.get("grade");
    else if (profile.classId) grade = profile.classId;
    else if (profile.grade) grade = profile.grade;
    else if (profile.class_id) grade = profile.class_id;

    document.getElementById("context-badge").textContent = `Grade ${grade}`;

    // Initialize UI Elements
    setupYearRibbon();
   await setupSubjectFilters(profile, grade);
    setupEventListeners();

await loadPyqVault(grade, "All");
};

function setupYearRibbon() {
    const container = document.getElementById("year-ribbon");
    
    // Remove horizontal scroll and center/wrap the items
    container.className = "flex flex-wrap gap-4 justify-center md:justify-start pb-4";
    container.style.overflowX = "visible"; // Explicitly disable horizontal scroll
    
    container.innerHTML = "";

    // Restrict range: 2026 down to 2022
    for (let year = 2026; year >= 2022; year--) {
        const yearStr = year.toString();
        
        // Status Signal Logic (retained from existing setup)
        const papersForYear = currentVaultData.filter(d => d.year === yearStr);
        const subjectsFound = [...new Set(papersForYear.map(p => p.subject))];
        
        let statusHtml = "";
        if (papersForYear.length > 0) {
            // Signal: Green for 3+ subjects (Full), Amber for less (Partial)
            const color = subjectsFound.length >= 3 ? "bg-success-green" : "bg-warning-yellow";
            statusHtml = `<span class="absolute -top-1 -right-1 w-3 h-3 rounded-full border-2 border-white ${color} shadow-sm"></span>`;
        }

        const pill = document.createElement("button");
        const isActive = activeYear === yearStr;
        
        // Retaining your high-quality glass-panel styling
        pill.className = `year-pill relative px-6 py-2.5 rounded-xl text-sm font-bold transition-all shadow-sm ${
            isActive 
            ? 'bg-cbse-blue text-white ring-2 ring-cbse-blue/20 scale-105' 
            : 'bg-white text-slate-500 border border-slate-200 hover:border-cbse-blue hover:text-cbse-blue'
        }`;
        
        pill.innerHTML = `
            ${yearStr}
            ${statusHtml}
        `;
        
        pill.onclick = () => filterByYear(yearStr, pill);
        container.appendChild(pill);
    }
}

async function setupSubjectFilters(profile, grade) {
    const container = document.getElementById("subject-filters");
    container.innerHTML = ""; // Clear existing filters

    let subjects = [];

    // 1. Priority: Use the disciplines mapped to the student's profile (Commerce/Science/Humanities)
    if (profile && profile.mapped_disciplines && profile.mapped_disciplines.length > 0) {
        subjects = profile.mapped_disciplines;
    } else {
        // 2. Fallback: Load from the curriculum loader based on Grade
        try {
            const curriculum = await loadCurriculum(grade);
            if (curriculum) subjects = Object.keys(curriculum);
        } catch (e) {
            console.error("Failed to load dynamic subjects:", e);
            subjects = ["Science", "Mathematics", "Social Science", ]; // Hard fallback
        }
    }

    // "All Subjects" removed per requirement.
    // Set the first subject as the active default if not already set.
    if (subjects.length > 0 && activeSubject === "All") {
        activeSubject = subjects[0];
    }

    subjects.forEach(subject => {
        const pill = document.createElement("button");
        const isActive = activeSubject === subject;
        
        pill.className = `subject-pill px-3 py-1.5 rounded-lg text-xs font-bold transition-all shadow-sm ${
            isActive 
            ? 'bg-cbse-blue text-white' 
            : 'bg-slate-50 text-slate-500 border border-slate-200 hover:bg-slate-100'
        }`;
        
        pill.textContent = subject;
        pill.onclick = () => filterBySubject(subject, pill);
        container.appendChild(pill);
    });
}

function setupEventListeners() {
    document.getElementById("filter-type").addEventListener("change", (e) => {
        activeType = e.target.value;
        renderGrid();
    });

    document.getElementById("filter-set").addEventListener("change", (e) => {
        activeSet = e.target.value;
        renderGrid();
    });

    document.getElementById("vault-search").addEventListener("input", (e) => {
        searchQuery = e.target.value.toLowerCase();
        renderGrid();
    });

    const heatmapBtn = document.getElementById("toggle-heatmap");
    heatmapBtn.addEventListener("click", () => {
        isHeatmapActive = !isHeatmapActive;
        if(isHeatmapActive) {
            heatmapBtn.classList.add("ring-2", "ring-orange-400", "scale-95");
        } else {
            heatmapBtn.classList.remove("ring-2", "ring-orange-400", "scale-95");
        }
        renderGrid();
    });
}

function filterByYear(year, clickedPill) {
    activeYear = year;
    document.querySelectorAll(".year-pill").forEach(p => {
        p.classList.remove("bg-cbse-blue", "text-white", "shadow-md");
        p.classList.add("bg-white", "text-slate-500", "border", "border-slate-200");
    });
    clickedPill.classList.remove("bg-white", "text-slate-500", "border", "border-slate-200");
    clickedPill.classList.add("bg-cbse-blue", "text-white", "shadow-md");
    renderGrid();
}

function filterBySubject(subject, clickedPill) {
    activeSubject = subject;
    document.querySelectorAll(".subject-pill").forEach(p => {
        p.classList.remove("bg-cbse-blue", "text-white", "shadow-sm");
        p.classList.add("bg-slate-50", "text-slate-500", "border", "border-slate-200");
    });
    clickedPill.classList.remove("bg-slate-50", "text-slate-500", "border", "border-slate-200");
    clickedPill.classList.add("bg-cbse-blue", "text-white", "shadow-sm");
    renderGrid();
}



     window.openPdfModal = (url, title) => {
    if (!url || url === "#") {
        alert("Document not available yet");
        return;
    }

    document.getElementById("pdf-modal-title").textContent = title || "Document";

    document.getElementById("pdf-iframe").src =
        `https://docs.google.com/gview?url=${encodeURIComponent(url)}&embedded=true`;

    document.getElementById("pdf-loading").classList.remove("hidden");
    document.getElementById("pdf-modal").classList.remove("hidden");
};

        window.closePdfModal = () => {
            document.getElementById("pdf-modal").classList.add("hidden");
            document.getElementById("pdf-iframe").src = "";
        };
    
async function loadPyqVault(grade, subject) {
    try {
        const { automationDB } = await getInitializedClients();
        if (!automationDB) return;

        // 1. Normalize Subject for the Query (Matches your DB Screenshot)
        let querySubject = subject;
        if (subject === "Maths" || subject === "Math" || subject === "Mathematics") {
            querySubject = "Mathematics";
        }

        // 2. Build Query
        let q;
        if (querySubject === "All") {
            q = query(collection(automationDB, "Ready4Exam_Vault"), 
                where("grade", "==", grade.toString()));
        } else {
            q = query(collection(automationDB, "Ready4Exam_Vault"), 
                where("grade", "==", grade.toString()), 
                where("subject", "==", querySubject));
        }

        // 3. Execute and Store Data
        const snapshot = await getDocs(q);
        currentVaultData = []; // Clear old data
        
        snapshot.forEach((doc) => {
            const data = doc.data();
            // Map the screenshot fields (qp_url, ms_url) to the local array
            currentVaultData.push({
                id: doc.id,
                ...data,
                // Ensure these exist for the renderGrid logic
                year: data.year || "2022",
                subject: data.subject || "Mathematics",
                type: data.type || "board", // default if missing
                set: data.set || "1"        // default if missing
            });
        });

        // 4. Update UI
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        
        updateMasteryGauge();
        renderGrid();

    } catch (error) {
        console.error("Vault Load Error:", error);
    }
}function updateMasteryGauge() {
    // Calculate unique years covered in current data vs total decade (10)
    const uniqueYears = new Set(currentVaultData.map(d => d.year)).size;
    let percentage = Math.min(Math.round((uniqueYears / 10) * 100), 100);

    document.getElementById("mastery-percentage").textContent = `${percentage}%`;
    document.getElementById("mastery-bar").style.width = `${percentage}%`;
    document.getElementById("mastery-text").textContent = `You have explored ${percentage}% of the last 10 years papers`;
}

function renderGrid() {
    const grid = document.getElementById("pdf-grid");
    const noMsg = document.getElementById("no-pyq-msg");
    grid.innerHTML = "";

    const filteredData = currentVaultData.filter(item => {
        // 1. Year Filter (Constraint: 2026-2022)
        const matchYear = activeYear === "All" || item.year === activeYear;

        // 2. Subject Mapping (Strictly matching "Mathematics" from DB)
        let itemSubject = item.subject || "";
        let targetSubject = activeSubject;
        if (["Math", "Maths", "Mathematics"].includes(targetSubject)) targetSubject = "Mathematics";
        const matchSubject = itemSubject === targetSubject;

        // 3. Paper Type Filter (Board vs Compartment)
        const matchType = activeType === "all" || item.type === activeType;

        // 4. Set Extraction Logic (Extracts last digit from code like "30_4_1")
        const extractedSet = item.code ? item.code.split('_').pop() : "1";
        const matchSet = activeSet === "all" || extractedSet === activeSet;

        // 5. Search Logic
        const matchSearch = searchQuery === "" || 
            (item.code && item.code.toLowerCase().includes(searchQuery));

        return matchYear && matchSubject && matchType && matchSet && matchSearch;
    });

    if (filteredData.length === 0) {
        grid.classList.add("hidden");
        noMsg.classList.remove("hidden");
        return;
    }

    grid.classList.remove("hidden");
    noMsg.classList.add("hidden");

    filteredData.forEach(item => {
        const displaySet = item.code ? item.code.split('_').pop() : "1";
        const typeLabel = item.type === 'board' ? 'Board Final' : 'Compartment';

        const cardHTML = `
            <div class="group relative bg-white rounded-2xl border border-slate-100 p-5 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col h-full overflow-hidden">
                <div class="flex justify-between items-start mb-4 relative z-10">
                    <span class="px-3 py-1 bg-indigo-50 text-cbse-blue text-xs font-black rounded-lg shadow-sm">${item.year}</span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-slate-50 px-2 py-0.5 rounded">${typeLabel}</span>
                </div>

                <div class="flex-grow flex flex-col items-center justify-center text-center py-4 group-hover:scale-105 transition-transform duration-300">
                    <div class="w-16 h-16 bg-red-50 rounded-2xl flex items-center justify-center text-red-500 text-3xl mb-3 shadow-sm group-hover:bg-red-500 group-hover:text-white transition-colors">
                        <i class="fas fa-file-pdf"></i>
                    </div>
                    <h4 class="font-bold text-slate-800 text-sm leading-tight mb-1">${item.code || "Document"}</h4>
                    <p class="text-xs text-slate-500 font-medium">${item.subject} • Set ${displaySet}</p>
                </div>

                <div class="mt-4 pt-4 border-t border-slate-50 grid grid-cols-2 gap-2 relative z-10">
                    <button onclick="window.openPdfModal('${item.qp_url}', '${item.code} Paper')" 
                            class="py-2 text-[10px] font-bold text-slate-600 bg-slate-50 rounded-xl hover:bg-cbse-blue hover:text-white transition-colors flex items-center justify-center">
                        <i class="fas fa-eye mr-1"></i> Paper
                    </button>
                    <button onclick="window.openPdfModal('${item.ms_url}', '${item.code} Scheme')" 
                            class="py-2 text-[10px] font-bold text-cbse-blue bg-indigo-50 rounded-xl hover:bg-indigo-100 transition-colors flex items-center justify-center">
                        <i class="fas fa-check mr-1"></i> Scheme
                    </button>
                </div>
            </div>
        `;
        grid.insertAdjacentHTML('beforeend', cardHTML);
    });
}
        const matchSubject = targetSubject === "All" || itemSubject === targetSubject;
        const matchType = activeType === "all" || item.type === activeType;
        const matchSet = activeSet === "all" || item.set === activeSet;
        const matchSearch = searchQuery === "" ||
            (item.title && item.title.toLowerCase().includes(searchQuery)) ||
            (item.subject && item.subject.toLowerCase().includes(searchQuery));

        return matchYear && matchSubject && matchType && matchSet && matchSearch;
    });

    if (filteredData.length === 0) {
        grid.classList.add("hidden");
        noMsg.classList.remove("hidden");
        return;
    }

    grid.classList.remove("hidden");
    noMsg.classList.add("hidden");

    filteredData.forEach(item => {
        const heatmapStyle = (isHeatmapActive && item.priority && item.priority > 80) ? "ring-2 ring-orange-400 shadow-orange-100" : "border-slate-100";
        const typeLabel = item.type === 'board' ? 'Board Final' : (item.type === 'marking' ? 'Marking Scheme' : 'Compartment');

        const cardHTML = `
            <div class="group relative bg-white rounded-2xl border ${heatmapStyle} p-5 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col h-full overflow-hidden">
                ${item.solved ? `
                <div class="absolute -right-6 -top-6 w-16 h-16 bg-success-green/10 rounded-full flex items-end justify-start p-3">
                    <i class="fas fa-check-circle text-success-green text-lg bg-white rounded-full"></i>
                </div>
                ` : ''}

                ${isHeatmapActive && item.priority > 80 ? `
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-orange-400 to-red-500"></div>
                ` : ''}

                <!-- Year Badge -->
                <div class="flex justify-between items-start mb-4 relative z-10">
                    <span class="px-3 py-1 bg-indigo-50 text-cbse-blue text-xs font-black rounded-lg shadow-sm">${item.year}</span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-slate-50 px-2 py-0.5 rounded">${typeLabel}</span>
                </div>

                <!-- PDF Icon & Title -->
                <div class="flex-grow flex flex-col items-center justify-center text-center py-4 group-hover:scale-105 transition-transform duration-300">
                    <div class="w-16 h-16 bg-red-50 rounded-2xl flex items-center justify-center text-red-500 text-3xl mb-3 shadow-sm group-hover:bg-red-500 group-hover:text-white transition-colors relative">
                        <i class="fas fa-file-pdf relative z-10"></i>
                        <!-- Hover Peek Animation Effect -->
                        <div class="absolute inset-0 bg-red-400 rounded-2xl opacity-0 group-hover:opacity-100 group-hover:animate-ping transition-opacity" style="animation-duration: 2s;"></div>
                    </div>
                    <h4 class="font-bold text-slate-800 text-sm leading-tight mb-1 line-clamp-2">${item.code || "Document"}</h4>
                    <p class="text-xs text-slate-500 font-medium">${item.subject} • Set ${item.set}</p>
                </div>

                <!-- Actions -->
                <div class="mt-4 pt-4 border-t border-slate-50 grid grid-cols-2 gap-2 relative z-10">
                    <button onclick="window.openPdfModal('${item.qp_url}', '${item.code} Question Paper')" class="py-2 text-xs font-bold text-slate-600 bg-slate-50 rounded-xl hover:bg-cbse-blue hover:text-white transition-colors flex items-center justify-center">
                        <i class="fas fa-eye mr-1"></i> View Question Paper
                    </button>
                    <button onclick="window.openPdfModal('${item.ms_url}', '${item.code} Marking Scheme')" class="py-2 text-xs font-bold text-cbse-blue bg-indigo-50 rounded-xl hover:bg-indigo-100 transition-colors flex items-center justify-center">
                        <i class="fas fa-check mr-1"></i> View Marking Scheme
                    </button>
                </div>
            </div>
        `;
        grid.insertAdjacentHTML('beforeend', cardHTML);
    });
}
</script>

<!-- PDF Viewer Modal -->
<div id="pdf-modal" class="fixed inset-0 z-50 hidden bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl w-full max-w-5xl h-[90vh] flex flex-col overflow-hidden shadow-2xl relative">
        <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <h3 id="pdf-modal-title" class="font-bold text-slate-800 flex items-center gap-2">
                <i class="fas fa-file-pdf text-red-500"></i> Document Viewer
            </h3>
            <button onclick="document.getElementById('pdf-modal').classList.add('hidden'); document.getElementById('pdf-iframe').src='about:blank';" class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-200 text-slate-600 hover:bg-red-100 hover:text-red-500 transition-colors">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="flex-grow bg-slate-100 relative">
            <div id="pdf-loading" class="absolute inset-0 flex items-center justify-center hidden">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-cbse-blue"></div>
            </div>
            <iframe id="pdf-iframe" class="w-full h-full border-0" onload="document.getElementById('pdf-loading').classList.add('hidden')"></iframe>
        </div>
    </div>
</div>

</body>
</html>
