<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PYQ Vault — Ready4Exam</title>


<script src="../js/shell.js"></script>
<script src="../js/tailwind-config.js"></script>
<link href="../css/global.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Firebase configs (ORDER IMPORTANT) -->
<script src="../js/firebase-master-config.js"></script>
<script src="../js/firebase-automation-config.js"></script>
<script type="module" src="../js/config.js"></script>

<style>
  body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }

  /* --- ADD THESE LINES BELOW --- */
  #pdf-frame {
    border: none;
    background: #ffffff;
    display: block; 
  }
  #pdf-modal > div {
    position: relative;
    z-index: 10000;
  }
  /* ------------------------------ */
</style>
</head>

<body class="bg-slate-50 min-h-screen flex flex-col">

<!-- HEADER -->
<div id="app-header"></div>
<script>
document.addEventListener("DOMContentLoaded", () => {
    if (window.R4E) {
        R4E.renderHeader({
        title: "Study Library",
        titleId: "page-title",
        userWelcomeDefault: "Student",
        roleBadge: "Grade --",
        roleBadgeId: "context-badge",
        showLogout: true,
        logoutId: "logout-nav-btn"
        });
    }
});
</script>
<main id="app-content" class="flex-grow max-w-7xl mx-auto w-full p-4 md:p-8">
    
    <div class="mb-6">
         <a href="javascript:history.back()" class="inline-flex items-center gap-2 text-slate-400 hover:text-blue-600 font-bold text-sm transition group">
            <i class="fas fa-arrow-left group-hover:-translate-x-1 transition"></i> Back
        </a>
    </div>

    <section class="mb-10">
      
  
<!-- LOADING -->
<div id="loading" class="flex items-center justify-center flex-grow py-20">
    <div class="animate-pulse font-bold text-slate-400">Loading Vault...</div>
</div>

<!-- APP -->
<div id="app" class="hidden max-w-6xl mx-auto w-full p-4 md:p-8 flex-grow">

    <!-- YEAR -->
    <div class="mb-8">
        <div id="year-ribbon" class="flex flex-nowrap overflow-x-auto gap-3 scrollbar-hide pb-2" style="scrollbar-width: none;"></div>
    </div>

    <!-- FILTERS -->
    <div class="mb-8 bg-white p-4 md:p-6 rounded-2xl border border-slate-200 shadow-sm">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">

            <div>
                <label class="text-xs text-slate-400 font-bold">Subject</label>
                <select id="filter-subject" class="p-2 border rounded-lg w-full"></select>
            </div>

            <div>
                <label class="text-xs text-slate-400 font-bold">Difficulty</label>
                <select id="filter-difficulty" class="p-2 border rounded-lg w-full">
                    <option value="all">All</option>
                    <option value="standard">Standard</option>
                    <option value="basic">Basic</option>
                </select>
            </div>

            <div>
                <label class="text-xs text-slate-400 font-bold">Paper Type</label>
                <select id="filter-type" class="p-2 border rounded-lg w-full">
                    <option value="board_final">Board Final</option>
                    <option value="compartment">Compartment</option>
                </select>
            </div>

            <div>
                <label class="text-xs text-slate-400 font-bold">Set</label>
                <select id="filter-set" class="p-2 border rounded-lg w-full">
                    <option value="all">All Sets</option>
                    <option value="1">Set 1</option>
                    <option value="2">Set 2</option>
                    <option value="3">Set 3</option>
                </select>
            </div>

        </div>
    </div>

    <!-- GRID -->
    <div id="pdf-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>

    <!-- EMPTY STATE -->
    <div id="no-pyq-msg" class="hidden text-center py-12 text-slate-400">
        No papers found. Try changing filters.
    </div>

</div>

<!-- FOOTER -->
<div id="app-footer"></div>
<script>R4E.renderFooter();</script>

<!-- PDF MODAL -->
<div id="pdf-modal" class="fixed inset-0 hidden bg-black/80 flex items-center justify-center z-[9999] overflow-hidden">
    <div class="bg-white w-full max-w-5xl h-[90vh] flex flex-col rounded-xl">
        <div class="p-3 flex justify-between border-b">
            <span id="pdf-modal-title"></span>
            <button onclick="closePdf()">✕</button>
        </div>
        <iframe id="pdf-frame" class="w-full h-full"></iframe>
    </div>
</div>

<!-- MAIN LOGIC -->
<script type="module">
    import { bindConsoleLogout } from "../js/guard.js";
    bindConsoleLogout("logout-nav-btn", "../index.html");
</script>
<script type="module" src="../js/pyq.js"></script>

</body>
</html>
