<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PYQ Vault — Ready4Exam</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="../js/shell.js"></script>
<script src="../js/tailwind-config.js"></script>
<link href="../css/global.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="../js/firebase-master-config.js"></script>
<script src="../js/firebase-automation-config.js"></script>
<script src="../js/config.js" type="module"></script>

<style>
body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
</style>
</head>

<body class="bg-slate-50 min-h-screen flex flex-col">

<!-- HEADER -->
<div id="app-header"></div>
<script>
R4E.renderHeader({
    title: "PYQ Vault",
    homePath: "../index.html",
    userWelcomeDefault: "Student",
    roleBadge: "Grade --",
    roleBadgeId: "context-badge",
    showLogout: true,
    logoutId: "logout-nav-btn"
});
</script>

<!-- LOADING -->
<div id="loading" class="flex items-center justify-center flex-grow py-20">
    <div class="animate-pulse font-bold text-slate-400">Loading Vault...</div>
</div>

<!-- APP -->
<div id="app" class="hidden max-w-6xl mx-auto w-full p-4 md:p-8 flex-grow">

    <!-- YEAR -->
    <div class="mb-8">
        <div id="year-ribbon" class="flex flex-wrap gap-3"></div>
    </div>

    <!-- FILTERS -->
    <div class="mb-8 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">

            <select id="filter-subject" class="p-2 border rounded-lg"></select>

            <select id="filter-difficulty" class="p-2 border rounded-lg">
                <option value="all">All Difficulty</option>
                <option value="standard">Standard</option>
                <option value="basic">Basic</option>
            </select>

            <select id="filter-type" class="p-2 border rounded-lg">
                <option value="board_final">Board Final</option>
                <option value="compartment">Compartment</option>
            </select>

            <select id="filter-set" class="p-2 border rounded-lg">
                <option value="all">All Sets</option>
                <option value="1">Set 1</option>
                <option value="2">Set 2</option>
                <option value="3">Set 3</option>
            </select>

        </div>
    </div>

    <!-- GRID -->
    <div id="pdf-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>

</div>

<!-- FOOTER -->
<div id="app-footer"></div>
<script>R4E.renderFooter();</script>

<!-- PDF MODAL -->
<div id="pdf-modal" class="fixed inset-0 hidden bg-black/70 flex items-center justify-center">
    <div class="bg-white w-full max-w-5xl h-[90vh] flex flex-col rounded-xl">
        <div class="p-3 flex justify-between border-b">
            <span id="pdf-modal-title"></span>
            <button onclick="closePdf()">✕</button>
        </div>
        <iframe id="pdf-frame" class="w-full h-full"></iframe>
    </div>
</div>

<!-- ONLY SCRIPT -->
<script type="module" src="../js/pyq.js"></script>

</body>
</html>
