<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board Vault — Ready4Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily:{ sans:['Inter','sans-serif'] },
          colors:{
            'cbse-blue':'#1a3e6a',
            'cbse-light':'#f5f7fa',
            'accent-gold':'#ffb703',
            'success-green': '#16a34a',
            'warning-yellow': '#ca8a04',
            'danger-red': '#dc2626'
          }
        }
      }
    }
    </script>
</head>
<body class="bg-cbse-light min-h-screen flex flex-col">
    <!-- Glass Header -->
    <header class="bg-cbse-blue shadow-lg py-4 px-6 sticky top-0 z-40 flex justify-between items-center">
      <div class="flex items-center space-x-4">
        <a href="consoles/student.html" class="w-10 h-10 flex items-center justify-center bg-white text-cbse-blue font-bold rounded-2xl shadow-sm hover:scale-105 transition active:scale-95 text-lg">🏠</a>
        <div>
          <h2 class="text-xl font-black leading-none tracking-tight text-accent-gold">Board<span class="text-white">Vault</span></h2>
          <p class="text-[10px] font-bold uppercase tracking-widest mt-1 text-white opacity-80 italic tracking-wide">Ready4Exam • Archive Engine</p>
        </div>
      </div>
      <div class="flex items-center space-x-3">
          <div class="hidden md:flex flex-col items-end mr-2">
              <span id="user-welcome" class="text-xs font-bold text-white">Student</span>
              <span id="context-badge" class="text-[10px] font-black text-white bg-cbse-blue px-2 py-0.5 rounded uppercase tracking-wide">Grade --</span>
          </div>
      </div>
    </header>

    <div class="flex-grow max-w-6xl mx-auto w-full p-4 md:p-8 fade-in">
        <div class="mb-8">
             <a href="consoles/student.html" class="inline-flex items-center gap-2 text-slate-400 hover:text-cbse-blue font-bold text-sm transition group">
                <i class="fas fa-arrow-left group-hover:-translate-x-1 transition"></i> Back to Hub
            </a>
        </div>

        <div class="bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
            <h2 class="text-3xl font-black text-slate-900 mb-2">Centralized Hub</h2>
            <p class="text-slate-500 mb-8 font-medium">Select a year and paper set to begin a full-length simulation.</p>

            <div class="flex flex-col md:flex-row gap-4 mb-8 bg-slate-50 p-4 rounded-2xl border border-slate-200">
                <div class="flex-1">
                    <label class="block text-[10px] font-black uppercase text-slate-400 mb-1 tracking-wider">Level 1: Year</label>
                    <select class="w-full p-3 rounded-xl border border-slate-300 font-bold text-slate-700 bg-white" id="year-select">
                        <option>2024</option>
                        <option>2023</option>
                        <option>2022</option>
                        <option>2021</option>
                        <option>2020</option>
                        <option>2019</option>
                        <option>2018</option>
                        <option>2017</option>
                    </select>
                </div>
                <div class="flex-1">
                    <label class="block text-[10px] font-black uppercase text-slate-400 mb-1 tracking-wider">Level 2: Set/Paper Code</label>
                    <select class="w-full p-3 rounded-xl border border-slate-300 font-bold text-slate-700 bg-white" id="set-select">
                        <option>Set 1</option>
                        <option>Set 2</option>
                        <option>Set 3</option>
                    </select>
                </div>
            </div>

            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6" id="paper-grid">
                <!-- Static Placeholder Cards -->
                <div class="group p-6 bg-white rounded-2xl shadow-sm border border-slate-200 hover:shadow-xl hover:border-cbse-blue transition relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-0 group-hover:opacity-100 transition-opacity text-cbse-blue text-xl">
                        <i class="fas fa-play-circle"></i>
                    </div>
                    <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center text-xl mb-4">
                        <i class="fas fa-file-alt"></i>
                    </div>
                    <h3 class="font-black text-slate-800 text-lg mb-1">Science Paper 2024</h3>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-6">Set 1 | Code: 31/1/1</p>
                    <button class="w-full py-3 bg-slate-900 text-white rounded-xl font-bold group-hover:bg-cbse-blue transition">Start Practice</button>
                </div>
                <div class="group p-6 bg-white rounded-2xl shadow-sm border border-slate-200 hover:shadow-xl hover:border-cbse-blue transition relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-0 group-hover:opacity-100 transition-opacity text-cbse-blue text-xl">
                        <i class="fas fa-play-circle"></i>
                    </div>
                    <div class="w-12 h-12 bg-green-50 text-green-600 rounded-xl flex items-center justify-center text-xl mb-4">
                        <i class="fas fa-file-alt"></i>
                    </div>
                    <h3 class="font-black text-slate-800 text-lg mb-1">Math (Standard) 2024</h3>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-6">Set 1 | Code: 30/1/1</p>
                    <button class="w-full py-3 bg-slate-900 text-white rounded-xl font-bold group-hover:bg-cbse-blue transition">Start Practice</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-cbse-blue text-white/50 text-[10px] md:text-xs text-center py-8 mt-auto border-t border-white/5">
        <p>© 2025 Ready4Exam Academic Portal.</p>
    </footer>
    <script>
        const grade = new URLSearchParams(window.location.search).get("grade") || "--";
        document.getElementById("context-badge").textContent = `Grade ${grade}`;
    </script>
</body>
</html>
