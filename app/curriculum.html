<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Quiz — Ready4Exam</title>
    

    <script src="../js/shell.js"></script>
    <script src="../js/tailwind-config.js"></script>
    <link href="../css/global.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>

    <script src="../js/firebase-master-config.js"></script>
    <script src="../js/config.js" type="module"></script>

    <script type="module">
        import { loadCurriculum } from "../js/curriculum/loader.js";
        import { initializeAuthListener, ensureUserInFirestore } from "../js/auth-paywall.js";
        import { injectStyles } from "../js/ui-renderer.js";
        import { getInitializedClients } from "../js/config.js";
        import { collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        injectStyles();

        window.loadSubjects = async (user) => {
            const params = new URLSearchParams(window.location.search);
            const grade = params.get("grade") || "9";
            document.getElementById("grade-display").textContent = `Class ${grade}`;

            let subjects = ["Science", "Mathematics", "Social Science", "English"];
            if (user && (grade === "11" || grade === "12")) {
                try {
                    const { db } = await getInitializedClients();
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        const profile = userDoc.data();
                        if (profile.mapped_disciplines?.length > 0) {
                            subjects = profile.mapped_disciplines;
                        }
                    }
                } catch(e) { console.error("Error fetching user profile", e); }
            }

            const container = document.getElementById("subject-grid");
            if (container) {
                container.innerHTML = subjects.map(sub => `
                    <div onclick="selectSubject('${sub}', '${grade}')"
                         class="group bg-white p-6 rounded-3xl border border-slate-100 shadow-sm hover:border-blue-500 hover:shadow-xl transition cursor-pointer flex flex-col items-center text-center">
                        <div class="w-16 h-16 rounded-2xl bg-slate-50 flex items-center justify-center text-slate-400 group-hover:bg-blue-50 group-hover:text-blue-600 transition mb-4 text-2xl">
                            <i class="fas ${getSubjectIcon(sub)}"></i>
                        </div>
                        <h3 class="font-bold text-slate-900 text-lg group-hover:text-blue-700 transition">${sub}</h3>
                        <p class="text-sm text-slate-400 font-medium mt-1">Select to view chapters</p>
                    </div>
                `).join("");
            }
        };

        function getSubjectIcon(sub) {
            if (sub === "Science") return "fa-flask";
            if (sub === "Mathematics") return "fa-calculator";
            if (sub === "Social Science") return "fa-globe-americas";
            return "fa-book";
        }

        window.selectSubject = (subject, grade) => {
            window.location.href = `chapter-selection.html?subject=${encodeURIComponent(subject)}&grade=${grade}`;
        };

        async function renderMilestones(user, grade) {
            const container = document.getElementById("milestone-dashboard");
            if (!container || !user) return;

            try {
                const { db } = await getInitializedClients();
                const q = query(collection(db, "quiz_scores"), where("user_id", "==", user.uid), where("class_id", "==", grade));
                const snapshot = await getDocs(q);

                if (snapshot.empty) { renderEmptyMilestones(container); return; }

                const uniqueChapters = new Map();
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const score = data.score_percent || 0;
                    if (score >= 95) {
                        const key = (data.topicSlug || data.topic || "").trim();
                        if (!key) return;
                        if (!uniqueChapters.has(key) || uniqueChapters.get(key).score < score) {
                            uniqueChapters.set(key, { slug: key, title: data.topic || key, score: score, subject: data.subject || "General" });
                        }
                    }
                });

                if (uniqueChapters.size === 0) { renderEmptyMilestones(container); return; }
                renderBadgeRow(container, Array.from(uniqueChapters.values()));
            } catch (error) {
                console.error("Error fetching milestones:", error);
                renderEmptyMilestones(container);
            }
        }

        function renderEmptyMilestones(container) {
            container.innerHTML = `<div class="glass-panel p-6 rounded-3xl text-center border-2 border-dashed border-slate-200"><h3 class="text-slate-900 font-bold text-sm mb-1">The Road to 100%</h3><p class="text-xs text-slate-500 font-medium max-w-xs mx-auto">Complete quizzes with 95%+ to earn your Mastery Badges here.</p></div>`;
        }

        function renderBadgeRow(container, badges) {
            const badgeHtml = badges.map(badge => `
                <div class="flex-shrink-0 bg-white/40 backdrop-blur-md border border-white/50 shadow-sm p-4 rounded-2xl flex items-center gap-4 min-w-[200px] hover:scale-105 transition-transform duration-300">
                    <div class="relative w-12 h-12 flex items-center justify-center">
                         <svg class="absolute inset-0 w-full h-full text-accent-gold transform -rotate-90" viewBox="0 0 36 36">
                            <path class="text-slate-100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="3" />
                            <path class="text-accent-gold" stroke-dasharray="${badge.score}, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="3" />
                         </svg>
                         <span class="text-[10px] font-black text-slate-900 z-10">${badge.score}%</span>
                    </div>
                    <div>
                        <div class="text-[10px] uppercase font-bold text-slate-400 mb-0.5"><i class="fas ${getSubjectIcon(badge.subject)}"></i> ${badge.subject}</div>
                        <h4 class="font-bold text-slate-800 text-sm leading-tight line-clamp-2">${badge.title}</h4>
                    </div>
                </div>
            `).join("");

            container.innerHTML = `
                <div class="flex items-center gap-2 mb-4"><span class="w-1.5 h-6 bg-accent-gold rounded-full"></span><h3 class="font-bold text-slate-900 text-lg">Mastery Milestones</h3></div>
                <div class="flex overflow-x-auto gap-4 pb-4 scrollbar-hide snap-x">${badgeHtml}</div>`;
        }

        initializeAuthListener(async (user) => {
            if (user) {
                const profile = await ensureUserInFirestore(user);
                const welcomeEl = document.getElementById("user-welcome");
                if (welcomeEl) welcomeEl.textContent = profile?.displayName || "Student";
                const params = new URLSearchParams(window.location.search);
                const grade = params.get("grade") || "9";
                const badge = document.getElementById("context-badge");
                if (badge) badge.textContent = `Grade ${grade}`;
                renderMilestones(user, grade);
            }
            loadSubjects(user);
        });
    </script>
</head>

<body class="bg-cbse-light min-h-screen flex flex-col">

    <div id="app-header"></div>
<script>R4E.renderHeader({
    title: "Curriculum",
    userWelcomeDefault: "Student",
    roleBadge: "Grade --",
    roleBadgeId: "context-badge",
    showLogout: false
});</script>

    <main class="flex-grow flex flex-col items-center justify-center p-4 md:p-8 w-full relative">
        <div class="absolute top-4 left-4 md:top-8 md:left-8">
             <a href="javascript:history.back()" class="inline-flex items-center gap-2 text-slate-400 hover:text-cbse-blue font-bold text-sm transition group">
                <i class="fas fa-arrow-left group-hover:-translate-x-1 transition"></i> Back
            </a>
        </div>
        <div class="max-w-4xl w-full fade-in">
            <div class="text-center mb-12">
                <div class="inline-block bg-blue-100 text-blue-700 font-bold px-4 py-1.5 rounded-full text-sm mb-4" id="grade-display">Class --</div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tight mb-4">Start a New Quiz</h1>
                <p class="text-slate-500 font-medium text-lg">Choose a subject to begin your mastery journey.</p>
            </div>

            <div id="milestone-dashboard" class="mb-12"></div>

            <div id="subject-grid" class="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
                </div>

            <div class="text-center mt-12">
                <a href="consoles/student.html" class="text-slate-400 hover:text-slate-600 font-bold text-sm flex items-center justify-center gap-2 transition">
                    <i class="fas fa-arrow-left"></i> Back to Hub
                </a>
            </div>
        </div>
    </main>

    <div id="app-footer"></div>
<script>R4E.renderFooter();</script>

</body>
</html>
