<script src="../js/config.js" type="module"></script>
</head>

<body class="bg-cbse-light min-h-screen w-full flex flex-col">

<div id="app-header"></div>
<script>R4E.renderHeader({
    title: "",
    titleId: "chapter-name-display",
    homePath: "../index.html",
    showLogout: true,
    logoutId: "logout-nav-btn",
    extraRightHtml: '<span id="user-welcome" class="hidden md:inline text-xs text-white font-medium bg-white/10 px-3 py-1.5 rounded-lg border border-white/20"></span><span id="difficulty-display" class="px-3 py-1.5 text-xs font-bold bg-accent-gold text-cbse-blue rounded-lg shadow-sm">Difficulty: Simple</span>',
    showUserWelcome: false
});</script>

<div id="status-message" class="text-center p-4 font-bold text-blue-600 animate-pulse hidden"></div>

<div id="paywall-screen" class="flex flex-col items-center justify-center flex-grow p-6 hidden">
  <div class="bg-white rounded-3xl p-10 shadow-2xl border border-gray-100 text-center max-w-md w-full">
    <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-6">🔐</div>
    <h2 class="text-2xl font-black text-gray-800 mb-2">Sign in to Continue</h2>
    <p class="text-gray-500 mb-8">Access thousands of CBSE-aligned questions by signing in with your student account.</p>
    <button id="google-signin-btn" class="w-full px-6 py-4 bg-cbse-blue text-white font-bold rounded-2xl hover:bg-blue-800 transition shadow-lg active:scale-95 flex items-center justify-center gap-3">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="Google">
      Sign in with Google
    </button>
  </div>
</div>

<main id="quiz-content" class="hidden flex flex-col items-center w-full max-w-4xl mx-auto px-4 py-6 md:py-10">
  <div id="question-list" class="w-full mb-8"></div>
  <div class="w-full sticky bottom-6 z-30 flex justify-between items-center bg-white/90 backdrop-blur-md rounded-2xl shadow-2xl border border-gray-100 p-4">
    <button id="prev-btn" class="px-5 py-2.5 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200 active:scale-95 transition">← Prev</button>
    <span id="question-counter" class="text-sm font-black text-cbse-blue tracking-widest">01 / 25</span>
    <div class="flex space-x-2">
      <button id="next-btn" class="px-6 py-2.5 bg-cbse-blue text-white font-bold rounded-xl hover:bg-blue-800 active:scale-95 transition">Next →</button>
      <button id="submit-btn" class="hidden px-6 py-2.5 bg-success-green text-white font-black rounded-xl hover:bg-green-700 shadow-lg shadow-green-200 active:scale-95 transition">Submit Quiz</button>
    </div>
  </div>
</main>

<section id="results-screen" class="hidden flex flex-col items-center py-8 px-4 sm:px-6 w-full max-w-4xl mx-auto result-card">
  <div class="w-full bg-white rounded-3xl shadow-xl border border-gray-100 p-10 mb-6 text-center">
    <h2 class="text-xs font-black uppercase tracking-[0.2em] text-gray-400 mb-3">Quiz Analysis Completed</h2>
    <div id="score-circle" class="relative inline-block mb-6"><p id="score-display" class="text-7xl font-black text-cbse-blue">0/0</p></div>
    <div id="curiosity-box" class="w-full bg-blue-50 border border-blue-100 text-blue-700 px-6 py-5 rounded-2xl text-sm md:text-base font-semibold leading-relaxed"></div>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full mb-8">
    <button id="btn-review-errors" class="flex items-center justify-center gap-3 px-6 py-5 bg-white border-2 border-gray-100 text-gray-700 font-bold rounded-2xl hover:border-cbse-blue transition-all active:scale-95 shadow-sm">📝 Review My Mistakes</button>
    <button id="btn-show-analysis" class="flex items-center justify-center gap-3 px-6 py-5 bg-cbse-blue text-white font-bold rounded-2xl hover:shadow-cbse-blue/30 hover:shadow-xl transition-all active:scale-95 shadow-lg">🧠 Cognitive Feedback</button>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 w-full mb-8">
    <button onclick="changeDifficulty('Simple')" class="px-5 py-5 bg-green-50 text-green-700 font-extrabold rounded-2xl border-2 border-green-100 hover:border-green-500 hover:bg-green-100 transition-all text-sm">🚀 Simple</button>
    <button onclick="changeDifficulty('Medium')" class="px-5 py-5 bg-yellow-50 text-yellow-700 font-extrabold rounded-2xl border-2 border-yellow-100 hover:border-yellow-600 hover:bg-yellow-100 transition-all text-sm">🚀 Medium</button>
    <button onclick="changeDifficulty('Advanced')" class="px-5 py-5 bg-red-50 text-red-700 font-extrabold rounded-2xl border-2 border-red-100 hover:border-red-600 hover:bg-red-100 transition-all text-sm">🚀 Advanced</button>
  </div>

  <button id="back-to-chapters-btn" class="group flex items-center gap-2 text-gray-500 hover:text-cbse-blue font-bold transition"><span>🔙</span> <span class="group-hover:underline underline-offset-4">Back to Chapter Selection</span></button>
</section>

<div id="analysis-modal" class="hidden fixed inset-0 bg-cbse-blue/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl w-full max-w-xl max-h-[85vh] overflow-hidden flex flex-col shadow-2xl">
        <div class="p-6 border-b flex justify-between items-center"><h3 class="text-xl font-black text-cbse-blue">Skill Analysis</h3><button onclick="document.getElementById('analysis-modal').classList.add('hidden')" class="w-10 h-10 flex items-center justify-center bg-gray-100 rounded-full text-gray-500 hover:bg-red-50 hover:text-red-500 transition-colors">✕</button></div>
        <div id="analysis-content" class="p-8 overflow-y-auto space-y-6"></div>
        <div class="p-4 bg-gray-50 border-t text-center"><button onclick="document.getElementById('analysis-modal').classList.add('hidden')" class="px-8 py-3 bg-cbse-blue text-white font-bold rounded-xl">Got it, Captain!</button></div>
    </div>
</div>

<div id="app-footer"></div>
<script>R4E.renderFooter();</script>

<script>
function changeDifficulty(level){
  const url = new URL(window.location.href);
  const isGuest = url.searchParams.get("mode") === "guest";
  // Guests can only use Simple difficulty; redirect to login for Medium/Advanced
  if (isGuest && level !== "Simple") {
    window.location.href = "../index.html";
    return;
  }
  url.searchParams.set("difficulty", level);
  window.location.href = url.toString();
}
</script>

<script type="module" src="../js/config.js"></script>
<script type="module" src="../js/auth-paywall.js"></script>
<script type="module" src="../js/api.js"></script>
<script type="module" src="../js/ui-renderer.js"></script>
<script type="module" src="../js/quiz-engine.js"></script>
<script type="module">
    import { initializeAuthListener, ensureUserInFirestore } from "../js/auth-paywall.js";
    import { bindConsoleLogout } from "../js/guard.js";

    bindConsoleLogout("logout-nav-btn", "../index.html");

    const urlParams = new URLSearchParams(window.location.search);
    const isGuestMode = urlParams.get("mode") === "guest";

    initializeAuthListener(async (user) => {
        if (!user && !isGuestMode) {
            window.location.href = "../index.html";
            return;
        }
        if (!user && isGuestMode) {
            // Guest mode: show guest label, don't redirect
            const welcomeEl = document.getElementById("user-welcome");
            if (welcomeEl) {
                welcomeEl.textContent = "Guest Preview";
                welcomeEl.classList.remove("hidden");
            }
            return;
        }
        // Authenticated user flow (unchanged)
        const profile = await ensureUserInFirestore(user);
        if (!profile) {
            window.location.href = "../index.html";
            return;
        }
        document.getElementById("user-welcome").textContent = profile.displayName || "Student";
    });
</script>

<script>
(function() {
  const urlParams = new URLSearchParams(window.location.search);
  const subject = urlParams.get("subject") || "Unknown";
  const chapter = urlParams.get("chapter") || "Unknown";
  const difficulty = urlParams.get("difficulty") || "Simple";
  const classId = urlParams.get("class") || "9";

  // Track Quiz Entry
  gtag('event', 'quiz_engine_load', { 'subject': subject, 'chapter': chapter, 'difficulty': difficulty, 'class': classId });

  // Monitor Submit Button
  const subBtn = document.getElementById('submit-btn');
  if (subBtn) {
    subBtn.addEventListener('click', function() {
      gtag('event', 'quiz_submit', { 'subject': subject, 'chapter': chapter, 'score_context': document.getElementById('score-display').textContent });
    });
  }

  // Monitor Post-Quiz Engagement
  document.getElementById('btn-review-errors').addEventListener('click', () => {
    gtag('event', 'mistake_review_click', { 'subject': subject });
  });

  document.getElementById('btn-show-analysis').addEventListener('click', () => {
    gtag('event', 'cognitive_feedback_click', { 'subject': subject });
  });

  document.getElementById('back-to-chapters-btn').addEventListener('click', () => {
    gtag('event', 'return_to_chapter_selection', { 'from': 'quiz_engine' });
  });
})();
</script>

</body>
</html>
