<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Pattern Pulse — Ready4Exam</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/shell.js"></script>
    <script src="../js/tailwind-config.js"></script>
    <link href="../css/global.css" rel="stylesheet">

    <script src="../js/firebase-master-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script type="module">
        import { initExamPulse } from '../js/exam_pulse.js';
        initExamPulse();
    </script>
</head>
<body class="bg-cbse-light min-h-screen flex flex-col font-['Inter']">

    <div id="app-header"></div>
    <script>
        R4E.renderHeader({
            title: "Exam Pulse",
            titleId: "header-title",
            homePath: "../index.html",
            homeIcon: "🏠",
            showUserWelcome: true,
            roleBadge: "Analysis Mode",
            roleBadgeId: "context-badge",
            showLogout: true
        });
    </script>

    <main id="app-content" class="flex-grow max-w-7xl mx-auto w-full p-4 md:p-8 fade-in">
        
        <div class="mb-8">
            <a href="consoles/student.html" class="inline-flex items-center gap-2 text-slate-400 hover:text-cbse-blue font-bold text-sm transition group">
                <i class="fas fa-arrow-left group-hover:-translate-x-1 transition"></i> Back to Console
            </a>
        </div>

        <div id="subject-selection-view" class="hidden">
            <div class="text-center mb-12">
                <h1 class="text-4xl font-black text-slate-900 tracking-tight mb-2">Pattern Pulse</h1>
                <p class="text-slate-500 font-medium">Select a subject to analyze 4-year board exam trends.</p>
            </div>

            <div class="grid md:grid-cols-3 gap-8">
                <button onclick="selectSubject('Mathematics')" class="bg-white rounded-[2.5rem] p-8 border border-slate-200 shadow-sm hover:shadow-xl hover:border-cbse-blue transition-all group text-left">
                    <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center text-cbse-blue text-3xl mb-6 group-hover:bg-cbse-blue group-hover:text-white transition-colors">
                        <i class="fas fa-calculator"></i>
                    </div>
                    <h3 class="text-2xl font-black text-slate-900 mb-2">Mathematics</h3>
                    <p class="text-sm text-slate-500 mb-6">Calculus, Algebra, and Geometry weightage analytics.</p>
                    <span class="text-cbse-blue font-bold text-sm flex items-center gap-2">Explore Pulse <i class="fas fa-arrow-right"></i></span>
                </button>

                <button onclick="selectSubject('Science')" class="bg-white rounded-[2.5rem] p-8 border border-slate-200 shadow-sm hover:shadow-xl hover:border-purple-600 transition-all group text-left">
                    <div class="w-16 h-16 bg-purple-50 rounded-2xl flex items-center justify-center text-purple-600 text-3xl mb-6 group-hover:bg-purple-600 group-hover:text-white transition-colors">
                        <i class="fas fa-flask"></i>
                    </div>
                    <h3 class="text-2xl font-black text-slate-900 mb-2">Science</h3>
                    <p class="text-sm text-slate-500 mb-6">Physics, Chemistry, and Biology pattern forensics.</p>
                    <span class="text-purple-600 font-bold text-sm flex items-center gap-2">Explore Pulse <i class="fas fa-arrow-right"></i></span>
                </button>

                <button onclick="selectSubject('Social Science')" class="bg-white rounded-[2.5rem] p-8 border border-slate-200 shadow-sm hover:shadow-xl hover:border-amber-600 transition-all group text-left">
                    <div class="w-16 h-16 bg-amber-50 rounded-2xl flex items-center justify-center text-amber-600 text-3xl mb-6 group-hover:bg-amber-600 group-hover:text-white transition-colors">
                        <i class="fas fa-landmark"></i>
                    </div>
                    <h3 class="text-2xl font-black text-slate-900 mb-2">Social Science</h3>
                    <p class="text-sm text-slate-500 mb-6">History, Civics, and Geography high-yield zones.</p>
                    <span class="text-amber-600 font-bold text-sm flex items-center gap-2">Explore Pulse <i class="fas fa-arrow-right"></i></span>
                </button>
            </div>
        </div>

        <div id="analysis-dashboard-view" class="hidden space-y-10">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 bg-white p-10 rounded-[3rem] border border-slate-200 shadow-sm relative overflow-hidden">
                <div class="z-10">
                    <div class="flex items-center gap-3 mb-4">
                        <span id="subject-tag" class="px-3 py-1 bg-cbse-blue text-white rounded-full text-[10px] font-black uppercase tracking-widest">Mathematics</span>
                        <span class="px-3 py-1 bg-slate-100 text-slate-500 rounded-full text-[10px] font-black uppercase tracking-widest">2022-2025 Data</span>
                    </div>
                    <h1 id="pulse-title" class="text-4xl font-black text-slate-900 mb-2">Pattern Pulse Analysis</h1>
                    <p class="text-slate-500 text-lg max-w-xl">We've scanned 12 sets of board papers to identify the following intelligence.</p>
                </div>
                <div class="absolute -right-20 -top-20 w-80 h-80 bg-cbse-blue/5 rounded-full blur-3xl"></div>
            </div>

            <div class="grid lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 space-y-8">
                    <section class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-200">
                        <h3 class="text-xl font-black text-slate-900 mb-8">Cumulative Weightage</h3>
                        <div id="weightage-table-container" class="space-y-6"></div>
                    </section>
                </div>
                <div class="lg:col-span-1 space-y-8">
                    <section class="bg-slate-900 rounded-[2.5rem] p-8 text-white">
                        <h4 class="text-lg font-bold mb-6 italic text-blue-400">"Why study this?"</h4>
                        <p id="forensics-insight" class="text-sm leading-relaxed opacity-80 font-medium italic">Analyzing the trend cycle...</p>
                    </section>
                    <div id="long-answer-container" class="space-y-4"></div>
                </div>
            </div>
        </div>

    </main>

    <div id="app-footer"></div>
    <script>R4E.renderFooter();</script>
</body>
</html>
