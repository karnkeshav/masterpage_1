<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Library — Ready4Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/shell.js"></script>
    <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily:{ sans:['Inter','sans-serif'] },
          colors:{
            'cbse-blue':'#1a3e6a',
            'cbse-light':'#f5f7fa',
            'accent-gold':'#ffb703',
            'success-green': '#16a34a',
            'warning-yellow': '#ca8a04',
            'danger-red': '#dc2626'
          }
        }
      }
    }
    </script>
<script src="../js/tailwind-config.js"></script>
<link href="../css/global.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">


    <script src="../js/firebase-master-config.js"></script>
    <script src="../js/config.js" type="module"></script>

    <script type="module">
        import { initializeAuthListener, ensureUserInFirestore } from "../js/auth-paywall.js";
        import { bindConsoleLogout } from "../js/guard.js";
        import * as UI from "../js/ui-renderer.js";
        import { loadCurriculum, flattenSubject } from "../js/curriculum/loader.js";

        UI.injectStyles();
        bindConsoleLogout("logout-nav-btn", "../index.html");

        const params = new URLSearchParams(window.location.search);
        const activeGrade = params.get('grade'); // Let it be null if not in URL, we will use profile
        const grade = activeGrade;
        const activeSubject = params.get('subject');
        const preSelectedSubject = activeSubject;

        // Init
        initializeAuthListener(async (user) => {
            if (user) {
                // Fetch full profile from Firestore to get the real displayName and classId
                const profile = await ensureUserInFirestore(user);
                const displayName = profile?.displayName || user.email.split('+')[1]?.split('@')[0] || "Scholar";
                const userGrade = grade || profile?.classId || profile?.grade;

                document.getElementById("user-welcome").textContent = profile.displayName || "Student";

                if (!userGrade) {
                    document.getElementById("library-container").innerHTML = `<div class="p-8 text-center text-slate-400">Curriculum coming soon</div>`;
                    return;
                }

                document.getElementById("context-badge").textContent = `Grade ${userGrade}`;

                let curriculum;
                try {
                    // Pass the loaded curriculum to the renderer
                    curriculum = await loadCurriculum(userGrade);
                } catch (error) {
                    document.getElementById("library-container").innerHTML = `<div class="p-8 text-center text-slate-400">Curriculum coming soon</div>`;
                    return;
                }

                if (!curriculum) {
                    document.getElementById("library-container").innerHTML = `<div class="p-8 text-center text-slate-400">Curriculum coming soon</div>`;
                    return;
                }

                let matchingSubject = preSelectedSubject;
                if (preSelectedSubject) {
                    const normalizedPreSelected = preSelectedSubject.toLowerCase().trim();
                    const curriculumKeys = Object.keys(curriculum);
                    const exactMatch = curriculumKeys.find(k => k.toLowerCase().trim() === normalizedPreSelected);
                    if (exactMatch) {
                        matchingSubject = exactMatch;
                    }
                }

                if (preSelectedSubject && !curriculum[matchingSubject]) {
                    document.getElementById("library-container").innerHTML = `<div class="p-8 text-center text-slate-400">No chapters found for ${preSelectedSubject} in Grade ${userGrade}.</div>`;
                    return;
                }

                if (matchingSubject) {
                    const specificCurriculum = {};
                    specificCurriculum[matchingSubject] = curriculum[matchingSubject];
                    renderLibrary(specificCurriculum, userGrade);
                } else {
                    renderLibrary(curriculum, userGrade);
                }
            } else {
                window.location.href = "../index.html";
            }
        });

        function renderLibrary(curriculum, resolvedGrade) {
            const container = document.getElementById("library-container");
            container.innerHTML = "";

            Object.entries(curriculum).forEach(([subject, subjectData]) => {
                // If a subject is pre-selected via URL, skip others
                // The key has been normalized in the init block, so we can use activeSubject for the initial check or skip since specificCurriculum is passed.

                const section = document.createElement("div");
                section.className = "mb-12 fade-in";

                const gridId = `grid-${subject.replace(/\s+/g,'-')}`;

                section.innerHTML = `
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 rounded-xl bg-white border border-slate-100 flex items-center justify-center text-lg shadow-sm">
                            ${getSubjectIcon(subject)}
                        </div>
                        <h3 class="text-xl font-black text-slate-800 tracking-tight">${subject}</h3>
                    </div>
                    <div id="${gridId}" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                `;

                container.appendChild(section);

                const grid = document.getElementById(gridId);
                const flatChapters = flattenSubject(subjectData);

                flatChapters.forEach(chapterItem => {
                    const chapterTitle = typeof chapterItem === 'string' ? chapterItem : (chapterItem.chapter_title || chapterItem);
                    const card = document.createElement("div");
                    const urlGrade = resolvedGrade;
                    card.className = "group block bg-white p-5 rounded-2xl border border-slate-100 hover:shadow-lg hover:-translate-y-1 transition-all duration-300 relative overflow-hidden flex flex-col justify-between";

                    let pyqHtml = "";
                    if (resolvedGrade === "10" || resolvedGrade === "12") {
                        const chapterSlug = typeof chapterItem === 'string' ? chapterItem : (chapterItem.slug || chapterItem.chapter_title);
                        pyqHtml = `<a href="pyq_insights.html?grade=${resolvedGrade}&subject=${encodeURIComponent(subject)}&chapter=${encodeURIComponent(chapterSlug)}" class="text-[10px] font-bold text-slate-400 uppercase tracking-wider hover:text-cbse-blue z-10 relative">CBSE PYQ Insights</a>`;
                    }

                    card.innerHTML = `
                        <a href="study-content.html?grade=${urlGrade}&subject=${encodeURIComponent(subject)}&chapter=${encodeURIComponent(chapterTitle)}" class="absolute inset-0 z-0"></a>
                        <div class="absolute top-0 right-0 p-4 opacity-0 group-hover:opacity-100 transition-opacity text-cbse-blue z-0 pointer-events-none">
                            <i class="fas fa-arrow-right"></i>
                        </div>
                        <h4 class="font-bold text-slate-700 group-hover:text-cbse-blue transition-colors pr-6 relative z-0 pointer-events-none">${chapterTitle}</h4>
                        <div class="flex items-center gap-4 mt-2 relative z-10 pointer-events-none">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider pointer-events-auto">Study Summary</p>
                            <span class="pointer-events-auto">${pyqHtml}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            });
        }

        function getSubjectIcon(subject) {
            if (subject.includes("Math")) return "📐";
            if (subject.includes("Science")) return "🔬";
            if (subject.includes("Social")) return "🌍";
            return "📚";
        }
    </script>
</head>
<body class="bg-cbse-light min-h-screen flex flex-col">

    <!-- Glass Header -->
    <div id="app-header"></div>
<script>R4E.renderHeader({
    title: "Study Library",
    homePath: "../index.html",
    userWelcomeDefault: "Student",
    roleBadge: "Grade --",
    roleBadgeId: "context-badge",
    showLogout: true,
    logoutId: "logout-nav-btn"
});</script>

    <div class="flex-grow max-w-6xl mx-auto w-full p-4 md:p-8 fade-in">
        <div class="mb-8">
             <a href="consoles/student.html" class="inline-flex items-center gap-2 text-slate-400 hover:text-cbse-blue font-bold text-sm transition group">
                <i class="fas fa-arrow-left group-hover:-translate-x-1 transition"></i> Back to Hub
            </a>
        </div>

        <div id="library-container">
            <!-- Dynamic Content -->
        </div>
    </div>

    <div id="app-footer"></div>
<script>R4E.renderFooter();</script>

</body>
</html>
