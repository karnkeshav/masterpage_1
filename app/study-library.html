<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Library — Ready4Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/shell.js"></script>
    <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily:{ sans:['Inter','sans-serif'] },
          colors:{
            'cbse-blue':'#1a3e6a',
            'cbse-light':'#f5f7fa',
            'accent-gold':'#ffb703',
            'success-green': '#16a34a',
            'warning-yellow': '#ca8a04',
            'danger-red': '#dc2626'
          }
        }
      }
    }
    </script>
    <script src="../js/tailwind-config.js"></script>
    <link href="../css/global.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="../js/firebase-master-config.js"></script>
    <script src="../js/config.js" type="module"></script>

    <script type="module">
        import { initializeAuthListener, ensureUserInFirestore } from "../js/auth-paywall.js";
        import { bindConsoleLogout } from "../js/guard.js";
        import * as UI from "../js/ui-renderer.js";
        import { loadCurriculum, flattenSubject } from "../js/curriculum/loader.js";

        UI.injectStyles();
        bindConsoleLogout("logout-nav-btn", "../index.html");

        const params = new URLSearchParams(window.location.search);
        const activeGrade = params.get('grade');
        const activeSubject = params.get('subject');

        initializeAuthListener(async (user) => {
            if (user) {
                const profile = await ensureUserInFirestore(user);
                const userGrade = activeGrade || profile?.classId || profile?.grade;

                document.getElementById("user-welcome").textContent = profile.displayName || "Student";

                if (!userGrade) {
                    document.getElementById("library-container").innerHTML = `<div class="p-8 text-center text-slate-400">Curriculum coming soon</div>`;
                    return;
                }

                document.getElementById("context-badge").textContent = `Grade ${userGrade}`;

                let curriculum;
                try {
                    curriculum = await loadCurriculum(userGrade);
                } catch (error) {
                    document.getElementById("library-container").innerHTML = `<div class="p-8 text-center text-slate-400">Curriculum coming soon</div>`;
                    return;
                }

                if (!curriculum) {
                    document.getElementById("library-container").innerHTML = `<div class="p-8 text-center text-slate-400">Curriculum coming soon</div>`;
                    return;
                }

                let matchingSubject = activeSubject;
                if (activeSubject) {
                    const normalized = activeSubject.toLowerCase().trim();
                    matchingSubject = Object.keys(curriculum).find(k => k.toLowerCase().trim() === normalized) || activeSubject;
                }

                if (activeSubject && !curriculum[matchingSubject]) {
                    document.getElementById("library-container").innerHTML = `<div class="p-8 text-center text-slate-400">No chapters found for ${activeSubject} in Grade ${userGrade}.</div>`;
                    return;
                }

                if (matchingSubject) {
                    const specific = { [matchingSubject]: curriculum[matchingSubject] };
                    renderLibrary(specific, userGrade);
                } else {
                    renderLibrary(curriculum, userGrade);
                }
            } else {
                window.location.href = "../index.html";
            }
        });

        function renderLibrary(curriculum, resolvedGrade) {
            const container = document.getElementById("library-container");
            container.innerHTML = "";

            Object.entries(curriculum).forEach(([subject, subjectData]) => {
                const section = document.createElement("div");
                section.className = "mb-12 fade-in";
                const gridId = `grid-${subject.replace(/\s+/g,'-')}`;

                section.innerHTML = `
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 rounded-xl bg-white border border-slate-100 flex items-center justify-center text-lg shadow-sm">
                            ${getSubjectIcon(subject)}
                        </div>
                        <h3 class="text-xl font-black text-slate-800 tracking-tight">${subject}</h3>
                    </div>
                    <div id="${gridId}" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                `;
                container.appendChild(section);

                const grid = document.getElementById(gridId);
                const flatChapters = flattenSubject(subjectData);

                flatChapters.forEach(chapterItem => {
                    const chapterTitle = typeof chapterItem === 'string' ? chapterItem : (chapterItem.chapter_title || chapterItem);
                    const card = document.createElement("div");
                    
                    // --- UI ENHANCEMENT: MODERN CARD DESIGN ---[cite: 1]
                    card.className = "group bg-white p-6 rounded-2xl border border-slate-100 hover:shadow-xl transition-all duration-300 flex flex-col gap-4";

                    let pyqBtn = "";
                    if (resolvedGrade === "10" || resolvedGrade === "12") {
                        const chapterSlug = typeof chapterItem === 'string' ? chapterItem : (chapterItem.slug || chapterItem.chapter_title);
                        // --- UI ENHANCEMENT: ATTRACTIVE PYQ BUTTON ---[cite: 1]
                        pyqBtn = `
                            <a href="pyq_insights.html?grade=${resolvedGrade}&subject=${encodeURIComponent(subject)}&chapter=${encodeURIComponent(chapterSlug)}" 
                               class="flex-1 text-center py-2.5 px-3 bg-amber-50 text-amber-600 hover:bg-accent-gold hover:text-white rounded-xl text-[10px] font-black uppercase tracking-wider transition-all border border-amber-100">
                               <i class="fas fa-chart-line mr-1"></i> PYQ Insights
                            </a>`;
                    }

                    // --- UI ENHANCEMENT: DUAL ACTION BUTTONS ---[cite: 1]
                    card.innerHTML = `
                        <h4 class="font-bold text-slate-800 text-lg leading-snug min-h-[3rem] line-clamp-2">${chapterTitle}</h4>
                        <div class="flex gap-2 mt-auto">
                            <a href="study-content.html?grade=${resolvedGrade}&subject=${encodeURIComponent(subject)}&chapter=${encodeURIComponent(chapterTitle)}" 
                               class="flex-1 text-center py-2.5 px-3 bg-blue-50 text-cbse-blue hover:bg-cbse-blue hover:text-white rounded-xl text-[10px] font-black uppercase tracking-wider transition-all border border-blue-100">
                               <i class="fas fa-file-alt mr-1"></i> Summary
                            </a>
                            ${pyqBtn}
                        </div>
                    `;
                    grid.appendChild(card);
                });
            });
        }

        function getSubjectIcon(subject) {
            if (subject.includes("Math")) return "📐";
            if (subject.includes("Science")) return "🔬";
            if (subject.includes("Social")) return "🌍";
            return "📚";
        }
    </script>
</head>
<body class="bg-cbse-light min-h-screen flex flex-col">

    <div id="app-header"></div>
    <script>R4E.renderHeader({
        title: "Study Library",
        userWelcomeDefault: "Student",
        roleBadge: "Grade --",
        roleBadgeId: "context-badge",
        showLogout: true,
        logoutId: "logout-nav-btn"
    });</script>

    <div class="flex-grow max-w-6xl mx-auto w-full p-4 md:p-8 fade-in">
        <div class="mb-8">
             <a href="consoles/student.html" class="inline-flex items-center gap-2 text-slate-400 hover:text-cbse-blue font-bold text-sm transition group">
                <i class="fas fa-arrow-left group-hover:-translate-x-1 transition"></i> Back to Hub
            </a>
        </div>

        <div id="library-container">
            <!-- Dynamic Content -->
        </div>
    </div>

    <div id="app-footer"></div>
    <script>R4E.renderFooter();</script>

</body>
</html>
