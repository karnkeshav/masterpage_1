<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Content — Ready4Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/shell.js"></script>
    <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily:{ sans:['Inter','sans-serif'] },
          colors:{
            'cbse-blue':'#1a3e6a',
            'cbse-light':'#f5f7fa',
            'accent-gold':'#ffb703',
            'success-green': '#16a34a',
            'warning-yellow': '#ca8a04',
            'danger-red': '#dc2626'
          }
        }
      }
    }
    </script>
    <script src="../js/tailwind-config.js"></script>
    <link href="../css/global.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="../js/firebase-master-config.js"></script>
    <script src="../js/config.js" type="module"></script>

    <script>
    window.MathJax = { loader: { load: ['[tex]/mhchem'] }, tex: { packages: { '[+]': ['mhchem'] } } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script type="module" src="../js/ncert-renderer.js"></script>
</head>
<body class="bg-cbse-light min-h-screen flex flex-col">

    <div id="app-header"></div>
    <script>R4E.renderHeader({ title: "Study Library", userWelcomeDefault: "Student", showLogout: true });</script>

    <div class="flex-grow max-w-5xl mx-auto w-full p-4 md:p-8 fade-in">
        <div class="mb-8">
             <a href="javascript:history.back()" class="inline-flex items-center gap-2 text-slate-400 hover:text-cbse-blue font-bold text-sm transition group">
                <i class="fas fa-arrow-left group-hover:-translate-x-1 transition"></i> Back
            </a>
        </div>

        <div class="text-center mb-10">
            <h1 id="chapter-title" class="text-3xl md:text-4xl font-black text-slate-900 tracking-tight mb-2">--</h1>
            <p id="subject-subtitle" class="text-slate-500 font-medium">--</p>
        </div>

        <div id="content-container">
            <!-- Dynamic Content via ncert-renderer.js -->
        </div>

        <!-- Professional Symmetric Action Bar (Restores Points 1, 2, 3) -->
        <div id="action-bar-wrapper" class="mt-12 pt-8 border-t border-slate-200 hidden bg-white rounded-3xl p-8 shadow-inner">
            
            <div class="flex flex-col md:flex-row items-center justify-center gap-6 max-w-3xl mx-auto">
                
                <!-- Chapter Test Column (Addressing Point 1: Placement) -->
                <div class="w-full md:w-1/2 flex flex-col items-center">
                    <!-- Guidance Message (Restored ABOVE button per Point 1) -->
                    <div id="quiz-guidance-msg" class="text-center text-[10px] font-black uppercase tracking-[0.2em] mb-4 min-h-[1.5rem] text-slate-400">Ready to Start? Begin with Simple Level</div>
                    
                    <!-- Chapter Test Button slot -->
                    <div id="test-btn-slot" class="w-full"></div>
                    
                    <!-- Mastery Level Recommendation (Moved BELOW button per Point 1) -->
                    <p class="text-center text-slate-400 text-[11px] font-medium mt-3 italic">Proficiency Target: Recommended 85%+</p>
                </div>

                <!-- Board Pattern Questions Column (Addressing Point 3: Professional Look) -->
                <div class="w-full md:w-1/2 flex flex-col items-center border-l border-slate-100 md:pl-6">
                    <div class="text-center text-[10px] font-black uppercase tracking-[0.2em] mb-4 min-h-[1.5rem] text-slate-400">Authentic PDF Pattern Extractions</div>
                    
                    <div id="insight-trigger-slot" class="w-full">
                        <button id="trigger-board-insights" class="w-full bg-white border-2 border-cbse-blue text-cbse-blue px-6 py-4 rounded-2xl font-black hover:bg-cbse-blue hover:text-white transition-all shadow-lg flex items-center justify-center gap-3 group">
                            <i class="fas fa-file-invoice text-accent-gold group-hover:scale-125 transition"></i>
                            <span>Board Pattern Questions</span>
                        </button>
                    </div>

                    <!-- Sync Status Message (Addressing Point 2: Professional Look after Sync) -->
                    <div id="sync-status-msg" class="text-center text-[9px] mt-4 font-bold uppercase tracking-widest text-warning-yellow flex items-center gap-1.5">
                        <i class="fas fa-cloud-download-alt text-xs animate-bounce"></i>
                        <span>One-time Internet Connection Required</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="board-insight-container" class="mt-12 w-full mx-auto hidden"></div>
    </div>

    <div id="app-footer"></div>
    <script>R4E.renderFooter();</script>

    <script type="module">
        import { SlugEngine } from '../js/slug-engine.js';
        import { getInitializedClients } from '../js/config.js';
        import { curriculum } from '../js/curriculum/class-9.js';

        const engine = new SlugEngine(curriculum);

        // --- IndexedDB Sync Logic ( preresquisite for Point 2) ---
        const DB_NAME = 'Ready4Exam_Insights_DB';
        const STORE_NAME = 'board_insights';
        const DB_VERSION = 1;

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function getLocalInsight(chapterKey) {
            const db = await openDB();
            return new Promise((resolve) => {
                const transaction = db.transaction(STORE_NAME, 'readonly');
                const request = transaction.objectStore(STORE_NAME).get(chapterKey);
                request.onsuccess = () => resolve(request.result);
            });
        }

        async function saveInsightLocally(chapterKey, data) {
            const db = await openDB();
            const transaction = db.transaction(STORE_NAME, 'readwrite');
            transaction.objectStore(STORE_NAME).put({ id: chapterKey, content: data, timestamp: Date.now() });
        }

        // --- UI Observers & Dynamic Layout ( Restores Point 1, 3) ---
        const container = document.getElementById('content-container');
        if (container) {
            const observer = new MutationObserver(() => {
                const testBtn = document.getElementById('btn-target-test');
                if (testBtn && !testBtn.dataset.moved) {
                    setupSymmetricLayout(testBtn);
                }
            });
            observer.observe(container, { childList: true, subtree: true });
        }

        function setupSymmetricLayout(originalBtn) {
            originalBtn.dataset.moved = "true";
            originalBtn.classList.add('hidden'); // Hide the one inside ncert-renderer
            
            // Create New Styled Test Button
            const newBtn = document.createElement('button');
            newBtn.className = "w-full bg-cbse-blue text-white px-6 py-4 rounded-2xl font-black hover:scale-105 active:scale-95 transition-all shadow-xl flex items-center justify-center gap-3";
            newBtn.innerHTML = `<span>Take Chapter Test</span> <i class="fas fa-bolt text-accent-gold"></i>`;
            
            newBtn.onclick = () => {
                 const params = new URLSearchParams(window.location.search);
                 openDifficultyModal({ subject: params.get('subject') || 'Mathematics', chapter: params.get('chapter') || 'Real_Numbers', grade: params.get('grade') || '10' });
            };

            document.getElementById('test-btn-slot').appendChild(newBtn);
            document.getElementById('action-bar-wrapper').classList.remove('hidden');
            
            // Check local DB to determine initial professional sync status ( Addressing Point 2)
            const params = new URLSearchParams(window.location.search);
            const chapterKey = (params.get('chapter') || 'real_numbers').toLowerCase().replace(/ /g, '_');
            getLocalInsight(chapterKey).then(data => {
                if(data && data.content.insights && data.content.insights.length > 0) {
                    updateSyncStatusProfessional();
                }
            });

            renderGuidance();
        }

        document.getElementById('trigger-board-insights').addEventListener('click', handleInsightRequest);

        async function handleInsightRequest() {
            const params = new URLSearchParams(window.location.search);
            const chapter = params.get('chapter') || 'real_numbers';
            const chapterKey = chapter.toLowerCase().replace(/ /g, '_');
            
            let data = await getLocalInsight(chapterKey);

            // Sync Check for Empty/Outdated local data
            if (!data || !data.content.insights || data.content.insights.length === 0) {
                const cloudUrl = `https://karnkeshav.github.io/masterpage_1/data/board-insights/${chapterKey}.json?v=${Date.now()}`;
                try {
                    const response = await fetch(cloudUrl);
                    if (!response.ok) throw new Error();
                    const jsonData = await response.json();
                    await saveInsightLocally(chapterKey, jsonData);
                    data = { content: jsonData };
                    
                    // CRITICAL FIX: Addressing Point 2 - Professional look after Sync
                    updateSyncStatusProfessional();
                } catch (err) {
                    alert("A one-time internet connection is required to sync board pattern questions.");
                    return;
                }
            }
            renderInsightsUI(data.content);
        }

        // Helper: Updates status professionally after successful sync ( Addressing Point 2)
        function updateSyncStatusProfessional() {
            const statusMsg = document.getElementById('sync-status-msg');
            statusMsg.classList.remove('text-warning-yellow');
            statusMsg.classList.add('text-success-green');
            statusMsg.innerHTML = `<i class="fas fa-check-circle text-xs"></i><span>✅ Synced locally. Accessible offline[cite: 1, 2].</span>`;
        }

        // --- Core Application Logic (Restores Point 4 & 3 Professional Rendering) ---
        function renderInsightsUI(data) {
            const target = document.getElementById('board-insight-container');
            target.classList.remove('hidden');
            target.scrollIntoView({ behavior: 'smooth' });

            // Base URL for image snapshots generated by new binsight.py
            const imageBaseUrl = "https://karnkeshav.github.io/masterpage_1/data/board-insights/images/";

            target.innerHTML = `
                <div class="bg-white border-4 border-cbse-blue rounded-[2rem] overflow-hidden shadow-2xl mb-12 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div class="bg-cbse-blue p-6 text-white flex justify-between items-center">
                        <div>
                            <div class="flex items-center gap-3 mb-1">
                                <span class="bg-accent-gold text-cbse-blue text-[10px] font-black px-2 py-0.5 rounded uppercase tracking-tighter">Verified CBSE Pattern</span>
                                <h2 class="text-xl font-bold">${data.chapter_name} Questions</h2>
                            </div>
                            <p class="text-blue-100 text-xs italic">Authentic PDF Visual Extractions</p>
                        </div>
                        <button onclick="document.getElementById('board-insight-container').classList.add('hidden')" class="text-white/30 hover:text-white transition"><i class="fas fa-times-circle text-2xl"></i></button>
                    </div>
                    <div class="p-8 space-y-12">
                        ${data.insights.map((insight, idx) => `
                            <div class="border-l-4 border-accent-gold pl-6">
                                <h4 class="text-cbse-blue font-black uppercase text-[10px] tracking-widest mb-2">Case Study ${idx + 1}</h4>
                                
                                <!-- Paragraph view fixed per Point 4 (replace \n with spaces, not <br>) -->
                                <div class="text-slate-700 italic mb-6 text-sm leading-relaxed bg-slate-50 p-5 rounded-2xl border border-slate-100 prose prose-slate max-w-none">
                                    "${insight.context.replace(/\n/g, ' ')}"[cite: 2]
                                </div>
                                
                                <!-- NEW IMAGE SNAPSHOT HANDLING: Addressing Point 4 Visual Formulas/Diagrams -->
                                ${insight.image_path ? `
                                    <div class="mt-6 mb-10 border border-slate-100 rounded-2xl overflow-hidden shadow-sm bg-slate-50">
                                        <p class="text-center text-slate-400 font-bold uppercase text-[9px] tracking-widest py-3 border-b border-slate-100">Authentic Visual Context (Formulas/Diagrams)</p>
                                        <img src="${imageBaseUrl}${insight.image_path}" alt="Board Question Visual" class="w-full h-auto">
                                    </div>
                                ` : ''}

                                <div class="space-y-8">
                                    ${insight.questions.map((q, qIdx) => `
                                        <div>
                                            <p class="font-bold text-slate-800 mb-4 text-sm">${qIdx+1}. ${q.text}</p>
                                            
                                            <!-- Hide standard text options box if they simply say 'Refer to Image' -->
                                            ${(q.options.length === 1 && q.options[0].includes("Refer to Image")) ? '' : `
                                                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 ml-4">
                                                    ${q.options.map(opt => `<div class="bg-white p-4 rounded-xl border border-slate-200 text-xs text-slate-600 font-bold">${opt}</div>`).join('')}
                                                </div>
                                            `}
                                            
                                            <details class="mt-4 ml-4 group">
                                                <summary class="text-[10px] font-black text-cbse-blue cursor-pointer list-none uppercase tracking-[0.2em] hover:text-accent-gold transition">
                                                    <i class="fas fa-key mr-1"></i> Reveal Official Answer
                                                </summary>
                                                <div class="mt-3 p-4 bg-green-50 text-success-green border border-green-100 rounded-xl font-black text-xs">
                                                    Official Answer: ${q.answer}[cite: 2]
                                                </div>
                                            </details>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // --- Core Application Logic ---
        async function renderGuidance() {
            const params = new URLSearchParams(window.location.search);
            const quizSlug = engine.getQuizTableSlug(params.get('grade'), params.get('subject'), params.get('chapter'));
            const msgEl = document.getElementById('quiz-guidance-msg');
            try {
                const { auth, db } = await getInitializedClients();
                const { collection, query, where, getDocs } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
                let user = auth.currentUser;
                if (!user) await new Promise(resolve => {
                    const unsub = auth.onAuthStateChanged(u => { if (u) { user = u; resolve(); unsub(); } });
                    setTimeout(() => { resolve(); unsub(); }, 2000);
                });
                if (!user) { msgEl.innerHTML = `<span class="text-slate-400 tracking-widest"><i class="fas fa-lock"></i> Login for guidance</span>`; return; }
                
                const q = query(collection(db, "quiz_scores"), where("user_id", "==", user.uid), where("topicSlug", "==", quizSlug));
                const snap = await getDocs(q);
                let bestSimple = 0, bestMedium = 0;
                snap.forEach(d => {
                    const data = d.data();
                    const pct = data.percentage || 0;
                    if (data.difficulty === "Simple" && pct > bestSimple) bestSimple = pct;
                    if (data.difficulty === "Medium" && pct > bestMedium) bestMedium = pct;
                });
                
                if (bestSimple === 0) { msgEl.className = 'text-center text-[10px] font-black uppercase tracking-[0.2em] mb-4 text-danger-red'; msgEl.innerHTML = `Ready to Start? Begin with Simple Level`; }
                else if (bestSimple < 85) { msgEl.className = 'text-center text-[10px] font-black uppercase tracking-[0.2em] mb-4 text-warning-yellow'; msgEl.innerHTML = `Current Focus: Master Simple Level (85%+)`; } // Addressing Point 1 text restoration
                else if (bestMedium < 85) { msgEl.className = 'text-center text-[10px] font-black uppercase tracking-[0.2em] mb-4 text-success-green'; msgEl.innerHTML = `Great Work! Advance to Medium Level`; }
                else { msgEl.className = 'text-center text-[10px] font-black uppercase tracking-[0.2em] mb-4 text-cbse-blue'; msgEl.innerHTML = `Chapter Mastery Achieved!`; }
            } catch (e) { console.error(e); }
        }

        function openDifficultyModal(ctx) {
            const theme = engine.themes[ctx.subject] || engine.themes["General"];
            const modal = document.createElement('div');
            modal.id = 'symmetric-difficulty-modal';
            modal.className = `fixed inset-0 bg-slate-900/90 backdrop-blur-md z-50 flex items-center justify-center p-4 fade-in`;
            let colorName = 'slate';
            try { if (theme.bg) colorName = theme.bg.split('-')[1]; } catch (e) {}
            modal.innerHTML = `
                <div class="bg-white rounded-[2.5rem] w-full max-w-md p-10 shadow-2xl relative border-b-8 border-cbse-blue text-center overflow-hidden">
                    <button id="close-sym-modal" class="absolute top-6 right-6 w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full text-slate-400 hover:bg-red-50 hover:text-red-500 transition">✕</button>
                    <div class="w-20 h-20 mx-auto bg-cbse-blue/5 rounded-3xl flex items-center justify-center text-cbse-blue text-4xl mb-6 shadow-inner">
                        <i class="fas ${theme.icon || 'fa-shapes'}"></i>
                    </div>
                    <h3 class="text-2xl font-black text-slate-900 mb-2">Target Proficiency</h3>
                    <p class="text-[10px] font-black text-cbse-blue uppercase tracking-[0.3em] mb-10">${ctx.subject} Syllabus</p>
                    <div class="space-y-4">
                        ${createCard('Simple', 'Foundation', 'bg-green-50', 'border-green-200', 'text-green-700', '🌱')}
                        ${createCard('Medium', 'Standard', 'bg-yellow-50', 'border-yellow-200', 'text-yellow-700', '⚡')}
                        ${createCard('Advanced', 'Challenger', 'bg-red-50', 'border-red-200', 'text-red-700', '🔥')}
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('close-sym-modal').onclick = () => modal.remove();
        }

        function createCard(level, subtitle, bg, border, text, icon) {
            return `<button onclick="launchQuiz('${level}')" class="w-full p-5 ${bg} border-2 ${border} rounded-3xl hover:scale-[1.03] active:scale-95 transition-all group text-left flex items-center gap-5 shadow-sm">
                <span class="w-14 h-14 rounded-2xl bg-white/60 ${text} flex items-center justify-center text-2xl shadow-sm">${icon}</span>
                <div><div class="font-black ${text} text-xl leading-tight">${level}</div><div class="text-[10px] ${text} opacity-70 font-black uppercase tracking-widest">${subtitle}</div></div>
                <span class="ml-auto ${text} group-hover:translate-x-1 transition text-xl"><i class="fas fa-chevron-right"></i></span>
            </button>`;
        }

        window.launchQuiz = (difficulty) => {
            const params = new URLSearchParams(window.location.search);
            const quizSlug = engine.getQuizTableSlug(params.get('grade'), params.get('subject'), params.get('chapter'));
            window.location.href = `quiz-engine.html?topic=${encodeURIComponent(quizSlug)}&difficulty=${difficulty}&grade=${params.get('grade')}&subject=${encodeURIComponent(params.get('subject'))}&chapter_name=${encodeURIComponent(params.get('chapter'))}`;
        };
    </script>
</body>
</html>
