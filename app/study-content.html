<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Content — Ready4Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily:{ sans:['Inter','sans-serif'] },
          colors:{
            'cbse-blue':'#1a3e6a',
            'cbse-light':'#f5f7fa',
            'accent-gold':'#ffb703',
            'success-green': '#16a34a',
            'warning-yellow': '#ca8a04',
            'danger-red': '#dc2626'
          }
        }
      }
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body{font-family:'Inter',sans-serif;}</style>

    <script src="../js/firebase-master-config.js"></script>
    <script src="../js/config.js" type="module"></script>

    <script type="module" src="../js/ncert-renderer.js"></script>
</head>
<body class="bg-cbse-light min-h-screen flex flex-col">

    <!-- Glass Header -->
    <header class="glass-panel sticky top-0 z-50 flex justify-between items-center py-4 px-6 border-b border-white/20">
      <div class="flex items-center space-x-4">
        <a href="../index.html" class="w-10 h-10 flex items-center justify-center bg-white text-cbse-blue font-bold rounded-2xl shadow-sm hover:scale-105 transition active:scale-95 text-lg">🏠</a>
        <div>
          <h2 class="text-xl font-black text-cbse-blue leading-none tracking-tight">Study<span class="text-accent-gold">Library</span></h2>
          <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">N.C.E.R.T. Summaries</p>
        </div>
      </div>

      <div class="flex items-center space-x-3">
          <div class="hidden md:flex flex-col items-end mr-2">
              <span id="user-welcome" class="text-xs font-bold text-slate-700">Student</span>
              <span id="context-badge" class="text-[10px] font-black text-white bg-cbse-blue px-2 py-0.5 rounded uppercase tracking-wide">Grade --</span>
          </div>
          <button id="logout-nav-btn" class="w-10 h-10 flex items-center justify-center bg-red-50 text-red-500 rounded-2xl hover:bg-red-500 hover:text-white transition shadow-sm">🚪</button>
      </div>
    </header>

    <div class="flex-grow max-w-5xl mx-auto w-full p-4 md:p-8 fade-in">
        <div class="mb-8">
             <a href="javascript:history.back()" class="inline-flex items-center gap-2 text-slate-400 hover:text-cbse-blue font-bold text-sm transition group">
                <i class="fas fa-arrow-left group-hover:-translate-x-1 transition"></i> Back
            </a>
        </div>

        <div class="text-center mb-10">
            <h1 id="chapter-title" class="text-3xl md:text-4xl font-black text-slate-900 tracking-tight mb-2">--</h1>
            <p id="subject-subtitle" class="text-slate-500 font-medium">--</p>
        </div>

        <div id="content-container">
            <!-- Dynamic Content -->
        </div>
    </div>

    <footer class="bg-cbse-blue text-white/50 text-[10px] md:text-xs text-center py-8 mt-auto border-t border-white/5">
      <p class="font-medium tracking-wide">Powered by Ready4Exam AI</p>
      <p class="mt-1 opacity-70">© 2025 Academic Portal</p>
    </footer>

    <script type="module">
        import { SlugEngine } from '../js/slug-engine.js';
        import { getInitializedClients } from '../js/config.js';

        // Initialize Engine for Themes
        const engine = new SlugEngine();

        // DOM Observer to Upgrade Button
        const observer = new MutationObserver((mutations) => {
            const btn = document.getElementById('btn-target-test');
            if (btn && !btn.dataset.upgraded) {
                upgradeButton(btn);
            }
        });

        const container = document.getElementById('content-container');
        if (container) {
            observer.observe(container, { childList: true, subtree: true });
        }

        function upgradeButton(oldBtn) {
            const newBtn = oldBtn.cloneNode(true);
            oldBtn.parentNode.replaceChild(newBtn, oldBtn);
            newBtn.innerHTML = `<span>Take Chapter Test</span> <i class="fas fa-bolt"></i>`;
            newBtn.dataset.upgraded = "true";

            // STRICT ADDITION: Add Guidance Message Container
            const msgDiv = document.createElement('div');
            msgDiv.id = 'quiz-guidance-msg';
            msgDiv.className = 'text-xs font-bold uppercase tracking-widest mb-3 animate-pulse';
            newBtn.parentNode.insertBefore(msgDiv, newBtn);

            newBtn.addEventListener('click', () => {
                const params = new URLSearchParams(window.location.search);
                openDifficultyModal({
                    subject: params.get('subject') || 'Mathematics',
                    chapter: params.get('chapter') || 'Polynomials',
                    grade: params.get('grade') || '9'
                });
            });

            // Trigger Guidance Check
            renderGuidance();
        }

        async function renderGuidance() {
            const params = new URLSearchParams(window.location.search);
            const quizSlug = engine.getQuizTableSlug(params.get('grade'), params.get('subject'), params.get('chapter'));
            const msgEl = document.getElementById('quiz-guidance-msg');

            try {
                const { auth, db } = await getInitializedClients();
                const { collection, query, where, getDocs } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

                const q = query(collection(db, "quiz_scores"),
                                where("user_id", "==", auth.currentUser.uid),
                                where("topicSlug", "==", quizSlug));

                const snap = await getDocs(q);
                let bestSimple = 0;
                let bestMedium = 0;

                snap.forEach(d => {
                    const data = d.data();
                    const pct = data.percentage || data.score_percent || 0;
                    if (data.difficulty === "Simple" && pct > bestSimple) bestSimple = pct;
                    if (data.difficulty === "Medium" && pct > bestMedium) bestMedium = pct;
                });

                // Requested Guidance Messages
                if (bestSimple === 0) {
                    msgEl.className = 'text-xs font-bold uppercase mb-3 text-red-600';
                    msgEl.innerHTML = `<i class="fas fa-info-circle"></i> You have not taken the simple test for this chapter. Take it. Now.`;
                } else if (bestSimple < 95) {
                    msgEl.className = 'text-xs font-bold uppercase mb-3 text-amber-600';
                    msgEl.innerHTML = `<i class="fas fa-redo"></i> Try again to achieve 95 percentage on Simple Level.`;
                } else if (bestMedium < 95) {
                    msgEl.className = 'text-xs font-bold uppercase mb-3 text-green-600';
                    msgEl.innerHTML = `<i class="fas fa-check-circle"></i> Great! Now take the Medium Level test.`;
                } else {
                    msgEl.className = 'text-xs font-bold uppercase mb-3 text-blue-600';
                    msgEl.innerHTML = `<i class="fas fa-fire"></i> Mastery achieved! Push to Advanced.`;
                }
            } catch (e) { console.error("Guidance Error:", e); }
        }

        function openDifficultyModal(ctx) {
            const theme = engine.themes[ctx.subject] || engine.themes["General"];

            // Remove existing modal if present
            const existing = document.getElementById('symmetric-difficulty-modal');
            if (existing) existing.remove();

            const modal = document.createElement('div');
            modal.id = 'symmetric-difficulty-modal';
            // Use Tailwind arbitrary values for backdrop if needed, or stick to standard palette
            // Using a darker overlay for contrast
            modal.className = `fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 fade-in`;

            // Extract color name from theme class (e.g., 'bg-blue-50' -> 'blue')
            // Fallback to 'slate' if parsing fails
            let colorName = 'slate';
            try {
                if (theme.bg) colorName = theme.bg.split('-')[1];
            } catch (e) {}

            modal.innerHTML = `
                <div class="bg-white rounded-3xl w-full max-w-md p-8 shadow-2xl relative border-4 border-${colorName}-100">
                    <button id="close-sym-modal" class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center bg-slate-100 rounded-full text-slate-500 hover:bg-red-50 hover:text-red-500 transition">✕</button>

                    <div class="text-center mb-8">
                        <div class="w-16 h-16 mx-auto bg-${colorName}-50 rounded-2xl flex items-center justify-center text-${colorName}-600 text-3xl mb-4 shadow-sm">
                            <i class="fas ${theme.icon || 'fa-shapes'}"></i>
                        </div>
                        <h3 class="text-2xl font-black text-slate-900 mb-1">Select Difficulty</h3>
                        <p class="text-xs font-bold text-${colorName}-600 uppercase tracking-widest">
                            Launching Quiz for ${ctx.subject} &gt; ${ctx.chapter}
                        </p>
                    </div>

                    <div class="space-y-4">
                        ${createCard('Simple', 'Foundation', 'bg-green-50', 'border-green-200', 'text-green-700', '🌱', ctx)}
                        ${createCard('Medium', 'Standard', 'bg-yellow-50', 'border-yellow-200', 'text-yellow-700', '⚡', ctx)}
                        ${createCard('Advanced', 'Challenger', 'bg-red-50', 'border-red-200', 'text-red-700', '🔥', ctx)}
                    </div>
                </div>
            `;

            document.body.appendChild(modal);
            document.getElementById('close-sym-modal').onclick = () => modal.remove();
        }

        function createCard(level, subtitle, bg, border, text, icon, ctx) {
            return `
                <button onclick="launchQuiz('${level}')"
                    class="w-full p-4 ${bg} border-2 ${border} rounded-2xl hover:scale-[1.02] active:scale-95 transition-all group text-left flex items-center gap-4 shadow-sm">
                    <span class="w-12 h-12 rounded-xl bg-white/50 ${text} flex items-center justify-center text-2xl shadow-sm">${icon}</span>
                    <div>
                        <div class="font-bold ${text} text-lg leading-tight">${level}</div>
                        <div class="text-[10px] ${text} opacity-80 font-black uppercase tracking-wider">${subtitle}</div>
                    </div>
                    <span class="ml-auto ${text} group-hover:translate-x-1 transition text-xl"><i class="fas fa-arrow-right"></i></span>
                </button>
            `;
        }

        // Expose launch function globally for the HTML onclick
        window.launchQuiz = (difficulty) => {
            const params = new URLSearchParams(window.location.search);
            const grade = params.get('grade') || '9';
            const subject = params.get('subject') || 'Mathematics';
            const chapter = params.get('chapter') || 'Polynomials';

            // 1. Generate the Table Slug using the Engine's canonical handshake
            const quizTableSlug = engine.getQuizTableSlug(grade, subject, chapter);

            // 2. Build the redirect URL
            const url = `quiz-engine.html?topic=${encodeURIComponent(quizTableSlug)}` +
                        `&difficulty=${difficulty}` +
                        `&grade=${grade}` +
                        `&subject=${encodeURIComponent(subject)}` +
                        `&chapter_name=${encodeURIComponent(chapter)}`;

            window.location.href = url;
        };
    </script>
</body>
</html>
