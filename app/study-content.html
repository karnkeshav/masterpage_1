<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Content — Ready4Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/shell.js"></script>
    <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily:{ sans:['Inter','sans-serif'] },
          colors:{
            'cbse-blue':'#1a3e6a',
            'cbse-light':'#f5f7fa',
            'accent-gold':'#ffb703',
            'success-green': '#16a34a',
            'warning-yellow': '#ca8a04'
          }
        }
      }
    }
    </script>
    <script src="../js/tailwind-config.js"></script>
    <link href="../css/global.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="../js/firebase-master-config.js"></script>
    <script src="../js/config.js" type="module"></script>

    <script>
    window.MathJax = { loader: { load: ['[tex]/mhchem'] }, tex: { packages: { '[+]': ['mhchem'] } } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script type="module" src="../js/ncert-renderer.js"></script>
</head>
<body class="bg-cbse-light min-h-screen flex flex-col">

    <div id="app-header"></div>
    <script>R4E.renderHeader({
        title: "Study Library",
        titleId: "page-title",
        userWelcomeDefault: "Student",
        roleBadge: "Grade --",
        roleBadgeId: "context-badge",
        showLogout: true
    });</script>

    <div class="flex-grow max-w-5xl mx-auto w-full p-4 md:p-8 fade-in">
        <div class="mb-8">
             <a href="javascript:history.back()" class="inline-flex items-center gap-2 text-slate-400 hover:text-cbse-blue font-bold text-sm transition group">
                <i class="fas fa-arrow-left group-hover:-translate-x-1 transition"></i> Back
            </a>
        </div>

        <div class="text-center mb-10">
            <h1 id="chapter-title" class="text-3xl md:text-4xl font-black text-slate-900 tracking-tight mb-2">--</h1>
            <p id="subject-subtitle" class="text-slate-500 font-medium">--</p>
        </div>

        <div id="content-container"></div>

        <!-- SYMMETRIC ACTION BAR -->
        <div id="action-bar-wrapper" class="mt-12 pt-10 border-t border-slate-200 hidden bg-white rounded-[2rem] p-8 md:p-12 shadow-sm border border-slate-100">
            <div class="flex flex-col md:flex-row items-end justify-center gap-8 max-w-4xl mx-auto">
                
                <!-- Left Column: Chapter Test -->
                <div class="flex-1 flex flex-col items-center">
                    <div id="quiz-guidance-msg" class="text-center text-[10px] font-black uppercase tracking-[0.2em] mb-4 min-h-[1.5rem] text-slate-400">Ready to Start? Begin with Simple Level</div>
                    <div id="test-btn-slot" class="w-full"></div>
                    <p class="text-center text-slate-400 text-[11px] font-medium mt-4 italic">Mastery Level: Recommended 85%+</p>
                </div>

                <div class="hidden md:block w-px h-24 bg-slate-100 self-center"></div>

                <!-- Right Column: Board Questions -->
                <div class="flex-1 flex flex-col items-center">
                    <div class="text-center text-[10px] font-black uppercase tracking-[0.2em] mb-4 min-h-[1.5rem] text-slate-400">Official CBSE Pattern Questions</div>
                    <button id="trigger-board-insights" class="w-full bg-cbse-blue text-white px-6 py-4 rounded-2xl font-black hover:scale-105 active:scale-95 transition-all shadow-xl flex items-center justify-center gap-3">
                        <i class="fas fa-file-signature text-accent-gold"></i>
                        <span>Board Pattern Questions</span>
                    </button>
                    <div id="sync-status-msg" class="text-center text-[9px] mt-4 font-bold uppercase tracking-widest text-warning-yellow flex items-center gap-2">
                        <i class="fas fa-wifi text-xs opacity-50"></i>
                        <span>One-time sync required for offline access</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="board-insight-container" class="mt-12 w-full mx-auto hidden"></div>
    </div>

    <div id="app-footer"></div>
    <script>R4E.renderFooter();</script>

    <!-- NEW EXTERNAL LOGIC FILE -->
    <script type="module" src="study-content.js"></script>
</body>
</html>
