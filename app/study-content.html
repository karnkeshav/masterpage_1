<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>

          colors:{
            'cbse-blue':'#1a3e6a',
            'cbse-light':'#f5f7fa',
            'accent-gold':'#ffb703',
            'success-green': '#16a34a',
            'warning-yellow': '#ca8a04',
            'danger-red': '#dc2626'
          }
        }
      }
    }
    </script>
    <script src="../js/tailwind-config.js"></script>
    <link href="../css/global.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="../js/firebase-master-config.js"></script>
    <script src="../js/config.js" type="module"></script>

    <script>
    window.MathJax = {
      loader: { load: ['[tex]/mhchem'] },
      tex: { packages: { '[+]': ['mhchem'] } }
    };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script type="module" src="../js/ncert-renderer.js"></script>
</head>
<body class="bg-cbse-light min-h-screen flex flex-col">

    <!-- Glass Header -->
    <div id="app-header"></div>
    <script>R4E.renderHeader({
        title: "Study Library",
        titleId: "page-title",
        userWelcomeDefault: "Student",
        roleBadge: "Grade --",
        roleBadgeId: "context-badge",
        showLogout: true,
        logoutId: "logout-nav-btn"
    });</script>

    <div class="flex-grow max-w-5xl mx-auto w-full p-4 md:p-8 fade-in">
        <div class="mb-8">
             <a href="javascript:history.back()" class="inline-flex items-center gap-2 text-slate-400 hover:text-cbse-blue font-bold text-sm transition group">
                <i class="fas fa-arrow-left group-hover:-translate-x-1 transition"></i> Back
            </a>
        </div>

        <div class="text-center mb-10">
            <h1 id="chapter-title" class="text-3xl md:text-4xl font-black text-slate-900 tracking-tight mb-2">--</h1>
            <p id="subject-subtitle" class="text-slate-500 font-medium">--</p>
        </div>

        <div id="content-container">
            <!-- Dynamic Content loaded via ncert-renderer.js -->
        </div>

        <!-- NEW: Trigger Section for Board Pattern Insights -->
        <div id="insight-trigger-wrapper" class="mt-8 text-center hidden border-t border-slate-200 pt-8">
            <button id="trigger-board-insights" class="bg-cbse-blue text-white px-8 py-4 rounded-2xl font-bold hover:scale-105 active:scale-95 transition-all shadow-xl flex items-center gap-3 mx-auto">
                <i class="fas fa-lightbulb text-accent-gold animate-pulse"></i>
                <span>Explore Board Pattern Insights</span>
            </button>
            <p class="text-slate-400 text-[10px] mt-3 font-bold uppercase tracking-widest">Available Offline after first sync</p>
        </div>

        <div id="board-insight-container" class="mt-12 w-full mx-auto hidden"></div>
    </div>

    <div id="app-footer"></div>
    <script>R4E.renderFooter();</script>

    <script type="module">
        import { SlugEngine } from '../js/slug-engine.js';
        import { getInitializedClients } from '../js/config.js';
        import { curriculum } from '../js/curriculum/class-9.js';

        const engine = new SlugEngine(curriculum);

        // --- IndexedDB Manager (Permanent Local Storage) ---
        const DB_NAME = 'Ready4Exam_Insights_DB';
        const STORE_NAME = 'board_insights';
        const DB_VERSION = 1;

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function getLocalInsight(chapterKey) {
            const db = await openDB();
            return new Promise((resolve) => {
                const transaction = db.transaction(STORE_NAME, 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.get(chapterKey);
                request.onsuccess = () => resolve(request.result);
            });
        }

        async function saveInsightLocally(chapterKey, data) {
            const db = await openDB();
            const transaction = db.transaction(STORE_NAME, 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            store.put({ id: chapterKey, content: data, timestamp: Date.now() });
        }

        // --- DOM Observers ---
        const container = document.getElementById('content-container');
        if (container) {
            const observer = new MutationObserver(() => {
                // Show the Insight trigger once content is rendered
                const wrapper = document.getElementById('insight-trigger-wrapper');
                if (wrapper) {
                    wrapper.classList.remove('hidden');
                    wrapper.classList.add('flex');
                }

                // Upgrade standard test button if found
                const testBtn = document.getElementById('btn-target-test');
                if (testBtn && !testBtn.dataset.upgraded) {
                    upgradeTestButton(testBtn);
                }
            });
            observer.observe(container, { childList: true, subtree: true });
        }

        // Initial backup check for button visibility
        setTimeout(() => {
            if (document.getElementById('content-container').innerHTML.length > 50) {
                document.getElementById('insight-trigger-wrapper').classList.remove('hidden');
            }
        }, 1500);

        // --- Event Handlers ---
        document.getElementById('trigger-board-insights').addEventListener('click', handleInsightRequest);

        async function handleInsightRequest() {
            const params = new URLSearchParams(window.location.search);
            const chapter = params.get('chapter') || 'real_numbers';
            const chapterKey = chapter.toLowerCase().replace(/ /g, '_');
            
            // 1. Try loading from local device storage
            let data = await getLocalInsight(chapterKey);

            // 2. SYNC CHECK: If missing OR local copy is the old empty template, pull from GitHub
            if (!data || !data.content.insights || data.content.insights.length === 0) {
                console.log("Local storage empty or outdated. Performing one-time sync from GitHub...");
                // Add cache-buster to ensure we get the newest version from GitHub
                const cloudUrl = `https://karnkeshav.github.io/masterpage_1/data/board-insights/${chapterKey}.json?v=${Date.now()}`;
                
                try {
                    const response = await fetch(cloudUrl);
                    if (!response.ok) throw new Error("Chapter data not found on server.");
                    const jsonData = await response.json();
                    
                    // 3. Save to device forever
                    await saveInsightLocally(chapterKey, jsonData);
                    data = { content: jsonData };
                } catch (err) {
                    alert("A one-time internet connection is required to sync this chapter's board insights.");
                    return;
                }
            }

            // 4. Display the content
            renderInsightsUI(data.content);
        }

        function renderInsightsUI(data) {
            const target = document.getElementById('board-insight-container');
            target.classList.remove('hidden');
            target.scrollIntoView({ behavior: 'smooth' });

            target.innerHTML = `
                <div class="bg-white border-4 border-cbse-blue rounded-3xl overflow-hidden shadow-2xl mb-12 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div class="bg-cbse-blue p-6 text-white flex justify-between items-center">
                        <div>
                            <div class="flex items-center gap-3 mb-1">
                                <span class="bg-accent-gold text-cbse-blue text-[10px] font-black px-2 py-0.5 rounded uppercase">Verified Pattern</span>
                                <h2 class="text-xl font-bold">${data.chapter_name} Insights</h2>
                            </div>
                            <p class="text-blue-100 text-xs italic">Extracted Case Study Questions</p>
                        </div>
                        <button onclick="document.getElementById('board-insight-container').classList.add('hidden')" class="text-white/50 hover:text-white transition">
                            <i class="fas fa-times text-xl"></i>
                        </button>
                    </div>
                    <div class="p-8 space-y-10">
                        ${data.insights.map((insight, idx) => `
                            <div class="border-l-4 border-accent-gold pl-6">
                                <h4 class="text-cbse-blue font-black uppercase text-[10px] tracking-widest mb-2">Case Study ${idx + 1}</h4>
                                <div class="text-slate-700 italic mb-6 text-sm leading-relaxed bg-slate-50 p-4 rounded-xl border border-slate-100">
                                    "${insight.context.replace(/\n/g, '<br>')}"[cite: 2]
                                </div>
                                <div class="space-y-6">
                                    ${insight.questions.map((q, qIdx) => `
                                        <div>
                                            <p class="font-bold text-slate-800 mb-3 text-sm">${qIdx+1}. ${q.text}</p>
                                            <div class="grid grid-cols-1 md:grid-cols-2 gap-2 ml-4">
                                                ${q.options.map(opt => `<div class="bg-white p-3 rounded-lg border border-slate-200 text-xs text-slate-600 font-medium">${opt}</div>`).join('')}
                                            </div>
                                            <details class="mt-3 ml-4 group">
                                                <summary class="text-[10px] font-black text-cbse-blue cursor-pointer list-none uppercase tracking-widest hover:text-accent-gold transition">
                                                    <i class="fas fa-key mr-1"></i> Reveal Answer
                                                </summary>
                                                <div class="mt-2 p-3 bg-green-50 text-success-green border border-green-100 rounded-lg font-bold text-xs">
                                                    Correct Answer: ${q.answer}[cite: 2]
                                                </div>
                                            </details>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // --- Helper: Upgrade Test Button ---
        function upgradeTestButton(oldBtn) {
            const newBtn = oldBtn.cloneNode(true);
            oldBtn.parentNode.replaceChild(newBtn, oldBtn);
            newBtn.innerHTML = `<span>Take Chapter Test</span> <i class="fas fa-bolt"></i>`;
            newBtn.dataset.upgraded = "true";
            newBtn.addEventListener('click', () => {
                 const params = new URLSearchParams(window.location.search);
                 openDifficultyModal({
                     subject: params.get('subject') || 'Mathematics',
                     chapter: params.get('chapter') || 'Real_Numbers',
                     grade: params.get('grade') || '10'
                 });
            });
        }

        // --- Standard UI Components (Stubs) ---
        function openDifficultyModal(ctx) {
            // Re-uses your existing modal logic
            console.log("Opening Modal for:", ctx.chapter);
        }
    </script>
</body>
</html>
